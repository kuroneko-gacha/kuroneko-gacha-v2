function initSoundButton(){
  const btn = document.getElementById("soundToggle");
  if(!btn) return;
  btn.textContent = soundEnabled ? "🔊 ON" : "🔇 OFF";
}

function toggleSound(){
  soundEnabled = !soundEnabled;
  try{
    localStorage.setItem("kuronekoSound", soundEnabled ? "on" : "off");
  }catch(e){}
  initSoundButton();
  if(soundEnabled) playSfx("sparkle");
}

function playSfx(type){
  if(!soundEnabled) return;

  try{
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if(!AudioCtx) return;

    const ctx = new AudioCtx();
    const gain = ctx.createGain();
    gain.connect(ctx.destination);

    let freq = 660;
    let duration = 0.11;
    let wave = "sine";

    if(type === "paw"){
      freq = 180;
      duration = 0.09;
      wave = "triangle";
    }else if(type === "sparkle"){
      freq = 980;
      duration = 0.14;
      wave = "sine";
    }else if(type === "boom"){
      freq = 90;
      duration = 0.22;
      wave = "sawtooth";
    }else if(type === "secret"){
      freq = 1320;
      duration = 0.3;
      wave = "square";
    }

    const osc = ctx.createOscillator();
    osc.type = wave;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);

    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.13, ctx.currentTime + 0.015);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);

    osc.connect(gain);
    osc.start();
    osc.stop(ctx.currentTime + duration + 0.03);

    setTimeout(function(){
      try{ ctx.close(); }catch(e){}
    }, 420);
  }catch(e){}
}

function vibratePhone(pattern){
  try{
    if(navigator.vibrate) navigator.vibrate(pattern || [40]);
  }catch(e){}
}

function playGachaEffect(res){
  return new Promise(resolve=>{
    const isSecret = !!res.secret;
    const effect = document.getElementById("effect");
    const stage = document.getElementById("effectStage");

    effect.className = "";
    stage.innerHTML = "";
    effect.style.display = "block";

    const hint = document.createElement("div");
    hint.className = "v9SkipHint";
    hint.textContent = "長押しでスキップ";
    stage.appendChild(hint);

    let finished = false;
    let pressTimer = null;

    function finishOnce(){
      if(finished) return;
      finished = true;
      effect.onpointerdown = null;
      effect.onpointerup = null;
      effect.onpointercancel = null;
      finishEffect(resolve);
    }

    effect.onpointerdown = function(){
      pressTimer = setTimeout(finishOnce, 650);
    };
    effect.onpointerup = function(){
      if(pressTimer) clearTimeout(pressTimer);
    };
    effect.onpointercancel = function(){
      if(pressTimer) clearTimeout(pressTimer);
    };

    if(isSecret){
      playSfx("secret");
      vibratePhone([80,40,120,40,180]);
      const n = Math.floor(Math.random()*3);
      if(n === 0) v9SecretTimeStop(stage, finishOnce);
      if(n === 1) v9SecretMiracle(stage, finishOnce);
      if(n === 2) v9SecretAwakening(stage, finishOnce);
    }else{
      playSfx("sparkle");
      vibratePhone([35]);
      const n = Math.floor(Math.random()*7);
      if(n === 0) v9NormalCatDelivery(stage, finishOnce);
      if(n === 1) v9NormalPawStamp(stage, finishOnce);
      if(n === 2) v9NormalGiftBox(stage, finishOnce);
      if(n === 3) v9NormalShootingStar(stage, finishOnce);
      if(n === 4) v9NormalMagicCircle(stage, finishOnce);
      if(n === 5) v9NormalCatEyes(stage, finishOnce);
      if(n === 6) v9NormalMoonJump(stage, finishOnce);
    }
  });
}

function jsonp(params){
  return new Promise((resolve,reject)=>{
    const cb = "cb_" + Date.now() + "_" + Math.floor(Math.random()*9999);
    params.callback = cb;

    const url = API_URL + "?" + new URLSearchParams(params).toString();
    const s = document.createElement("script");

    const timer = setTimeout(function(){
      delete window[cb];
      if(s && s.parentNode) s.remove();
      reject(new Error("通信タイムアウト"));
    }, 15000);

    window[cb] = function(data){
      clearTimeout(timer);
      delete window[cb];
      s.remove();
      resolve(data);
    };

    s.onerror = function(){
      clearTimeout(timer);
      delete window[cb];
      s.remove();
      reject(new Error("通信失敗"));
    };

    s.src = url;
    document.body.appendChild(s);
  });
}

  if(!profile.userId) return;

      updateDailyLimitText(Number(res.remaining || 0), Number(res.dailyLimit || 2));
    }
  }catch(e){
    setDailyLimitText("🎁 あと2回引けるにゃー♪");
  }
}

function renderCollection(cards, ownedCount, totalCount){
  const list = document.getElementById("collectionList");
  const info = document.getElementById("collectionInfo");

  list.innerHTML = "";

  const allCards = (cards || []).slice().sort(function(a,b){
    return Number(a.sortNo || 999999) - Number(b.sortNo || 999999);
  });

  const total = Number(totalCount || allCards.length || 0);
  const owned = Number(ownedCount || allCards.filter(function(c){ return !!c.owned; }).length || 0);
  const percent = total ? Math.round((owned / total) * 100) : 0;

  info.innerHTML =
    "入手済み " + owned + " / " + total + "枚　｜　" + percent + "%<br>" +
    "入団日順アルバム" +
    '<div class="bar"><span style="width:' + percent + '%"></span></div>';

  if(allCards.length === 0){
    list.innerHTML = "<div>まだシールがありません</div>";
  }else{
    allCards.forEach(function(card, index){
      const div = document.createElement("div");
      const ownedCard = !!card.owned;

      div.className =
        (card.secret ? "cardMini secretMini" : "cardMini") +
        (ownedCard ? "" : " lockedMini");

      div.setAttribute("data-no", "No." + String(index + 1).padStart(3, "0"));
      div.setAttribute("data-card-id", String(card.id || ""));

      if(ownedCard){
        const img = escapeHtml(card.imageUrl);
        const name = escapeHtml(card.name || card.realName);

        div.innerHTML =
          '<img loading="lazy" src="' + img + '">' +
          '<div>' + name + '</div>';

        div.onclick = function(){
          openSealZoom(card.imageUrl, card.name || card.realName);
        };
      }else{
        div.innerHTML =
          '<div class="lockedThumb">？？？</div>' +
          '<div>未入手</div>';
      }

      list.appendChild(div);
    });
  }

  const collection = document.getElementById("collection");
  collection.style.display = "block";
  collection.classList.remove("collectionOpening");
  void collection.offsetWidth;
  collection.classList.add("collectionOpening");

  setTimeout(function(){
    afterCollectionOpenJump();
  }, 260);
}


function afterCollectionOpenJump(){
  const targetId = pendingNewCardId || lastDrawnCardId;
  if(!targetId) return;

  const card = findCollectionCardById(targetId);
  if(!card) return;

  scrollCollectionToCard(card, function(){
    if(pendingNewCardId && pendingNewImageUrl){
      showCollectionToast("新しいシールを図鑑に登録中…");
      playAbsorbIntoCollection(card, pendingNewImageUrl, function(){
        focusCollectionCard(card);
        clearPendingNewCard();
      });
    }else{
      focusCollectionCard(card);
    }
  });
}

function findCollectionCardById(cardId){
  const nodes = document.querySelectorAll("#collectionList [data-card-id]");
  for(let i=0;i<nodes.length;i++){
    if(String(nodes[i].getAttribute("data-card-id")) === String(cardId)){
      return nodes[i];
    }
  }
  return null;
}

function scrollCollectionToCard(card, callback){
  const collection = document.getElementById("collection");
  if(!collection || !card){
    if(callback) callback();
    return;
  }

  const desired =
    card.offsetTop -
    (collection.clientHeight / 2) +
    (card.clientHeight / 2);

  collection.scrollTo({
    top: Math.max(0, desired),
    behavior: "smooth"
  });

  setTimeout(function(){
    if(callback) callback();
  }, 650);
}

function focusCollectionCard(card){
  if(!card) return;

}

function playAbsorbIntoCollection(card, imageUrl, callback){
  const layer = document.getElementById("collectionAbsorbFx");
  if(!layer || !card || !imageUrl){
    if(callback) callback();
    return;
  }

  const rect = card.getBoundingClientRect();
  const tx = rect.left + rect.width / 2;
  const ty = rect.top + rect.height / 2;

  layer.innerHTML = "";
  layer.style.display = "block";

  const img = document.createElement("img");

  img.src = imageUrl;

    const sp = document.createElement("div");

function playSfx(type){
  if(!soundEnabled) return;

  try{
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if(!AudioCtx) return;

    const ctx = new AudioCtx();
    const gain = ctx.createGain();
    gain.connect(ctx.destination);

    let freq = 660;
    let duration = 0.11;
    let wave = "sine";

    if(type === "paw"){
      freq = 180;
      duration = 0.09;
      wave = "triangle";
    }else if(type === "sparkle"){
      freq = 980;
      duration = 0.14;
      wave = "sine";
    }else if(type === "boom"){
      freq = 90;
      duration = 0.22;
      wave = "sawtooth";
    }else if(type === "secret"){
      freq = 1320;
      duration = 0.3;
      wave = "square";
    }

    const osc = ctx.createOscillator();
    osc.type = wave;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);

    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.13, ctx.currentTime + 0.015);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);

    osc.connect(gain);
    osc.start();
    osc.stop(ctx.currentTime + duration + 0.03);

    setTimeout(function(){
      try{ ctx.close(); }catch(e){}
    }, 420);
  }catch(e){}
}

    d.style.animationDelay = (Math.random()*0.45) + "s";
    stage.appendChild(d);
  }
}

setTimeout(initSoundButton, 300);

</script>
