<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>クロネコガチャ v2</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
html,body{
  margin:0;
  padding:0;
  background:#020617;
  font-family:"Hiragino Sans","Meiryo",sans-serif;
  overflow-x:hidden;
  -webkit-tap-highlight-color:transparent;
}

#app{
  position:relative;
  width:100%;
  max-width:430px;
  margin:0 auto;
  min-height:100vh;
  background:#020617;
}

#topImg{
  width:100%;
  display:block;
  user-select:none;
  pointer-events:none;
}

.tap{
  position:absolute;
  border:none;
  background:rgba(255,255,255,0);
  cursor:pointer;
  z-index:20;
}

#drawTap{
  left:18%;
  top:45.5%;
  width:64%;
  height:21%;
  border-radius:50%;
}

#bookTap{
  left:13%;
  top:76.5%;
  width:74%;
  height:8%;
  border-radius:20px;
}

/* 下の焼き込み文字を隠して状態表示 */
#statusMask{
  position:absolute;
  left:12.3%;
  top:84.0%;
  width:75.4%;
  height:5.0%;
  border-radius:999px;
  background:linear-gradient(180deg,#19130c,#050505);
  border:2px solid rgba(255,211,125,.85);
  box-shadow:0 0 10px rgba(0,0,0,.75), inset 0 0 10px rgba(255,255,255,.06);
  z-index:8;
  pointer-events:none;
}

#statusText{
  position:absolute;
  left:12.3%;
  top:84.0%;
  width:75.4%;
  height:5.0%;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:#fff5d0;
  font-weight:bold;
  font-size:15px;
  text-shadow:0 2px 4px #000;
  z-index:9;
  pointer-events:none;
}

/* 押した瞬間の反応 */
#pressFx{
  position:absolute;
  left:18%;
  top:45.5%;
  width:64%;
  height:21%;
  border-radius:50%;
  display:none;
  background:
    radial-gradient(circle,rgba(255,255,255,.75),rgba(250,204,21,.35),rgba(255,255,255,0) 68%);
  z-index:10;
  pointer-events:none;
  animation:pressGlow .45s infinite alternate;
}

@keyframes pressGlow{
  from{transform:scale(.94);opacity:.55;}
  to{transform:scale(1.07);opacity:1;}
}

/* 演出本体 */
#effect{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.94);
  display:none;
  z-index:100;
  overflow:hidden;
}

#effectStage{
  position:absolute;
  inset:0;
  overflow:hidden;
}

/* 文字演出は使わない */
#effectText{ display:none; }

.openFlash{
  animation:openFlash .13s linear 7;
}

@keyframes openFlash{
  0%{background:rgba(0,0,0,.94);}
  50%{background:rgba(255,244,180,.86);}
  100%{background:rgba(0,0,0,.94);}
}

/* CSS黒猫 */
.cssCat{
  position:absolute;
  width:150px;
  height:95px;
  z-index:20;
}

.catBody{
  position:absolute;
  width:100px;
  height:55px;
  background:#020617;
  border-radius:55% 50% 45% 45%;
  left:34px;
  top:28px;
  box-shadow:0 0 18px rgba(250,204,21,.45);
}

.catHead{
  position:absolute;
  width:52px;
  height:48px;
  background:#020617;
  border-radius:50%;
  left:10px;
  top:18px;
  box-shadow:0 0 12px rgba(250,204,21,.3);
}

.catEar{
  position:absolute;
  width:0;
  height:0;
  border-left:12px solid transparent;
  border-right:12px solid transparent;
  border-bottom:24px solid #020617;
  top:4px;
}
.ear1{left:16px; transform:rotate(-22deg);}
.ear2{left:39px; transform:rotate(22deg);}

.catEye{
  position:absolute;
  width:7px;
  height:7px;
  background:#facc15;
  border-radius:50%;
  top:35px;
  left:24px;
  box-shadow:18px 0 0 #facc15;
}

.catTail{
  position:absolute;
  width:60px;
  height:16px;
  border-radius:20px;
  border-top:12px solid #020617;
  right:-6px;
  top:28px;
  transform-origin:left center;
  animation:tailSwing .25s infinite alternate;
}

.catLeg{
  position:absolute;
  width:13px;
  height:35px;
  background:#020617;
  border-radius:10px;
  top:70px;
  transform-origin:top center;
  animation:legRun .16s infinite alternate;
}
.leg1{left:55px;}
.leg2{left:78px; animation-delay:.08s;}
.leg3{left:101px;}
.leg4{left:124px; animation-delay:.08s;}

@keyframes tailSwing{
  from{transform:rotate(-16deg);}
  to{transform:rotate(20deg);}
}
@keyframes legRun{
  from{transform:rotate(30deg);}
  to{transform:rotate(-30deg);}
}

.catDash1{animation:catDash1 2.8s ease-in-out forwards;}
@keyframes catDash1{
  0%{left:-45%; top:58%; transform:scale(.8) rotate(-5deg);}
  38%{left:38%; top:52%; transform:scale(1.05) rotate(3deg);}
  55%{left:48%; top:40%; transform:scale(1.18) rotate(-8deg);}
  72%{left:52%; top:52%; transform:scale(1.05) rotate(4deg);}
  100%{left:115%; top:50%; transform:scale(.9) rotate(6deg);}
}

.catDash2{animation:catDash2 3.1s ease-in-out forwards;}
@keyframes catDash2{
  0%{right:-45%; top:43%; transform:scaleX(-1) scale(.8);}
  40%{right:34%; top:53%; transform:scaleX(-1) scale(1.05);}
  60%{right:48%; top:33%; transform:scaleX(-1) scale(1.2) rotate(8deg);}
  82%{right:42%; top:54%; transform:scaleX(-1) scale(1.05);}
  100%{right:110%; top:46%; transform:scaleX(-1) scale(.9);}
}

/* 肉球 */
.paw{
  position:absolute;
  width:50px;
  height:50px;
  border-radius:50%;
  background:#facc15;
  opacity:0;
  filter:drop-shadow(0 0 14px #facc15);
  animation:pawPop 2.4s ease-in-out forwards;
}
.paw::before{
  content:"";
  position:absolute;
  width:14px;
  height:14px;
  border-radius:50%;
  background:#facc15;
  left:5px;
  top:-10px;
  box-shadow:16px -8px 0 #facc15,32px 0 0 #facc15;
}
.paw::after{
  content:"";
  position:absolute;
  width:16px;
  height:16px;
  border-radius:50%;
  background:#facc15;
  left:17px;
  top:27px;
}
@keyframes pawPop{
  0%{transform:scale(.05) rotate(-30deg); opacity:0;}
  18%{opacity:1;}
  55%{transform:scale(1.2) rotate(10deg); opacity:1;}
  100%{transform:scale(.85) rotate(22deg); opacity:0;}
}

/* 星 */
.star{
  position:absolute;
  width:8px;
  height:8px;
  background:#facc15;
  border-radius:50%;
  box-shadow:0 0 14px #facc15;
  animation:starFall 2.7s linear forwards;
}
@keyframes starFall{
  0%{transform:translateY(-25vh) scale(.4); opacity:0;}
  18%{opacity:1;}
  100%{transform:translateY(115vh) scale(1.4); opacity:0;}
}

/* 月・光 */
.moon{
  position:absolute;
  width:120px;
  height:120px;
  border-radius:50%;
  background:#fde68a;
  left:50%;
  top:38%;
  transform:translate(-50%,-50%);
  box-shadow:0 0 50px #fde68a,0 0 110px #facc15;
  animation:moonGlow 3.2s ease-in-out forwards;
}
.moon::after{
  content:"";
  position:absolute;
  width:96px;
  height:96px;
  border-radius:50%;
  background:#020617;
  right:-18px;
  top:-8px;
}
@keyframes moonGlow{
  0%{opacity:.05; transform:translate(-50%,-50%) scale(.35);}
  45%{opacity:1; transform:translate(-50%,-50%) scale(1);}
  75%{opacity:1; transform:translate(-50%,-50%) scale(1.22);}
  100%{opacity:.25; transform:translate(-50%,-50%) scale(1.8);}
}

/* 宝箱 */
.chest{
  position:absolute;
  left:50%;
  top:50%;
  width:170px;
  height:126px;
  transform:translate(-50%,-50%);
  animation:chestShake 2.5s ease-in-out forwards;
}
.chestLid{
  position:absolute;
  left:10px;
  top:5px;
  width:150px;
  height:52px;
  background:linear-gradient(#a16207,#facc15);
  border-radius:18px 18px 4px 4px;
  transform-origin:bottom center;
  animation:chestOpen 3.0s ease-in-out forwards;
}
.chestBody{
  position:absolute;
  left:0;
  top:55px;
  width:170px;
  height:72px;
  background:linear-gradient(#78350f,#f59e0b);
  border-radius:8px 8px 20px 20px;
}
.chestLight{
  position:absolute;
  left:50%;
  top:40%;
  width:34px;
  height:34px;
  background:#fff7ad;
  border-radius:50%;
  transform:translate(-50%,-50%);
  box-shadow:0 0 95px 60px #facc15;
  opacity:0;
  animation:lightBurst 3.0s ease-in-out forwards;
}
@keyframes chestShake{
  0%,30%,48%{transform:translate(-50%,-50%) rotate(0);}
  35%{transform:translate(-50%,-50%) rotate(-9deg);}
  40%{transform:translate(-50%,-50%) rotate(9deg);}
  55%{transform:translate(-50%,-50%) scale(1.08);}
  100%{transform:translate(-50%,-50%) scale(1);}
}
@keyframes chestOpen{
  0%,58%{transform:rotateX(0);}
  80%,100%{transform:rotateX(68deg) translateY(-22px);}
}
@keyframes lightBurst{
  0%,58%{opacity:0; transform:translate(-50%,-50%) scale(.2);}
  78%{opacity:1; transform:translate(-50%,-50%) scale(1.25);}
  100%{opacity:.2; transform:translate(-50%,-50%) scale(1.6);}
}

/* 魔法陣 */
.magicRing{
  position:absolute;
  left:50%;
  top:52%;
  width:90px;
  height:90px;
  border:6px solid #facc15;
  border-radius:50%;
  transform:translate(-50%,-50%);
  box-shadow:0 0 28px #facc15, inset 0 0 24px #facc15;
  animation:ringSpin 3.2s ease-in-out forwards;
}
.magicRing::before,.magicRing::after{
  content:"";
  position:absolute;
  inset:-28px;
  border:3px dashed rgba(250,204,21,.85);
  border-radius:50%;
}
.magicRing::after{
  inset:-55px;
  border-style:solid;
  opacity:.45;
}
@keyframes ringSpin{
  0%{transform:translate(-50%,-50%) scale(.15) rotate(0); opacity:0;}
  25%{opacity:1;}
  80%{transform:translate(-50%,-50%) scale(2.5) rotate(330deg); opacity:1;}
  100%{transform:translate(-50%,-50%) scale(3.4) rotate(480deg); opacity:0;}
}

/* カード予告シルエット */
.cardSilhouette{
  position:absolute;
  left:50%;
  top:50%;
  width:170px;
  height:230px;
  border-radius:18px;
  background:linear-gradient(135deg,rgba(255,255,255,.92),rgba(250,204,21,.7));
  transform:translate(-50%,-50%) scale(.2) rotateY(90deg);
  box-shadow:0 0 50px #facc15;
  animation:cardSil 1.2s ease-in-out forwards;
}
@keyframes cardSil{
  0%{transform:translate(-50%,-50%) scale(.2) rotateY(90deg); opacity:0;}
  70%{transform:translate(-50%,-50%) scale(1.08) rotateY(0deg); opacity:1;}
  100%{transform:translate(-50%,-50%) scale(1) rotateY(0deg); opacity:.95;}
}

/* シークレット */
.secretMode{
  animation:secretBg 3.8s ease-in-out forwards;
}
@keyframes secretBg{
  0%{background:rgba(0,0,0,.96);}
  20%{background:rgba(24,0,40,.96);}
  45%{background:rgba(70,0,80,.96);}
  70%{background:rgba(90,60,0,.96);}
  100%{background:rgba(0,0,0,.94);}
}
.lightning{
  position:absolute;
  left:50%;
  top:4%;
  width:30px;
  height:320px;
  background:#fef08a;
  clip-path:polygon(45% 0,82% 0,58% 38%,90% 38%,34% 100%,48% 53%,18% 53%);
  transform:translateX(-50%);
  filter:drop-shadow(0 0 20px #facc15);
  opacity:0;
  animation:bolt 3.8s ease-in-out forwards;
}
@keyframes bolt{
  0%,22%,40%,54%,100%{opacity:0;}
  28%,34%,62%,70%{opacity:1;}
}
.secretAura{
  position:absolute;
  left:50%;
  top:50%;
  width:80px;
  height:80px;
  border-radius:50%;
  transform:translate(-50%,-50%);
  background:radial-gradient(circle,#fff7ad,rgba(250,204,21,.5),rgba(147,51,234,0));
  box-shadow:0 0 80px 60px rgba(250,204,21,.7),0 0 120px 80px rgba(147,51,234,.55);
  animation:secretAura 3.8s ease-in-out forwards;
}
@keyframes secretAura{
  0%{transform:translate(-50%,-50%) scale(.1); opacity:0;}
  35%{opacity:1;}
  80%{transform:translate(-50%,-50%) scale(3); opacity:1;}
  100%{transform:translate(-50%,-50%) scale(5); opacity:0;}
}

/* 結果 */
#result{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.88);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:120;
  padding:20px;
  box-sizing:border-box;
}
#result.secretResult{
  background:radial-gradient(circle,rgba(250,204,21,.35),rgba(0,0,0,.93) 65%);
}
#resultImg{
  width:86%;
  max-width:360px;
  border-radius:18px;
  background:white;
  box-shadow:0 0 35px #facc15;
  animation:cardPop .7s ease;
}
#result.secretResult #resultImg{
  box-shadow:0 0 35px #facc15,0 0 70px #f472b6,0 0 100px #60a5fa;
  animation:secretCardPop .9s ease;
}
#resultName{
  margin-top:16px;
  color:#facc15;
  font-size:28px;
  font-weight:bold;
  text-shadow:0 0 12px #facc15;
}
#resultMsg{
  margin-top:8px;
  color:#fff;
  font-size:18px;
  font-weight:bold;
}
#closeResult{
  margin-top:18px;
  padding:12px 28px;
  border:none;
  border-radius:999px;
  font-size:18px;
  font-weight:bold;
  background:#facc15;
  color:#3b2408;
}
@keyframes cardPop{
  0%{transform:scale(.2) rotateY(100deg);opacity:0;}
  70%{transform:scale(1.08) rotateY(0deg);opacity:1;}
  100%{transform:scale(1);}
}
@keyframes secretCardPop{
  0%{transform:scale(.1) rotate(30deg);opacity:0;}
  50%{transform:scale(1.22) rotate(-6deg);opacity:1;}
  100%{transform:scale(1) rotate(0);}
}

/* 図鑑 */
#collection{
  position:fixed;
  inset:0;
  background:rgba(2,6,23,.96);
  display:none;
  z-index:130;
  overflow-y:auto;
  padding:20px;
  box-sizing:border-box;
  color:white;
}
#collection h2{
  text-align:center;
  color:#facc15;
}
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}
.cardMini{
  background:rgba(255,255,255,.1);
  border-radius:14px;
  padding:8px;
  text-align:center;
}
.cardMini.secretMini{
  background:linear-gradient(135deg,rgba(250,204,21,.25),rgba(147,51,234,.25));
  box-shadow:0 0 18px rgba(250,204,21,.25);
}
.cardMini img{
  width:100%;
  border-radius:10px;
  background:white;
}
#closeCollection{
  width:100%;
  margin:18px 0;
  padding:14px;
  border:none;
  border-radius:16px;
  font-size:18px;
  font-weight:bold;
  background:#38bdf8;
  color:white;
}
</style>
</head>

<body>
<div id="app">
  <img id="topImg" src="https://github.com/kuroneko-gacha/kuroneko-gacha-v2/blob/main/33e5c8ed-3a7d-4f64-ad75-060ed57ebefb%20(1).png?raw=true">

  <div id="statusMask"></div>
  <div id="statusText">✨ 今日のガチャを引けます</div>
  <div id="pressFx"></div>

  <button id="drawTap" class="tap" onclick="drawGacha()" aria-label="ガチャを引く"></button>
  <button id="bookTap" class="tap" onclick="loadCollection()" aria-label="図鑑を見る"></button>
</div>

<div id="effect">
  <div id="effectStage"></div>
  <div id="effectText"></div>
</div>

<div id="result">
  <img id="resultImg">
  <div id="resultName"></div>
  <div id="resultMsg"></div>
  <button id="closeResult" onclick="closeResult()">閉じる</button>
</div>

<div id="collection">
  <h2>📚 シール図鑑</h2>
  <div id="collectionList" class="grid"></div>
  <button id="closeCollection" onclick="closeCollection()">図鑑を閉じる</button>
</div>

<script>
const LIFF_ID = "2010515194-r0gV3TRC";
const API_URL = "https://script.google.com/macros/s/AKfycbxQ32wEkjNf0TG1DBK_MYDYS8GkkBLTA_WIz-mgurf_O-hd3ugpYRbb0e-14Fs7Ctk5/exec";

let profile = { userId:"", displayName:"" };
let drawing = false;

window.onload = async function(){
  try{
    await liff.init({ liffId: LIFF_ID });

    if(!liff.isLoggedIn()){
      liff.login();
      return;
    }

    const p = await liff.getProfile();
    profile.userId = p.userId;
    profile.displayName = p.displayName;
    console.log("LINE名取得成功:", profile.displayName);

  }catch(e){
    console.error(e);
    alert("LINE名の取得に失敗しました。LINE内から開いてください。");
  }
};

function setStatus(text){
  const el = document.getElementById("statusText");
  if(el) el.textContent = text;
}

function showPressFx(){
  const el = document.getElementById("pressFx");
  if(el) el.style.display = "block";
}

function hidePressFx(){
  const el = document.getElementById("pressFx");
  if(el) el.style.display = "none";
}

function jsonp(params){
  return new Promise((resolve,reject)=>{
    const cb = "cb_" + Date.now() + "_" + Math.floor(Math.random()*9999);
    params.callback = cb;

    const url = API_URL + "?" + new URLSearchParams(params).toString();
    const s = document.createElement("script");

    window[cb] = function(data){
      delete window[cb];
      s.remove();
      resolve(data);
    };

    s.onerror = function(){
      delete window[cb];
      s.remove();
      reject(new Error("通信失敗"));
    };

    s.src = url;
    document.body.appendChild(s);
  });
}

async function drawGacha(){
  if(drawing) return;

  if(!profile.userId){
    alert("LINE名を確認中です。少し待ってから押してください。");
    return;
  }

  drawing = true;
  setStatus("⏳ 抽選中...");
  showPressFx();

  try{
    const res = await jsonp({
      action:"draw",
      userId:profile.userId,
      displayName:profile.displayName
    });

    hidePressFx();

    if(!res || res.ok === false){
      drawing = false;
      setStatus("✅ 本日分は受け取り済みです");
      alert(res && res.message ? res.message : "今日はもう引いています。また明日ね！");
      return;
    }

    await playGachaEffect(res);
    drawing = false;
    setStatus("✅ 本日分は受け取り済みです");
    showResult(res);

  }catch(e){
    drawing = false;
    hidePressFx();
    hideEffect();
    setStatus("⚠ 通信エラー");
    alert("通信エラーが出ました。少し待ってからもう一度試してください。");
  }
}

function playGachaEffect(res){
  return new Promise(resolve=>{
    const isSecret = !!res.secret;
    const effect = document.getElementById("effect");
    const stage = document.getElementById("effectStage");

    effect.className = "";
    stage.innerHTML = "";
    effect.style.display = "block";

    if(isSecret){
      playSecretEffect(stage,resolve);
    }else{
      const n = Math.floor(Math.random()*6);
      if(n === 0) playDashPaw(stage,resolve);
      if(n === 1) playChestStars(stage,resolve);
      if(n === 2) playMoonCat(stage,resolve);
      if(n === 3) playPawRing(stage,resolve);
      if(n === 4) playStarRainCard(stage,resolve);
      if(n === 5) playDoubleCat(stage,resolve);
    }
  });
}

function playDashPaw(stage,done){
  stage.appendChild(makeCat("catDash1"));
  addManyPaws(stage,10,.8);
  addManyStars(stage,16,.9);
  setTimeout(()=>addCardSilhouette(stage),2300);
  setTimeout(()=>finishEffect(done),3500);
}

function playChestStars(stage,done){
  const chest = document.createElement("div");
  chest.className = "chest";
  chest.innerHTML = '<div class="chestLight"></div><div class="chestLid"></div><div class="chestBody"></div>';
  stage.appendChild(chest);
  addManyStars(stage,22,1.2);
  setTimeout(()=>addCardSilhouette(stage),2500);
  setTimeout(()=>finishEffect(done),3900);
}

function playMoonCat(stage,done){
  const moon = document.createElement("div");
  moon.className = "moon";
  stage.appendChild(moon);
  setTimeout(()=>stage.appendChild(makeCat("catDash2")),450);
  addManyStars(stage,26,1.5);
  setTimeout(()=>addCardSilhouette(stage),2600);
  setTimeout(()=>finishEffect(done),4000);
}

function playPawRing(stage,done){
  addManyPaws(stage,18,1.2);
  const ring = document.createElement("div");
  ring.className = "magicRing";
  stage.appendChild(ring);
  setTimeout(()=>addCardSilhouette(stage),2450);
  setTimeout(()=>finishEffect(done),3800);
}

function playStarRainCard(stage,done){
  addManyStars(stage,42,1.8);
  const ring = document.createElement("div");
  ring.className = "magicRing";
  stage.appendChild(ring);
  setTimeout(()=>addCardSilhouette(stage),2350);
  setTimeout(()=>finishEffect(done),3800);
}

function playDoubleCat(stage,done){
  stage.appendChild(makeCat("catDash1"));
  setTimeout(()=>stage.appendChild(makeCat("catDash2")),500);
  addManyPaws(stage,12,1.0);
  addManyStars(stage,24,1.4);
  setTimeout(()=>addCardSilhouette(stage),2600);
  setTimeout(()=>finishEffect(done),4100);
}

function playSecretEffect(stage,done){
  const effect = document.getElementById("effect");
  effect.classList.add("secretMode");

  const aura = document.createElement("div");
  aura.className = "secretAura";
  stage.appendChild(aura);

  const bolt = document.createElement("div");
  bolt.className = "lightning";
  stage.appendChild(bolt);

  const ring = document.createElement("div");
  ring.className = "magicRing";
  stage.appendChild(ring);

  setTimeout(()=>stage.appendChild(makeCat("catDash1")),350);
  setTimeout(()=>stage.appendChild(makeCat("catDash2")),850);

  addManyStars(stage,60,2.3);
  addManyPaws(stage,24,1.8);

  setTimeout(()=>addCardSilhouette(stage),3300);
  setTimeout(()=>finishEffect(done),5000);
}

function finishEffect(done){
  const effect = document.getElementById("effect");
  effect.classList.add("openFlash");
  setTimeout(()=>{
    hideEffect();
    done();
  },850);
}

function hideEffect(){
  const effect = document.getElementById("effect");
  effect.style.display = "none";
  effect.className = "";
  document.getElementById("effectStage").innerHTML = "";
}

function makeCat(extraClass){
  const cat = document.createElement("div");
  cat.className = "cssCat " + extraClass;
  cat.innerHTML =
    '<div class="catTail"></div>' +
    '<div class="catBody"></div>' +
    '<div class="catHead"></div>' +
    '<div class="catEar ear1"></div>' +
    '<div class="catEar ear2"></div>' +
    '<div class="catEye"></div>' +
    '<div class="catLeg leg1"></div>' +
    '<div class="catLeg leg2"></div>' +
    '<div class="catLeg leg3"></div>' +
    '<div class="catLeg leg4"></div>';
  return cat;
}

function addManyPaws(stage,count,maxDelay){
  for(let i=0;i<count;i++){
    const paw = document.createElement("div");
    paw.className = "paw";
    paw.style.left = (5 + Math.random()*85) + "%";
    paw.style.top = (8 + Math.random()*72) + "%";
    paw.style.animationDelay = (Math.random()*maxDelay) + "s";
    paw.style.transform = "rotate(" + (Math.random()*80-40) + "deg)";
    stage.appendChild(paw);
  }
}

function addManyStars(stage,count,maxDelay){
  for(let i=0;i<count;i++){
    const star = document.createElement("div");
    star.className = "star";
    star.style.left = (Math.random()*100) + "%";
    star.style.top = (-12 - Math.random()*30) + "%";
    star.style.animationDelay = (Math.random()*maxDelay) + "s";
    stage.appendChild(star);
  }
}

function addCardSilhouette(stage){
  const c = document.createElement("div");
  c.className = "cardSilhouette";
  stage.appendChild(c);
}

function showResult(res){
  const result = document.getElementById("result");
  result.className = res.secret ? "secretResult" : "";
  document.getElementById("resultImg").src = res.imageUrl;
  document.getElementById("resultName").textContent = res.name;
  document.getElementById("resultMsg").textContent =
    res.secret ? "🌟 SECRET SEAL GET！！" :
    res.isNew ? "🎉 NEW SEAL GET！！" : "また会えたね！";
  result.style.display = "flex";
}

function closeResult(){
  document.getElementById("result").style.display = "none";
}

async function loadCollection(){
  if(!profile.userId){
    alert("LINE名を確認中です。少し待ってから押してください。");
    return;
  }

  try{
    const res = await jsonp({
      action:"collection",
      userId:profile.userId
    });

    if(!res || res.ok === false){
      alert(res && res.message ? res.message : "図鑑を読み込めませんでした。");
      return;
    }

    renderCollection(res.cards || []);

  }catch(e){
    alert("図鑑の通信エラーが出ました。");
  }
}

function renderCollection(cards){
  const list = document.getElementById("collectionList");
  list.innerHTML = "";

  if(cards.length === 0){
    list.innerHTML = "<div>まだシールがありません</div>";
  }else{
    cards.forEach(function(card){
      const div = document.createElement("div");
      div.className = card.secret ? "cardMini secretMini" : "cardMini";
      div.innerHTML =
        '<img src="' + escapeHtml(card.imageUrl) + '">' +
        '<div>' + escapeHtml(card.name) + '</div>' +
        '<div>' + escapeHtml(card.joinDate || "") + '</div>';
      list.appendChild(div);
    });
  }

  document.getElementById("collection").style.display = "block";
}

function closeCollection(){
  document.getElementById("collection").style.display = "none";
}

function escapeHtml(str){
  return String(str || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}
</script>
