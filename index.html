<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>🐈‍⬛ クロネコガチャ Ver.3.0</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;width:100%;min-height:100%;background:#020617;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;overflow-x:hidden;}
body{min-height:100svh;background:radial-gradient(circle at 50% 0%,#17345a 0%,#07111f 42%,#020617 100%);}
button{font-family:inherit;cursor:pointer;}
#app{position:relative;width:100%;max-width:520px;margin:0 auto;min-height:100svh;padding:16px 16px 28px;overflow:hidden;}
#app:before{content:"";position:absolute;inset:-20%;background:radial-gradient(circle at 20% 18%,rgba(250,204,21,.13),transparent 22%),radial-gradient(circle at 84% 35%,rgba(56,189,248,.12),transparent 24%),radial-gradient(circle at 50% 85%,rgba(244,114,182,.09),transparent 26%);pointer-events:none;animation:bgFloat 8s ease-in-out infinite alternate;}
@keyframes bgFloat{from{transform:translateY(-8px)}to{transform:translateY(10px)}}
#soundToggle{position:fixed;left:14px;top:calc(env(safe-area-inset-top) + 14px);z-index:50;border:1px solid rgba(250,204,21,.35);border-radius:999px;padding:10px 14px;background:rgba(2,6,23,.72);backdrop-filter:blur(10px);color:#facc15;font-size:16px;font-weight:900;box-shadow:0 0 18px rgba(250,204,21,.22);}
.header{position:relative;text-align:center;padding-top:58px;}
.logo{font-size:54px;filter:drop-shadow(0 0 14px rgba(250,204,21,.45));animation:catBob 2.4s ease-in-out infinite;}
@keyframes catBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
h1{margin:8px 0 4px;font-size:30px;line-height:1.1;color:#f8fafc;text-shadow:0 0 16px rgba(250,204,21,.35);letter-spacing:.02em;}
.ver{display:inline-block;margin-top:4px;padding:4px 12px;border-radius:999px;background:linear-gradient(135deg,rgba(250,204,21,.22),rgba(56,189,248,.16));color:#fde68a;font-size:13px;font-weight:900;border:1px solid rgba(250,204,21,.22);}
#topSpeechText{position:relative;margin:22px auto 14px;width:min(94%,390px);padding:17px 15px;border-radius:22px;background:rgba(15,23,42,.72);border:1px solid rgba(255,255,255,.12);box-shadow:0 14px 36px rgba(0,0,0,.32),inset 0 0 0 1px rgba(250,204,21,.08);text-align:center;}
#topSpeechLine1{font-size:20px;font-weight:900;color:#facc15;text-shadow:0 0 10px rgba(250,204,21,.45);}
#topSpeechLine2{margin-top:6px;font-size:14px;font-weight:800;color:#fff7d6;line-height:1.45;}
.mainCard{position:relative;margin:18px auto 0;width:min(94%,390px);padding:22px 16px 18px;border-radius:30px;background:linear-gradient(180deg,rgba(15,23,42,.86),rgba(2,6,23,.88));border:1px solid rgba(255,255,255,.12);box-shadow:0 20px 50px rgba(0,0,0,.42),0 0 30px rgba(56,189,248,.10);overflow:hidden;}
.mainCard:before{content:"";position:absolute;inset:-80px;background:conic-gradient(from 0deg,transparent,rgba(250,204,21,.13),transparent,rgba(56,189,248,.12),transparent);animation:spin 7s linear infinite;opacity:.75;}
.mainCard>*{position:relative;}
@keyframes spin{to{transform:rotate(360deg)}}
.gachaMachine{width:210px;height:210px;margin:0 auto 16px;position:relative;border-radius:50%;background:radial-gradient(circle at 50% 40%,#fef3c7 0 16%,#facc15 17% 31%,#b45309 32% 36%,#111827 37% 100%);box-shadow:0 0 0 10px rgba(250,204,21,.12),0 0 40px rgba(250,204,21,.28),inset 0 -16px 28px rgba(0,0,0,.45);}
.gachaMachine:before{content:"?";position:absolute;left:50%;top:45%;transform:translate(-50%,-50%);width:76px;height:76px;border-radius:22px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#38bdf8,#1d4ed8);color:#fff;font-size:45px;font-weight:900;box-shadow:0 0 22px rgba(56,189,248,.75);}
.gachaMachine:after{content:"🐾";position:absolute;left:50%;bottom:18px;transform:translateX(-50%);font-size:30px;filter:drop-shadow(0 0 8px rgba(250,204,21,.55));}
#statusText{min-height:48px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:16px;font-weight:900;color:#fff7d6;line-height:1.45;text-shadow:0 0 10px rgba(250,204,21,.3);}
.actionRow{display:grid;grid-template-columns:1fr;gap:12px;margin-top:12px;}
#drawBtn,#collectionBtn{width:100%;border:0;border-radius:999px;padding:17px 12px;font-size:21px;font-weight:1000;box-shadow:0 12px 26px rgba(0,0,0,.32);}
#drawBtn{background:linear-gradient(135deg,#facc15,#fb923c,#f97316);color:#3b2408;animation:drawPulse 1.8s ease-in-out infinite;}
#collectionBtn{background:linear-gradient(135deg,#38bdf8,#2563eb);color:#fff;}
@keyframes drawPulse{0%,100%{transform:scale(1);box-shadow:0 12px 26px rgba(0,0,0,.32),0 0 0 rgba(250,204,21,0)}50%{transform:scale(1.025);box-shadow:0 16px 30px rgba(0,0,0,.36),0 0 24px rgba(250,204,21,.35)}}
#drawBtn:disabled{opacity:.55;animation:none;}
.notice{margin:16px auto 0;width:min(94%,390px);font-size:12px;line-height:1.55;color:#cbd5e1;text-align:center;opacity:.92;}
#pressFx{display:none;position:fixed;inset:0;z-index:95;background:rgba(2,6,23,.42);pointer-events:none;}
#pressFx:after{content:"抽選中…";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:24px;font-weight:1000;color:#facc15;text-shadow:0 0 18px #facc15;}
#effect{position:fixed;inset:0;z-index:100;display:none;background:radial-gradient(circle at 50% 45%,#172554 0%,#020617 58%,#000 100%);overflow:hidden;touch-action:none;}
#effectStage{position:absolute;inset:0;overflow:hidden;}
.skipHint{position:absolute;right:14px;top:calc(env(safe-area-inset-top) + 14px);z-index:6;padding:8px 12px;border-radius:999px;background:rgba(15,23,42,.65);border:1px solid rgba(255,255,255,.14);font-size:12px;font-weight:900;color:#cbd5e1;}
.fxText{position:absolute;left:0;right:0;top:20%;z-index:4;text-align:center;font-size:21px;font-weight:1000;color:#fde68a;text-shadow:0 0 15px rgba(250,204,21,.75),0 3px 0 rgba(0,0,0,.45);animation:textPop .62s ease both;}
@keyframes textPop{from{opacity:0;transform:translateY(18px) scale(.88)}to{opacity:1;transform:none}}
.gachaBall{position:absolute;left:50%;top:-120px;width:112px;height:112px;margin-left:-56px;border-radius:50%;background:radial-gradient(circle at 35% 28%,#fff7ed 0 9%,#fde68a 10% 23%,#f97316 24% 52%,#7c2d12 53% 100%);box-shadow:0 0 30px rgba(250,204,21,.55),inset 0 -14px 24px rgba(0,0,0,.36);animation:ballDrop 1.9s cubic-bezier(.2,.82,.22,1) forwards;}
.gachaBall:after{content:"🐾";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:34px;filter:drop-shadow(0 0 8px rgba(255,255,255,.6));}
@keyframes ballDrop{0%{top:-120px;transform:scale(.8) rotate(0deg)}54%{top:52%;transform:scale(1) rotate(460deg)}70%{top:43%;transform:scale(1.05,.92) rotate(530deg)}84%{top:50%;transform:scale(.96,1.05) rotate(600deg)}100%{top:48%;transform:scale(1) rotate(650deg)}}
.impactRing{position:absolute;left:50%;top:56%;width:24px;height:24px;border:3px solid rgba(250,204,21,.8);border-radius:50%;transform:translate(-50%,-50%);animation:ring 1.0s ease-out forwards;}
@keyframes ring{to{width:420px;height:420px;opacity:0;border-width:1px}}
.particle{position:absolute;width:7px;height:7px;border-radius:50%;background:#facc15;box-shadow:0 0 14px #facc15;animation:particle 1.4s ease-out forwards;}
@keyframes particle{to{transform:translate(var(--x),var(--y)) scale(.2);opacity:0}}
.flash{position:absolute;inset:0;background:#fff;opacity:0;animation:flash .62s ease-out forwards;}
@keyframes flash{0%{opacity:0}32%{opacity:.86}100%{opacity:0}}
.cardSilhouette{position:absolute;left:50%;top:50%;width:174px;height:236px;margin:-118px 0 0 -87px;border-radius:18px;background:linear-gradient(135deg,#020617,#111827);border:2px solid rgba(250,204,21,.7);box-shadow:0 0 26px rgba(250,204,21,.55);animation:sil 1.2s ease-in-out infinite alternate;}
.cardSilhouette:before{content:"?";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:82px;font-weight:1000;color:#facc15;text-shadow:0 0 18px #facc15;}
@keyframes sil{from{filter:brightness(.7);transform:scale(.96) rotateY(-9deg)}to{filter:brightness(1.18);transform:scale(1.02) rotateY(9deg)}}
.cardBurst{position:absolute;left:50%;top:50%;width:190px;height:258px;margin:-129px 0 0 -95px;border-radius:20px;background:linear-gradient(135deg,#fff7ed,#facc15 38%,#fb923c 64%,#7c2d12);box-shadow:0 0 38px rgba(250,204,21,.85),0 0 90px rgba(249,115,22,.42);animation:burst .98s cubic-bezier(.2,1.35,.25,1) forwards;}
.cardBurst:before{content:"NEW SEAL";position:absolute;left:10px;right:10px;top:22px;text-align:center;font-size:22px;font-weight:1000;color:#3b2408;}
.cardBurst:after{content:"🐈‍⬛";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:70px;filter:drop-shadow(0 0 12px rgba(255,255,255,.75));}
@keyframes burst{0%{opacity:0;transform:scale(.2) rotateY(760deg)}65%{opacity:1;transform:scale(1.18) rotateY(0deg)}100%{opacity:1;transform:scale(1) rotateY(0deg)}}
.secretMode{background:radial-gradient(circle at 50% 38%,#581c87 0%,#111827 45%,#000 100%)!important;}
.secretMode .gachaBall{background:conic-gradient(from 0deg,#facc15,#f472b6,#38bdf8,#a78bfa,#facc15);box-shadow:0 0 44px rgba(244,114,182,.85),0 0 90px rgba(56,189,248,.38);}
.secretTitle{position:absolute;left:0;right:0;top:31%;text-align:center;font-size:48px;font-weight:1000;letter-spacing:.08em;color:#fff;text-shadow:0 0 18px #facc15,0 0 36px #f472b6;animation:secretTitle .9s ease both;}
@keyframes secretTitle{from{opacity:0;transform:scale(.45);filter:blur(10px)}to{opacity:1;transform:scale(1);filter:blur(0)}}
.rainbowAura{position:absolute;left:50%;top:50%;width:330px;height:330px;margin:-165px 0 0 -165px;border-radius:50%;background:conic-gradient(#facc15,#f472b6,#38bdf8,#22c55e,#facc15);filter:blur(22px);opacity:.55;animation:spin 1.4s linear infinite;}
#result{position:fixed;inset:0;z-index:120;display:none;align-items:center;justify-content:center;flex-direction:column;padding:22px;background:radial-gradient(circle at 50% 30%,rgba(250,204,21,.20),rgba(2,6,23,.96) 62%,#000 100%);text-align:center;}
#resultImg{width:min(88vw,390px);max-height:62svh;object-fit:contain;border-radius:20px;background:white;box-shadow:0 0 34px rgba(250,204,21,.82),0 0 80px rgba(250,204,21,.32);animation:resultPop .38s ease both;}
@keyframes resultPop{from{opacity:0;transform:scale(.82)}to{opacity:1;transform:scale(1)}}
#resultName{margin-top:16px;font-size:28px;font-weight:1000;color:#facc15;text-shadow:0 0 14px rgba(250,204,21,.75);}
#resultMsg{margin-top:8px;font-size:15px;font-weight:800;color:#fff7d6;line-height:1.5;}
#closeResult,#closeCollection,#zoomClose{margin-top:18px;border:0;border-radius:999px;padding:13px 30px;background:linear-gradient(135deg,#facc15,#fb923c);color:#3b2408;font-size:17px;font-weight:1000;box-shadow:0 10px 24px rgba(0,0,0,.32);}
#collection{position:fixed;inset:0;z-index:110;display:none;overflow:auto;padding:calc(env(safe-area-inset-top) + 18px) 14px 26px;background:linear-gradient(180deg,#020617,#0f172a);}
#collection h2{text-align:center;color:#facc15;text-shadow:0 0 12px rgba(250,204,21,.55);}
#collectionInfo{text-align:center;color:#fff7d6;font-weight:900;margin:-4px 0 12px;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:560px;margin:0 auto;}
.cardMini{border-radius:14px;background:rgba(15,23,42,.78);border:1px solid rgba(255,255,255,.10);padding:7px;text-align:center;min-height:164px;box-shadow:0 8px 22px rgba(0,0,0,.24);}
.cardMini.owned{border-color:rgba(250,204,21,.38);}
.cardMini.secretMini{background:linear-gradient(135deg,rgba(250,204,21,.18),rgba(147,51,234,.24));box-shadow:0 0 18px rgba(250,204,21,.24);}
.cardMini img{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:10px;background:white;}
.cardMini .unknown{width:100%;aspect-ratio:3/4;border-radius:10px;display:flex;align-items:center;justify-content:center;background:#111827;color:#93c5fd;font-size:34px;font-weight:1000;}
.cardMiniName{margin-top:5px;font-size:12px;font-weight:900;color:#fff;line-height:1.25;word-break:break-word;}
.cardMiniDate{margin-top:2px;font-size:10px;color:#cbd5e1;}
.cardMini img.kuroRetryImg{object-fit:contain;background:radial-gradient(circle at 50% 45%,rgba(250,204,21,.16),transparent 42%),linear-gradient(135deg,rgba(15,23,42,.96),rgba(2,6,23,.96));}
#sealZoom{position:fixed;inset:0;z-index:130;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(0,0,0,.92);padding:18px;}
#zoomImg{width:min(92vw,430px);max-height:72svh;object-fit:contain;border-radius:18px;background:white;box-shadow:0 0 38px #facc15,0 0 70px rgba(250,204,21,.45);}
#zoomName{margin-top:14px;color:#facc15;font-size:25px;font-weight:1000;text-shadow:0 0 12px #facc15;text-align:center;}
#maintenanceOverlay{position:fixed;inset:0;z-index:500;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,.88);color:white;text-align:center;}
#maintenanceOverlay.show{display:flex;}
.maintenanceBox{width:min(92%,380px);padding:24px 18px;border-radius:24px;background:linear-gradient(180deg,rgba(15,23,42,.98),rgba(2,6,23,.98));box-shadow:0 0 28px rgba(250,204,21,.35),inset 0 0 0 1px rgba(255,255,255,.12);}
.maintenanceTitle{color:#facc15;font-size:24px;font-weight:1000;margin-bottom:12px;text-shadow:0 0 12px rgba(250,204,21,.65);}
.maintenanceMsg{color:#fff7d6;font-size:15px;font-weight:800;line-height:1.6;}
@media (max-width:380px){h1{font-size:26px}.gachaMachine{width:185px;height:185px}.grid{gap:8px}.cardMini{padding:6px;min-height:150px}}
</style>
</head>
<body>
<button id="soundToggle" onclick="toggleSound()">🔊 ON</button>
<div id="app">
  <div class="header">
    <div class="logo">🐈‍⬛</div>
    <h1>クロネコガチャ</h1>
    <div class="ver">Ver.3.0 完全修正版</div>
  </div>
  <div id="topSpeechText">
    <div id="topSpeechLine1">クロネコガチャへようこそ！</div>
    <div id="topSpeechLine2">今日も素敵な出会いがあるよ♪</div>
  </div>
  <div class="mainCard">
    <div class="gachaMachine"></div>
    <div id="statusText">✨ ガチャを読み込み中...</div>
    <div class="actionRow">
      <button id="drawBtn" onclick="drawGacha()">🐾 ガチャを引く</button>
      <button id="collectionBtn" onclick="loadCollection()">📚 シール図鑑を見る</button>
    </div>
  </div>
  <div class="notice">※引いたシール画像の投稿は控えてください。まだ引いていない方の楽しみを守るため、ご協力お願いします。</div>
</div>
<div id="pressFx"></div>
<div id="effect"><div id="effectStage"></div></div>
<div id="result">
  <img id="resultImg" alt="獲得シール">
  <div id="resultName"></div>
  <div id="resultMsg"></div>
  <button id="closeResult" onclick="closeResult()">閉じる</button>
</div>
<div id="collection">
  <h2>📚 シール図鑑</h2>
  <div id="collectionInfo"></div>
  <div id="collectionList" class="grid"></div>
  <button id="closeCollection" onclick="closeCollection()">図鑑を閉じる</button>
</div>
<div id="sealZoom" onclick="closeSealZoom()">
  <img id="zoomImg" onclick="event.stopPropagation()" alt="拡大シール">
  <div id="zoomName"></div>
  <button id="zoomClose" onclick="closeSealZoom()">閉じる</button>
</div>
<script>
const LIFF_ID = "2010515194-r0gV3TRC";
const API_URL = "https://script.google.com/macros/s/AKfycbxQ32wEkjNf0TG1DBK_MYDYS8GkkBLTA_WIz-mgurf_O-hd3ugpYRbb0e-14Fs7Ctk5/exec";
let profile = { userId:"", displayName:"" };
let drawing = false;
let soundEnabled = true;
try{ soundEnabled = localStorage.getItem("kuronekoSound") !== "off"; }catch(e){}

window.addEventListener("load", initApp);
function initApp(){
  initSoundButton();
  setTopSpeech();
  initLiff();
}
async function initLiff(){
  try{
    if(typeof liff === "undefined") throw new Error("LIFF SDKが読み込めませんでした");
    await liff.init({ liffId: LIFF_ID });
    if(!liff.isLoggedIn()){ liff.login(); return; }
    const p = await liff.getProfile();
    profile.userId = p.userId || "";
    profile.displayName = p.displayName || "ゲスト";
    setReadyStatus();
  }catch(e){
    console.error(e);
    setStatus("⚠️ LINE内から開くとガチャが使えます");
  }
}
function setTopSpeech(){
  const messages = [
    ["クロネコガチャへようこそ！","今日も素敵な出会いがあるよ♪"],
    ["今日の運試し、してみる？","クロネコがシールを運ぶよ♪"],
    ["本日のガチャ開催中！","図鑑コンプリートを目指そう♪"],
    ["どのシールに出会えるかな？","ワクワクしながら引いてみよう♪"],
    ["シークレットの気配…？","出たらかなりラッキー♪"]
  ];
  const m = messages[Math.floor(Math.random()*messages.length)];
  const l1 = document.getElementById("topSpeechLine1");
  const l2 = document.getElementById("topSpeechLine2");
  if(l1) l1.textContent = m[0];
  if(l2) l2.textContent = m[1];
}
function setStatus(text){ const el=document.getElementById("statusText"); if(el) el.textContent=text; }
function setReadyStatus(){ setStatus("✨ " + (profile.displayName || "ゲスト") + "さん、今日のガチャを引けます"); }
function setDoneStatus(){ setStatus("✅ " + (profile.displayName || "ゲスト") + "さん、本日分は受け取り済みです"); }
function showPressFx(){ const el=document.getElementById("pressFx"); if(el) el.style.display="block"; }
function hidePressFx(){ const el=document.getElementById("pressFx"); if(el) el.style.display="none"; }
function initSoundButton(){ const b=document.getElementById("soundToggle"); if(b) b.textContent = soundEnabled ? "🔊 ON" : "🔇 OFF"; }
function toggleSound(){ soundEnabled=!soundEnabled; try{localStorage.setItem("kuronekoSound",soundEnabled?"on":"off");}catch(e){} initSoundButton(); if(soundEnabled) playSfx("sparkle"); }
function playSfx(type){
  if(!soundEnabled) return;
  try{
    const C=window.AudioContext||window.webkitAudioContext; if(!C) return;
    const ctx=new C(), gain=ctx.createGain(), osc=ctx.createOscillator();
    gain.connect(ctx.destination); osc.connect(gain);
    let f=660,d=.12,w="sine";
    if(type==="boom"){f=92;d=.22;w="sawtooth";} if(type==="secret"){f=1240;d=.28;w="square";} if(type==="paw"){f=210;d=.08;w="triangle";} if(type==="sparkle"){f=980;d=.15;w="sine";}
    osc.type=w; osc.frequency.setValueAtTime(f,ctx.currentTime);
    gain.gain.setValueAtTime(.0001,ctx.currentTime); gain.gain.exponentialRampToValueAtTime(.12,ctx.currentTime+.02); gain.gain.exponentialRampToValueAtTime(.0001,ctx.currentTime+d);
    osc.start(); osc.stop(ctx.currentTime+d+.03); setTimeout(()=>{try{ctx.close()}catch(e){}},450);
  }catch(e){}
}
function vib(p){ try{ if(navigator.vibrate) navigator.vibrate(p||[40]); }catch(e){} }
function jsonp(params){
  return new Promise((resolve,reject)=>{
    const cb="cb_"+Date.now()+"_"+Math.floor(Math.random()*99999);
    params.callback=cb;
    const s=document.createElement("script");
    const timer=setTimeout(()=>{cleanup(); reject(new Error("通信タイムアウト"));},15000);
    function cleanup(){clearTimeout(timer); try{delete window[cb];}catch(e){window[cb]=undefined;} if(s.parentNode) s.parentNode.removeChild(s);}
    window[cb]=function(data){cleanup(); resolve(data);};
    s.onerror=function(){cleanup(); reject(new Error("通信失敗"));};
    s.src=API_URL+"?"+new URLSearchParams(params).toString();
    document.body.appendChild(s);
  });
}
function normalizeCard(res){
  const c = (res && (res.card || res.result || res.data)) || res || {};
  return {
    name: c.name || c.cardName || c.realName || res.cardName || res.name || "シール",
    imageUrl: c.imageUrl || c.image || c.url || res.imageUrl || res.image || "",
    joinDate: c.joinDate || res.joinDate || "",
    secret: !!(c.secret || res.secret || c.type === "secret" || res.type === "secret")
  };
}
async function drawGacha(){
  if(drawing) return;
  if(!profile.userId){ alert("LINE名を確認中です。少し待ってから押してください。"); return; }
  drawing=true; const btn=document.getElementById("drawBtn"); if(btn) btn.disabled=true;
  setStatus("⏳ 抽選中..."); showPressFx(); playSfx("paw"); vib([25]);
  try{
    const res=await jsonp({action:"draw",userId:profile.userId,displayName:profile.displayName});
    hidePressFx();
    if(!res || !res.ok){ alert((res && res.message) || "ガチャに失敗しました"); if(res && /本日|今日|回数|済/.test(String(res.message||""))) setDoneStatus(); return; }
    await playGachaEffect(res);
    showResult(res);
    setDoneStatus();
  }catch(e){ console.error(e); hidePressFx(); alert("通信に失敗しました。少し時間を置いて再度お試しください。"); }
  finally{ drawing=false; if(btn) btn.disabled=false; }
}
function playGachaEffect(res){
  return new Promise(resolve=>{
    const card=normalizeCard(res), secret=card.secret;
    const effect=document.getElementById("effect"), stage=document.getElementById("effectStage");
    if(!effect || !stage){ resolve(); return; }
    effect.className=secret?"secretMode":""; stage.innerHTML=""; effect.style.display="block";
    stage.appendChild(el("div","skipHint","長押しでスキップ"));
    let done=false, pressTimer=null, timers=[];
    function later(fn,ms){ const t=setTimeout(()=>{ if(!done) fn(); },ms); timers.push(t); }
    function finish(){ if(done) return; done=true; timers.forEach(clearTimeout); effect.onpointerdown=null; effect.onpointerup=null; effect.onpointercancel=null; effect.style.display="none"; stage.innerHTML=""; resolve(); }
    effect.onpointerdown=()=>{ pressTimer=setTimeout(finish,650); };
    effect.onpointerup=()=>{ if(pressTimer) clearTimeout(pressTimer); };
    effect.onpointercancel=()=>{ if(pressTimer) clearTimeout(pressTimer); };
    if(secret){ playSfx("secret"); vib([70,35,100,35,140]); }
    else{ playSfx("sparkle"); vib([35]); }
    later(()=>stage.appendChild(el("div","fxText", secret?"空気が変わった…":"今日のシールを召喚中…")),80);
    later(()=>stage.appendChild(el("div","gachaBall")),460);
    later(()=>{stage.appendChild(el("div","impactRing")); playSfx("boom"); vib(secret?[80,30,120]:[45]);},2050);
    later(()=>particles(stage, secret?74:42),2130);
    later(()=>stage.appendChild(el("div","cardSilhouette")),2600);
    if(secret) later(()=>stage.appendChild(el("div","secretTitle","SECRET")),2950);
    if(secret) later(()=>stage.appendChild(el("div","rainbowAura")),3350);
    later(()=>stage.appendChild(el("div","flash")),3600);
    later(()=>{stage.appendChild(el("div","cardBurst")); playSfx(secret?"secret":"sparkle");},3920);
    later(finish, secret?5350:4850);
  });
}
function el(tag,cls,txt){ const e=document.createElement(tag); if(cls)e.className=cls; if(txt)e.textContent=txt; return e; }
function particles(stage,n){
  for(let i=0;i<n;i++){
    const p=el("div","particle"); p.style.left="50%"; p.style.top="54%";
    const a=Math.random()*Math.PI*2, r=80+Math.random()*230;
    p.style.setProperty("--x",Math.cos(a)*r+"px"); p.style.setProperty("--y",Math.sin(a)*r+"px");
    p.style.animationDelay=(Math.random()*.18)+"s"; stage.appendChild(p);
  }
}
function showResult(res){
  const card=normalizeCard(res), box=document.getElementById("result"), img=document.getElementById("resultImg"), name=document.getElementById("resultName"), msg=document.getElementById("resultMsg");
  if(img){ img.src=card.imageUrl || ""; img.style.display=card.imageUrl?"block":"none"; }
  if(name) name.textContent=(card.secret?"✨ SECRET ✨ ":"")+card.name;
  if(msg) msg.textContent=card.joinDate ? "入団日：" + card.joinDate : "図鑑に登録されました";
  if(box) box.style.display="flex";
}
function closeResult(){ const box=document.getElementById("result"); if(box) box.style.display="none"; }
async function loadCollection(){
  if(!profile.userId){ alert("LINE名を確認中です。少し待ってから押してください。"); return; }
  setStatus("📚 図鑑を読み込み中..."); playSfx("sparkle");
  try{
    const data=await jsonp({action:"collection",userId:profile.userId,displayName:profile.displayName});
    if(!data || !data.ok){ alert((data && data.message) || "図鑑の取得に失敗しました"); return; }
    renderCollection(data);
    document.getElementById("collection").style.display="block";
    setReadyStatus();
  }catch(e){ console.error(e); alert("図鑑の通信に失敗しました"); }
}
function renderCollection(data){
  const list=document.getElementById("collectionList"), info=document.getElementById("collectionInfo");
  if(!list) return; list.innerHTML="";
  const cards=(data.cards||[]).slice().sort((a,b)=>Number(a.sortNo||999999)-Number(b.sortNo||999999));
  const owned=Number(data.ownedCount||cards.filter(c=>c.owned).length||0), total=Number(data.totalCount||cards.length||0);
  if(info) info.textContent="通常図鑑 収集率 " + (total?Math.floor(owned/total*100):0) + "%（"+owned+"/"+total+"）";
  cards.forEach(c=>{
    const ownedFlag=!!(c.owned || c.imageUrl);
    const item=el("div","cardMini " + (ownedFlag?"owned ":"") + ((c.secret||c.type==="secret")?"secretMini":""));
    if(ownedFlag && c.imageUrl){
      const im=document.createElement("img"); im.src=c.imageUrl; im.alt=c.name||c.realName||"シール"; im.onerror=function(){this.classList.add("kuroRetryImg");}; im.onclick=function(ev){ev.stopPropagation(); openSealZoom(c.imageUrl,c.name||c.realName||"シール");}; item.appendChild(im);
    }else{ item.appendChild(el("div","unknown","?")); }
    item.appendChild(el("div","cardMiniName", ownedFlag?(c.name||c.realName||"シール"):"？？？"));
    if(c.joinDate) item.appendChild(el("div","cardMiniDate",c.joinDate));
    list.appendChild(item);
  });
}
function closeCollection(){ const c=document.getElementById("collection"); if(c) c.style.display="none"; }
function openSealZoom(src,name){ const z=document.getElementById("sealZoom"), im=document.getElementById("zoomImg"), nm=document.getElementById("zoomName"); if(im) im.src=src; if(nm) nm.textContent=name||"シール"; if(z) z.style.display="flex"; }
function closeSealZoom(){ const z=document.getElementById("sealZoom"); if(z) z.style.display="none"; }
function ensureMaintenanceOverlay(){
  let ov=document.getElementById("maintenanceOverlay"); if(ov) return ov;
  ov=document.createElement("div"); ov.id="maintenanceOverlay";
  ov.innerHTML='<div class="maintenanceBox"><div class="maintenanceTitle">🛠 メンテナンス中</div><div class="maintenanceMsg" id="maintenanceMsg">ただいまアップデート中です。少し待ってにゃー🐾</div></div>';
  document.body.appendChild(ov); return ov;
}
window.kuronekoShowMaintenance=function(message){ const ov=ensureMaintenanceOverlay(); const msg=document.getElementById("maintenanceMsg"); if(msg) msg.textContent=message||"ただいまアップデート中です。少し待ってにゃー🐾"; ov.classList.add("show"); };
</script>
