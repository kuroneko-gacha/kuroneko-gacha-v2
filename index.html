<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>クロネコガチャ v2</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
      color: #fff3c4;
      background:
        radial-gradient(circle at top, rgba(255, 215, 90, 0.28), transparent 35%),
        radial-gradient(circle at center, rgba(255, 190, 40, 0.14), transparent 42%),
        linear-gradient(180deg, #050505 0%, #14100a 45%, #050505 100%);
      overflow-x: hidden;
    }

    .app {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      margin: 0 auto;
      padding: 26px 18px 34px;
      position: relative;
      text-align: center;
    }

    .sparkle {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(255, 235, 150, .9) 0 1px, transparent 2px),
        radial-gradient(circle, rgba(255, 200, 70, .7) 0 1px, transparent 2px);
      background-size: 60px 60px, 95px 95px;
      animation: twinkle 4s infinite linear;
      opacity: .5;
    }

    @keyframes twinkle {
      from { transform: translateY(0); opacity: .35; }
      50% { opacity: .7; }
      to { transform: translateY(20px); opacity: .35; }
    }

    .frame {
      border: 2px solid rgba(255, 205, 80, .65);
      border-radius: 28px;
      padding: 22px 14px 26px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(0,0,0,.18)),
        rgba(0,0,0,.38);
      box-shadow:
        0 0 22px rgba(255, 190, 40, .28),
        inset 0 0 22px rgba(255, 220, 120, .08);
    }

    .cat {
      width: 120px;
      height: 120px;
      margin: 0 auto 8px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 35%, #2d2d2d, #050505 70%);
      border: 2px solid #d9a93c;
      box-shadow: 0 0 26px rgba(255, 200, 80, .45);
      position: relative;
    }

    .cat:before,
    .cat:after {
      content: "";
      position: absolute;
      top: -15px;
      width: 42px;
      height: 42px;
      background: #050505;
      border-top: 2px solid #d9a93c;
      border-left: 2px solid #d9a93c;
      transform: rotate(45deg);
    }

    .cat:before {
      left: 18px;
    }

    .cat:after {
      right: 18px;
    }

    .eye {
      position: absolute;
      top: 43px;
      width: 24px;
      height: 30px;
      background: radial-gradient(circle at 35% 35%, #fff6b0, #d99a18 60%, #4b2b00);
      border-radius: 50%;
      box-shadow: 0 0 12px rgba(255, 210, 80, .8);
    }

    .eye.left { left: 31px; }
    .eye.right { right: 31px; }

    .nose {
      position: absolute;
      top: 76px;
      left: 50%;
      transform: translateX(-50%);
      width: 12px;
      height: 8px;
      background: #c48b2c;
      border-radius: 50%;
    }

    h1 {
      margin: 10px 0 8px;
      font-size: 40px;
      line-height: 1.15;
      color: #ffd66b;
      text-shadow:
        0 2px 0 #3b2500,
        0 0 14px rgba(255, 196, 60, .8);
      letter-spacing: 2px;
    }

    .sub-title {
      display: inline-block;
      margin: 8px auto 16px;
      padding: 8px 16px;
      border: 1px solid rgba(255, 220, 120, .65);
      border-radius: 999px;
      background: rgba(0,0,0,.35);
      font-size: 14px;
      color: #ffe9a3;
    }

    #status {
      min-height: 26px;
      margin: 16px 0 22px;
      font-size: 18px;
      color: #fff8dc;
    }

    .main-buttons {
      margin-top: 18px;
    }

    .btn {
      width: 100%;
      border: none;
      cursor: pointer;
      font-weight: 900;
      font-family: inherit;
      display: block;
      margin: 0 auto 18px;
    }

    .draw-btn {
      height: 116px;
      border-radius: 999px;
      font-size: 34px;
      color: #2b1700;
      background:
        radial-gradient(circle at 30% 25%, #fff4a6, transparent 30%),
        linear-gradient(180deg, #ffe680, #d99a18);
      border: 4px solid #fff0a8;
      box-shadow:
        0 10px 0 #7b4b00,
        0 0 34px rgba(255, 202, 70, .75);
      text-shadow: 0 1px 0 rgba(255,255,255,.6);
    }

    .draw-btn:active {
      transform: translateY(6px);
      box-shadow:
        0 4px 0 #7b4b00,
        0 0 24px rgba(255, 202, 70, .75);
    }

    .book-btn {
      height: 82px;
      border-radius: 26px;
      font-size: 30px;
      color: #fff1ba;
      background:
        linear-gradient(180deg, #282828, #101010);
      border: 2px solid rgba(255, 210, 90, .6);
      box-shadow:
        inset 0 0 18px rgba(255, 210, 90, .12),
        0 0 18px rgba(0,0,0,.8);
    }

    .notice {
      margin-top: 16px;
      padding: 11px;
      border-radius: 999px;
      border: 1px solid rgba(255, 215, 100, .55);
      color: #ffeab0;
      font-size: 14px;
      background: rgba(0,0,0,.38);
    }

    .card {
      display: none;
      margin: 24px auto 0;
      padding: 16px;
      max-width: 340px;
      border-radius: 24px;
      color: #1a1200;
      background: linear-gradient(180deg, #fff9dc, #fff);
      border: 4px solid #d6a333;
      box-shadow: 0 0 30px rgba(255, 205, 70, .55);
    }

    .rarity {
      font-size: 30px;
      font-weight: 900;
      color: #d69a16;
    }

    .card h2 {
      margin: 10px 0;
      font-size: 30px;
    }

    .card p {
      margin: 8px 0 14px;
      font-size: 18px;
    }

    .card img {
      width: 100%;
      border-radius: 18px;
      background: #ddd;
    }

    .collection {
      display: none;
      margin-top: 24px;
      padding: 16px;
      border-radius: 22px;
      background: rgba(0,0,0,.45);
      border: 1px solid rgba(255, 210, 90, .45);
    }

    .collection h2 {
      margin-top: 0;
      color: #ffd66b;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .mini {
      padding: 8px;
      border-radius: 14px;
      background: #171717;
      border: 1px solid rgba(255, 215, 100, .25);
      font-size: 12px;
      color: #fff0b0;
    }

    .mini img {
      width: 100%;
      border-radius: 10px;
      filter: brightness(.22);
    }

    .mini.owned img {
      filter: none;
    }

    .loading {
      animation: pulse 1s infinite alternate;
    }

    @keyframes pulse {
      from { opacity: .6; }
      to { opacity: 1; }
    }
  </style>
</head>

<body>
  <div class="sparkle"></div>

  <div class="app">
    <div class="frame">
      <div class="cat">
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="nose"></div>
      </div>

      <h1>クロネコ<br>ガチャ</h1>
      <div class="sub-title">黒猫が運ぶ、特別な出会い</div>

      <div id="status">LIFF準備中...</div>

      <div class="main-buttons">
        <button class="btn draw-btn" onclick="draw()">ガチャを引く</button>
        <button class="btn book-btn" onclick="loadCollection()">図鑑を見る</button>
      </div>

      <div class="notice">※ガチャは1日1回限定 / 朝8時リセット</div>
    </div>

    <div id="card" class="card">
      <div id="rarity" class="rarity"></div>
      <h2 id="cardName"></h2>
      <p id="joinDate"></p>
      <img id="cardImage">
    </div>

    <div id="collection" class="collection">
      <h2>図鑑</h2>
      <div id="grid" class="grid"></div>
    </div>
  </div>

  <script>
    const LIFF_ID = "2010515194-r0gV3TRC";
    const API_URL = "https://script.google.com/macros/s/AKfycbxQ32wEkjNf0TG1DBK_MYDYS8GkkBLTA_WIz-mgurf_O-hd3ugpYRbb0e-14Fs7Ctk5/exec";

    let profile = null;

    window.onload = async function () {
      const status = document.getElementById("status");

      try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        profile = await liff.getProfile();
        status.innerText = profile.displayName + " さん、ようこそ！";

      } catch (e) {
        status.innerText = "LIFF認証エラー：" + e.message;
      }
    };

    function callApi(params) {
      return new Promise((resolve, reject) => {
        const callbackName = "cb_" + Date.now();

        window[callbackName] = function(data) {
          delete window[callbackName];
          document.body.removeChild(script);
          resolve(data);
        };

        const query = new URLSearchParams({
          ...params,
          callback: callbackName
        });

        const script = document.createElement("script");
        script.src = API_URL + "?" + query.toString();
        script.onerror = reject;
        document.body.appendChild(script);
      });
    }

    async function draw() {
      if (!profile) {
        alert("LINE認証中です。少し待ってください。");
        return;
      }

      document.getElementById("status").innerText = "黒猫がシールを探しています...";
      document.getElementById("status").classList.add("loading");

      const data = await callApi({
        action: "draw",
        userId: profile.userId,
        displayName: profile.displayName
      });

      document.getElementById("status").classList.remove("loading");

      if (!data.ok) {
        alert(data.error);
        return;
      }

      if (data.already) {
        document.getElementById("status").innerText =
          "今日はすでに引いています。次は朝8時です。";
        return;
      }

      showCard(data.card);
      document.getElementById("status").innerText = "ガチャ結果！";
    }

    function showCard(card) {
      document.getElementById("collection").style.display = "none";

      document.getElementById("rarity").innerText = card.rarity;
      document.getElementById("cardName").innerText = card.name;
      document.getElementById("joinDate").innerText = "入団日：" + card.joinDate;
      document.getElementById("cardImage").src = card.imageUrl;

      document.getElementById("card").style.display = "block";
      document.getElementById("card").scrollIntoView({ behavior: "smooth" });
    }

    async function loadCollection() {
      if (!profile) {
        alert("LINE認証中です。少し待ってください。");
        return;
      }

      document.getElementById("status").innerText = "図鑑を読み込み中...";

      const data = await callApi({
        action: "collection",
        userId: profile.userId
      });

      if (!data.ok) {
        alert(data.error);
        return;
      }

      document.getElementById("card").style.display = "none";
      document.getElementById("collection").style.display = "block";

      const grid = document.getElementById("grid");
      grid.innerHTML = "";

      data.collection.forEach(card => {
        const div = document.createElement("div");
        div.className = "mini" + (card.owned ? " owned" : "");

        div.innerHTML = `
          <img src="${card.imageUrl}">
          <div>${card.owned ? card.name : "？？？"}</div>
          <div>${card.rarity}</div>
        `;

        grid.appendChild(div);
      });

      document.getElementById("status").innerText = "図鑑表示中";
      document.getElementById("collection").scrollIntoView({ behavior: "smooth" });
    }
  </script>
</body>
</html>
