.v30SecretMode #effectStage{background:radial-gradient(circle at 50% 45%,rgba(88,28,135,.8),#020617 55%,#000 100%);}.v30SecretMode .v30Title{font-size:23px;color:#fff;text-shadow:0 0 16px #f0abfc,0 0 38px #facc15;}.v30SecretGate{position:absolute;left:50%;top:50%;width:240px;height:240px;margin:-120px 0 0 -120px;border-radius:50%;background:conic-gradient(#facc15,#22d3ee,#a78bfa,#fb7185,#facc15);filter:blur(.2px);z-index:50;animation:v30Gate 2.2s ease both;}.v30SecretGate:after{content:"";position:absolute;inset:18px;border-radius:50%;background:#020617;}@keyframes v30Gate{0%{opacity:0;transform:scale(.1) rotate(0);}50%{opacity:1;transform:scale(1.1) rotate(240deg);}100%{opacity:.9;transform:scale(1.45) rotate(720deg);}}

#resultName{margin-top:14px;color:#facc15;font-size:27px;font-weight:900;text-shadow:0 0 13px #facc15;}#resultMsg{margin-top:8px;color:#fff7d6;font-size:15px;font-weight:900;line-height:1.45;}#closeResult,#closeCollection,#zoomClose{margin-top:16px;padding:12px 30px;border:none;border-radius:999px;font-size:18px;font-weight:900;background:linear-gradient(135deg,#facc15,#fb923c);color:#3b2408;box-shadow:0 8px 20px rgba(250,204,21,.35);}
#collection{position:fixed;inset:0;display:none;z-index:130;background:#020617;color:white;overflow:auto;padding:18px 12px 28px;text-align:center;-webkit-overflow-scrolling:touch;}#collection h2{margin:10px 0 6px;color:#facc15;text-shadow:0 0 12px rgba(250,204,21,.6);}#collectionInfo{font-size:13px;color:#fff7d6;font-weight:900;margin:6px 0 12px;line-height:1.5;}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:430px;margin:0 auto;}.cardMini{min-height:145px;border-radius:16px;background:rgba(15,23,42,.92);padding:6px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.12);cursor:pointer;}.cardMini.owned{box-shadow:0 0 15px rgba(250,204,21,.22),inset 0 0 0 1px rgba(250,204,21,.35);}.cardMini img{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:12px;background:#fff;}.cardMiniName{font-size:11px;font-weight:900;color:#fff7d6;margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}.cardMini.locked{filter:grayscale(1);opacity:.55;}.cardMini.locked img{display:none;}.lockedBox{height:115px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:#0f172a;color:#94a3b8;font-size:32px;}
#collectionAbsorbFx{position:fixed;inset:0;pointer-events:none;z-index:150;display:none;}#collectionToast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);z-index:220;display:none;background:rgba(15,23,42,.92);color:#facc15;padding:12px 18px;border-radius:999px;font-weight:900;box-shadow:0 0 18px rgba(250,204,21,.35);white-space:nowrap;}
#sealZoom{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(0,0,0,.92);z-index:180;padding:18px;}#zoomImg{width:94%;max-width:430px;border-radius:18px;background:white;box-shadow:0 0 38px #facc15,0 0 70px rgba(250,204,21,.45);animation:resultPop .28s ease;}#zoomName{margin-top:14px;color:#facc15;font-size:26px;font-weight:900;text-shadow:0 0 12px #facc15;}
.kuroRetryImg{opacity:.55;filter:grayscale(.4);}#maintenanceOverlay{position:fixed;inset:0;z-index:500;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,.88);color:white;text-align:center;}#maintenanceOverlay.show{display:flex;}.maintenanceBox{width:min(92%,380px);padding:24px 18px;border-radius:24px;background:linear-gradient(180deg,rgba(15,23,42,.98),rgba(2,6,23,.98));box-shadow:0 0 28px rgba(250,204,21,.35),inset 0 0 0 1px rgba(255,255,255,.12);}.maintenanceTitle{color:#facc15;font-size:24px;font-weight:900;margin-bottom:12px;text-shadow:0 0 12px rgba(250,204,21,.65);}.maintenanceMsg{color:#fff7d6;font-size:15px;font-weight:900;line-height:1.6;}

<body>
<button id="soundToggle" onclick="toggleSound()">🔊 ON</button>
<div id="app">
  <img id="topImg" src="https://github.com/kuroneko-gacha/kuroneko-gacha-v2/blob/main/33e5c8ed-3a7d-4f64-ad75-060ed57ebefb%20(1).png?raw=true">
  <div id="topSpeechText"><div id="topSpeechLine1">クロネコガチャへようこそ！</div><div id="topSpeechLine2">今日も素敵な出会いがあるよ♪</div></div>
  <div id="statusText">✨ ガチャを読み込み中...</div><div id="pressFx"></div>
  <button id="drawTap" class="tap" onclick="drawGacha()" aria-label="ガチャを引く"></button>
  <button id="bookTap" class="tap" onclick="loadCollection()" aria-label="図鑑を見る"></button>
</div>
<div id="zukanOpenFx"><div class="zukanBookIcon">📖</div><div class="zukanFxText">図鑑を開いています…</div></div>
<div id="effect"><div id="effectStage"></div><div id="effectText"></div></div>
<div id="result"><img id="resultImg"><div id="resultName"></div><div id="resultMsg"></div><button id="closeResult" onclick="closeResult()">閉じる</button></div>
<div id="collection"><h2>📚 シール図鑑</h2><div id="collectionInfo"></div><div id="collectionList" class="grid"></div><button id="closeCollection" onclick="closeCollection()">図鑑を閉じる</button></div>
<div id="collectionAbsorbFx"></div><div id="collectionToast"></div>
<div id="sealZoom" onclick="closeSealZoom()"><img id="zoomImg" onclick="event.stopPropagation()"><div id="zoomName"></div><button id="zoomClose" onclick="closeSealZoom()">閉じる</button></div>
<script>
const LIFF_ID="2010515194-r0gV3TRC";
const API_URL="https://script.google.com/macros/s/AKfycbxQ32wEkjNf0TG1DBK_MYDYS8GkkBLTA_WIz-mgurf_O-hd3ugpYRbb0e-14Fs7Ctk5/exec";
let profile={userId:"",displayName:""};let drawing=false;let dailyLimit=2;let dailyRemaining=2;let soundEnabled=true;let audioCtx=null;let collectionCache=null;let collectionCacheUserId="";let collectionCacheAt=0;const COLLECTION_CACHE_MS=180000;let kuroLastCollectionData=null;
try{soundEnabled=localStorage.getItem("kuronekoSound")!=="off";}catch(e){}
window.onload=async function(){setTopSpeech();updateSoundButton();try{await liff.init({liffId:LIFF_ID});if(!liff.isLoggedIn()){liff.login();return;}const p=await liff.getProfile();profile.userId=p.userId;profile.displayName=p.displayName;setReadyStatus();refreshDailyStatus();}catch(e){console.error(e);alert("LINE名の取得に失敗しました。LINE内から開いてください。");}};
function setTopSpeech(){const l1=document.getElementById("topSpeechLine1"),l2=document.getElementById("topSpeechLine2");if(!l1||!l2)return;const msgs=[["今日の運試し！","何が出るかな♪"],["黒猫がお届け♪","ワクワクの1枚"],["シークレットの予感…","出たらラッキー♪"],["図鑑コンプへ！","少しずつ集めよう"],["今日もまったり♪","楽しんでいこう"],["素敵な出会いを","黒猫が運ぶよ♪"]];const m=msgs[Math.floor(Math.random()*msgs.length)];l1.textContent=m[0];l2.textContent=m[1];}
function setReadyStatus(){const msgs=["🌙 黒猫があなたを待っています","✨ シークレットの気配…？","🐾 今日も仲間を増やそう！","🎁 新しい出会いが待ってるにゃ♪"];setStatus(msgs[Math.floor(Math.random()*msgs.length)]);}function setDoneStatus(){setStatus("✅ 本日は受け取り済みです");}function setStatus(t){const el=document.getElementById("statusText");if(el)el.textContent=t;}function showPressFx(){const el=document.getElementById("pressFx");if(el)el.style.display="block";}function hidePressFx(){const el=document.getElementById("pressFx");if(el)el.style.display="none";}
function updateSoundButton(){const b=document.getElementById("soundToggle");if(b)b.textContent=soundEnabled?"🔊 ON":"🔇 OFF";}function toggleSound(){soundEnabled=!soundEnabled;try{localStorage.setItem("kuronekoSound",soundEnabled?"on":"off");}catch(e){}updateSoundButton();if(soundEnabled)playSound("tap");}
function playSound(type){if(!soundEnabled)return;try{if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();const now=audioCtx.currentTime;const master=audioCtx.createGain();master.gain.setValueAtTime(.0001,now);master.gain.exponentialRampToValueAtTime(.16,now+.02);master.gain.exponentialRampToValueAtTime(.0001,now+1.1);master.connect(audioCtx.destination);function tone(freq,start,dur,wave,vol){const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=wave||"sine";o.frequency.setValueAtTime(freq,now+start);g.gain.setValueAtTime(.0001,now+start);g.gain.exponentialRampToValueAtTime(vol||.12,now+start+.015);g.gain.exponentialRampToValueAtTime(.0001,now+start+dur);o.connect(g);g.connect(master);o.start(now+start);o.stop(now+start+dur+.04);}if(type==="draw"){tone(220,0,.16,"triangle",.12);tone(440,.08,.14,"sine",.1);}else if(type==="boom"){tone(70,0,.25,"sawtooth",.16);tone(120,.04,.2,"triangle",.12);}else if(type==="secret"){tone(520,0,.18,"sine",.1);tone(780,.12,.18,"sine",.12);tone(1040,.24,.22,"sine",.13);tone(88,.45,.34,"sawtooth",.13);}else if(type==="result"){tone(880,0,.13,"sine",.1);tone(1320,.08,.16,"sine",.1);}else{tone(660,0,.12,"sine",.08);}}catch(e){}}
function vibrate(p){try{if(navigator.vibrate)navigator.vibrate(p||[35]);}catch(e){}}
function api(params){const url=API_URL+"?"+new URLSearchParams(params).toString();return fetch(url,{method:"GET",cache:"no-store"}).then(r=>r.json());}
async function refreshDailyStatus(){if(!profile.userId)return;try{const res=await api({mode:"status",userId:profile.userId,displayName:profile.displayName});if(res&&res.ok!==false){dailyLimit=Number(res.dailyLimit||res.limit||dailyLimit||2);dailyRemaining=Number(res.remaining ?? res.dailyRemaining ?? dailyRemaining);if(dailyRemaining<=0)setDoneStatus();else setStatus("🎫 本日の残り "+dailyRemaining+" / "+dailyLimit+" 回");if(res.maintenance)kuronekoShowMaintenance(res.message);}}catch(e){console.log("status skip",e);}}
async function drawGacha(){if(drawing)return;if(!profile.userId){alert("LINE情報を取得中です。少し待ってから押してください。");return;}drawing=true;showPressFx();playSound("draw");vibrate([25]);setStatus("🐈‍⬛ ガチャ中...");try{const res=await api({mode:"draw",userId:profile.userId,displayName:profile.displayName});hidePressFx();if(!res||res.ok===false){drawing=false;if(res&&res.maintenance){kuronekoShowMaintenance(res.message);return;}alert((res&&res.message)||"ガチャに失敗しました。時間をおいて試してください。");refreshDailyStatus();return;}await playGachaEffect(res);showResult(res);collectionCache=null;refreshDailyStatus();}catch(e){console.error(e);hidePressFx();alert("通信エラーです。時間をおいて試してください。");}finally{drawing=false;}}
function normalizeCard(res){const c=res.card||res.result||res;return{cardId:c.cardId||c.id||res.cardId||res.id||"",name:c.name||c.cardName||res.name||res.cardName||"クロネコシール",imageUrl:c.imageUrl||c.image||c.url||res.imageUrl||res.image||res.url||"",secret:!!(c.secret||res.secret||c.isSecret||res.isSecret),isNew:!!(res.isNew||res.new||c.isNew)};}
function showResult(res){const c=normalizeCard(res);document.getElementById("resultImg").src=c.imageUrl;document.getElementById("resultName").textContent=c.name;document.getElementById("resultMsg").textContent=(c.isNew?"✨ NEW SEAL！図鑑に登録されました":"GET！図鑑に登録済みです")+(c.secret?" ／ 🎉 シークレット！":"");document.getElementById("result").style.display="flex";playSound("result");}
function closeResult(){document.getElementById("result").style.display="none";setReadyStatus();}
function playGachaEffect(res){return new Promise(resolve=>{const c=normalizeCard(res),secret=c.secret;const effect=document.getElementById("effect"),stage=document.getElementById("effectStage");effect.className=secret?"v30SecretMode":"";stage.innerHTML="";effect.style.display="block";const skip=document.createElement("div");skip.className="v30Skip";skip.textContent="長押しでスキップ";stage.appendChild(skip);let finished=false,pressTimer=null;function done(){if(finished)return;finished=true;effect.onpointerdown=null;effect.onpointerup=null;effect.onpointercancel=null;effect.style.display="none";stage.innerHTML="";resolve();}effect.onpointerdown=()=>{pressTimer=setTimeout(done,650);};effect.onpointerup=()=>{if(pressTimer)clearTimeout(pressTimer);};effect.onpointercancel=()=>{if(pressTimer)clearTimeout(pressTimer);};runV30(stage,secret,done);});}
function runV30(stage,secret,done){v30Title(stage,secret?"……空気が変わった":"クロネコガチャ Ver.3.0",80);v30Stars(stage,secret?22:12);if(secret){playSound("secret");vibrate([70,40,120,40,180]);setTimeout(()=>v30Gate(stage),420);}else{playSound("draw");vibrate([35]);}setTimeout(()=>v30Machine(stage),360);setTimeout(()=>v30Handle(stage),900);setTimeout(()=>v30Capsule(stage,secret),1450);setTimeout(()=>{document.getElementById("effect").classList.add("v30Shake");playSound("boom");vibrate(secret?[80,40,110]:[50]);},2700);setTimeout(()=>v30Crack(stage),2850);setTimeout(()=>v30Burst(stage),3200);setTimeout(()=>v30Particles(stage,secret?95:45),3220);setTimeout(()=>v30Ring(stage),3400);setTimeout(()=>v30CardBack(stage),3900);setTimeout(()=>v30Title(stage,secret?"SECRET SEAL 解放":"SEAL OPEN！",4650),4650);setTimeout(()=>v30RevealText(stage,secret?"SECRET!!":"GET!!"),5100);setTimeout(done,secret?6500:5900);}
function v30Title(stage,text,delay){setTimeout(()=>{const el=document.createElement("div");el.className="v30Title";el.textContent=text;stage.appendChild(el);},delay||0);}function v30Machine(stage){const el=document.createElement("div");el.className="v30Machine";stage.appendChild(el);}function v30Handle(stage){const el=document.createElement("div");el.className="v30Handle";stage.appendChild(el);}function v30Capsule(stage,secret){const el=document.createElement("div");el.className="v30Capsule"+(secret?" secret":"");stage.appendChild(el);}function v30Crack(stage){const el=document.createElement("div");el.className="v30Crack";stage.appendChild(el);}function v30Burst(stage){const el=document.createElement("div");el.className="v30Burst";stage.appendChild(el);}function v30Ring(stage){const el=document.createElement("div");el.className="v30Ring";stage.appendChild(el);}function v30CardBack(stage){const el=document.createElement("div");el.className="v30SealBack";stage.appendChild(el);}function v30RevealText(stage,text){const el=document.createElement("div");el.className="v30RevealText";el.textContent=text;stage.appendChild(el);}function v30Gate(stage){const el=document.createElement("div");el.className="v30SecretGate";stage.appendChild(el);}function v30Particles(stage,count){for(let i=0;i<count;i++){const d=document.createElement("div");d.className="v30Particle";d.style.setProperty("--dx",(Math.random()*420-210)+"px");d.style.setProperty("--dy",(Math.random()*420-210)+"px");d.style.animationDelay=(Math.random()*.25)+"s";stage.appendChild(d);}}function v30Stars(stage,count){for(let i=0;i<count;i++){const s=document.createElement("div");s.className="v30Star";s.style.left=(Math.random()*115)+"%";s.style.top=(-20-Math.random()*240)+"px";s.style.animationDelay=(Math.random()*1.4)+"s";stage.appendChild(s);}}
async function loadCollection(){if(!profile.userId){alert("LINE情報を取得中です。少し待ってください。");return;}const fx=document.getElementById("zukanOpenFx");fx.classList.add("show");playSound("tap");try{let data=null;const now=Date.now();if(collectionCache&&collectionCacheUserId===profile.userId&&now-collectionCacheAt<COLLECTION_CACHE_MS){data=collectionCache;}else{data=await api({mode:"collection",userId:profile.userId,displayName:profile.displayName});collectionCache=data;collectionCacheUserId=profile.userId;collectionCacheAt=now;}setTimeout(()=>fx.classList.remove("show"),350);renderCollection(data);document.getElementById("collection").style.display="block";}catch(e){console.error(e);fx.classList.remove("show");alert("図鑑の読み込みに失敗しました。");}}
function renderCollection(data){kuroLastCollectionData=data;const list=document.getElementById("collectionList"),info=document.getElementById("collectionInfo");list.innerHTML="";const cards=(data.cards||data.collection||data.items||[]).slice();cards.sort((a,b)=>String(a.joinDate||a.date||"").localeCompare(String(b.joinDate||b.date||""))||String(a.id||a.cardId||"").localeCompare(String(b.id||b.cardId||"")));const ownedCount=Number(data.ownedCount ?? cards.filter(x=>x.owned||x.has).length);const totalCount=Number(data.totalCount ?? cards.length);info.textContent="通常図鑑 収集率 "+(totalCount?Math.floor(ownedCount/totalCount*100):0)+"%（"+ownedCount+" / "+totalCount+"）";cards.forEach(card=>{const owned=!!(card.owned||card.has||card.acquired);const div=document.createElement("div");div.className="cardMini "+(owned?"owned":"locked");const name=card.name||card.cardName||"???";const img=card.imageUrl||card.image||card.url||"";if(owned&&img){div.innerHTML='<img src="'+escapeHtml(img)+'" alt="'+escapeHtml(name)+'"><div class="cardMiniName">'+escapeHtml(name)+'</div>';div.onclick=()=>openSealZoom(img,name);}else{div.innerHTML='<div class="lockedBox">?</div><div class="cardMiniName">未入手</div>';}list.appendChild(div);});applyImageRetry();}
function closeCollection(){document.getElementById("collection").style.display="none";}function openSealZoom(img,name){document.getElementById("zoomImg").src=img;document.getElementById("zoomName").textContent=name;document.getElementById("sealZoom").style.display="flex";}function closeSealZoom(){document.getElementById("sealZoom").style.display="none";}function escapeHtml(s){return String(s||"").replace(/[&<>'"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[m]));}
function applyImageRetry(){document.querySelectorAll(".cardMini img:not([data-kuro-img-ready]),#resultImg:not([data-kuro-img-ready]),#zoomImg:not([data-kuro-img-ready])").forEach(img=>{img.dataset.kuroImgReady="1";img.addEventListener("error",function(){const count=Number(img.dataset.kuroRetryCount||0);if(count>=3){img.classList.add("kuroRetryImg");return;}img.dataset.kuroRetryCount=String(count+1);img.classList.add("kuroRetryImg");const base=String(img.src||"").split("?")[0];setTimeout(()=>{img.src=base+"?retry="+Date.now();},500+count*800);});img.addEventListener("load",()=>img.classList.remove("kuroRetryImg"));});}
function kuronekoShowMaintenance(message){let ov=document.getElementById("maintenanceOverlay");if(!ov){ov=document.createElement("div");ov.id="maintenanceOverlay";ov.innerHTML='<div class="maintenanceBox"><div class="maintenanceTitle">🛠 メンテナンス中</div><div class="maintenanceMsg" id="maintenanceMsg">ただいまアップデート中です。少し待ってにゃー🐾</div></div>';document.body.appendChild(ov);}const msg=document.getElementById("maintenanceMsg");if(msg)msg.textContent=message||"ただいまアップデート中です。少し待ってにゃー🐾";ov.classList.add("show");}
document.addEventListener("DOMContentLoaded",()=>{applyImageRetry();const mo=new MutationObserver(()=>applyImageRetry());mo.observe(document.body,{childList:true,subtree:true});});
</script>
