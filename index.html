<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>クロネコガチャ v2 Premium</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #000;
      overflow-x: hidden;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
    }

    body {
      color: #fff;
    }

    .app {
      position: relative;
      width: 100%;
      max-width: 430px;
      min-height: calc(100vh - 0px);
      margin: 0 auto;
      background-image: url("https://raw.githubusercontent.com/kuroneko-gacha/kuroneko-gacha-v2/main/c0c8cb22-8394-4770-bbd7-93e67f7821af.png");
      background-size: cover;
      background-position: 54% top;
      background-repeat: no-repeat;
      aspect-ratio: 9 / 16;
    }

    .draw-area {
  position: absolute;
  left: 50%;
  top: 47.8%;
  transform: translateX(-50%);
  width: 68%;
  height: 18%;
  border: none;
  background: transparent;
  border-radius: 50%;
  z-index: 10;
}

    .book-area {
      position: absolute;
      left: 50%;
      top: 74.2%;
      transform: translateX(-50%);
      width: 80%;
      height: 12%;
      border: none;
      background: transparent;
      border-radius: 20px;
      z-index: 10;
    }

    #status {
  position: fixed;
  left: 50%;
  top: 92px;
  transform: translateX(-50%);
  z-index: 120;
  width: 84%;
  max-width: 340px;
  padding: 6px 10px;
  border-radius: 999px;
  background: rgba(0, 0, 0, 0.72);
  border: 1px solid rgba(255, 210, 90, 0.55);
  text-align: center;
  font-size: 11px;
  color: #fff2bd;
  text-shadow: 0 0 6px #000;
  line-height: 1.2;
  pointer-events: none;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(0,0,0,.86);
      padding: 70px 16px 28px;
      overflow-y: auto;
    }

    .result-card {
      display: none;
      max-width: 360px;
      margin: 0 auto;
      padding: 18px;
      text-align: center;
      color: #1b1200;
      background: linear-gradient(180deg, #fff6cc, #ffffff);
      border: 4px solid #d6a333;
      border-radius: 24px;
      box-shadow: 0 0 34px rgba(255, 205, 70, .85);
      animation: pop .35s ease-out;
    }

    @keyframes pop {
      from { transform: scale(.85); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .rarity {
      font-size: 36px;
      font-weight: 900;
      color: #d69a16;
      text-shadow: 0 1px 0 #fff;
    }

    .result-card h2 {
      margin: 12px 0;
      font-size: 34px;
    }

    .result-card p {
      margin: 8px 0 14px;
      font-size: 18px;
    }

    .result-card img {
      width: 100%;
      border-radius: 18px;
      background: #ddd;
    }

    .close-btn {
      width: 100%;
      max-width: 360px;
      height: 58px;
      margin: 18px auto 0;
      display: block;
      border: 2px solid #e5bd56;
      border-radius: 999px;
      background: #111;
      color: #ffe6a3;
      font-size: 22px;
      font-weight: bold;
      font-family: inherit;
    }

    .collection-box {
      max-width: 420px;
      margin: 0 auto;
      padding: 16px;
      border-radius: 22px;
      background: rgba(20,14,5,.96);
      border: 2px solid rgba(255, 210, 90, .7);
      box-shadow: 0 0 24px rgba(255, 190, 60, .35);
    }

    .collection-box h2 {
      margin: 0 0 16px;
      color: #ffd66b;
      text-align: center;
      font-size: 32px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .mini {
      padding: 8px;
      border-radius: 14px;
      background: #151515;
      border: 1px solid rgba(255, 215, 100, .35);
      font-size: 12px;
      color: #fff0b0;
      text-align: center;
    }

    .mini img {
      width: 100%;
      border-radius: 10px;
      filter: brightness(.18);
    }

    .mini.owned img {
      filter: none;
    }

   .gacha-effect {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 80;
  background: rgba(0, 0, 0, 0.35);
  align-items: center;
  justify-content: center;
  padding: 0 18px;
  color: #fff2b8;
  font-size: 18px;
  font-weight: bold;
  text-align: center;
  white-space: nowrap;
  text-shadow: 0 0 12px #000;
}
    @keyframes flash {
      from { opacity: .75; }
      to { opacity: 1; }
    }

    @media (max-height: 720px) {
      #status {
        bottom: 1.5%;
        font-size: 11px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <button class="draw-area" onclick="draw()" aria-label="ガチャを引く"></button>
    <button class="book-area" onclick="loadCollection()" aria-label="図鑑を見る"></button>
    <div id="status">LIFF準備中...</div>
  </div>

  <div id="effect" class="gacha-effect">黒猫がシールを運んでいます…</div>

  <div id="cardOverlay" class="overlay">
    <div id="card" class="result-card">
      <div id="rarity" class="rarity"></div>
      <h2 id="cardName"></h2>
      <p id="joinDate"></p>
      <img id="cardImage">
    </div>
    <button class="close-btn" onclick="closeCard()">閉じる</button>
  </div>

  <div id="collectionOverlay" class="overlay">
    <div class="collection-box">
      <h2>図鑑</h2>
      <div id="grid" class="grid"></div>
      <button class="close-btn" onclick="closeCollection()">閉じる</button>
    </div>
  </div>

  <script>
    const LIFF_ID = "2010515194-r0gV3TRC";
    const API_URL = "https://script.google.com/macros/s/AKfycbxQ32wEkjNf0TG1DBK_MYDYS8GkkBLTA_WIz-mgurf_O-hd3ugpYRbb0e-14Fs7Ctk5/exec";

    let profile = null;

    window.onload = async function () {
      const status = document.getElementById("status");

      try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        profile = await liff.getProfile();
        status.innerText = profile.displayName + " さん、ようこそ";

      } catch (e) {
        status.innerText = "LIFF認証エラー：" + e.message;
      }
    };

    function callApi(params) {
      return new Promise((resolve, reject) => {
        const callbackName = "cb_" + Date.now();

        window[callbackName] = function(data) {
          delete window[callbackName];
          document.body.removeChild(script);
          resolve(data);
        };

        const query = new URLSearchParams({
          ...params,
          callback: callbackName
        });

        const script = document.createElement("script");
        script.src = API_URL + "?" + query.toString();
        script.onerror = reject;
        document.body.appendChild(script);
      });
    }

    async function draw() {
      if (!profile) {
        alert("LINE認証中です。少し待ってください。");
        return;
      }

      const status = document.getElementById("status");
      const effect = document.getElementById("effect");

      status.innerText = "抽選中…";
      effect.style.display = "flex";

      const data = await callApi({
        action: "draw",
        userId: profile.userId,
        displayName: profile.displayName
      });

      setTimeout(() => {
        effect.style.display = "none";

        if (!data.ok) {
          alert(data.error);
          return;
        }

        if (data.already) {
          status.innerText = "本日分は受け取り済みです";
          return;
        }

        showCard(data.card);
        status.innerText = "ガチャ結果";
      }, 900);
    }

    function showCard(card) {
      document.getElementById("rarity").innerText = card.rarity;
      document.getElementById("cardName").innerText = card.name;
      document.getElementById("joinDate").innerText = "入団日：" + card.joinDate;
      document.getElementById("cardImage").src = card.imageUrl;

      document.getElementById("cardOverlay").style.display = "block";
      document.getElementById("card").style.display = "block";
    }

    function closeCard() {
      document.getElementById("cardOverlay").style.display = "none";
    }

    async function loadCollection() {
      if (!profile) {
        alert("LINE認証中です。少し待ってください。");
        return;
      }

      document.getElementById("status").innerText = "図鑑を読み込み中";

      const data = await callApi({
        action: "collection",
        userId: profile.userId
      });

      if (!data.ok) {
        alert(data.error);
        return;
      }

      const grid = document.getElementById("grid");
      grid.innerHTML = "";

      data.collection.forEach(card => {
        const div = document.createElement("div");
        div.className = "mini" + (card.owned ? " owned" : "");

        div.innerHTML = `
          <img src="${card.imageUrl}">
          <div>${card.owned ? card.name : "？？？"}</div>
          <div>${card.rarity}</div>
        `;

        grid.appendChild(div);
      });

      document.getElementById("collectionOverlay").style.display = "block";
      document.getElementById("status").innerText = "図鑑表示中";
    }

    function closeCollection() {
      document.getElementById("collectionOverlay").style.display = "none";
    }
  </script>
</body>
</html>
