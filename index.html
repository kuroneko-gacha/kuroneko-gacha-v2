<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>クロネコガチャ v2</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: linear-gradient(180deg, #fff1f7, #fffaf0);
      color: #333;
      text-align: center;
    }

    .wrap {
      max-width: 420px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    h1 {
      font-size: 28px;
      margin: 20px 0 8px;
    }

    .sub {
      color: #777;
      margin-bottom: 24px;
    }

    .box {
      background: white;
      border-radius: 24px;
      padding: 24px 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }

    .cat {
      font-size: 64px;
      margin: 10px 0;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 16px 28px;
      font-size: 18px;
      font-weight: bold;
      margin: 10px;
      cursor: pointer;
      background: #ff8fbd;
      color: white;
      box-shadow: 0 5px 0 #d95c91;
    }

    button:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #d95c91;
    }

    .btn-sub {
      background: #7cc7c2;
      box-shadow: 0 5px 0 #4aa09b;
    }

    #message {
      margin-top: 18px;
      font-weight: bold;
      color: #555;
      white-space: pre-wrap;
    }

    #result {
      margin-top: 20px;
      display: none;
    }

    #cardImage {
      width: 86%;
      max-width: 300px;
      border-radius: 18px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.22);
      background: white;
    }

    #cardName {
      font-size: 24px;
      font-weight: bold;
      margin-top: 14px;
    }

    #collection {
      display: none;
      margin-top: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 14px;
    }

    .mini-card {
      background: white;
      border-radius: 16px;
      padding: 10px;
      box-shadow: 0 5px 14px rgba(0,0,0,0.12);
    }

    .mini-card img {
      width: 100%;
      border-radius: 12px;
    }

    .mini-card div {
      font-size: 14px;
      font-weight: bold;
      margin-top: 6px;
    }

    #effect {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(255, 241, 247, 0.96);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      font-size: 42px;
      font-weight: bold;
    }

    .effectText {
      animation: pop 0.8s infinite alternate;
    }

    @keyframes pop {
      from { transform: scale(1); opacity: 0.7; }
      to { transform: scale(1.18); opacity: 1; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>クロネコガチャ v2</h1>
    <div class="sub">1日1回・朝8時リセット</div>

    <div class="box">
      <div class="cat">🐈‍⬛</div>
      <button onclick="drawGacha()">ガチャを引く</button>
      <button class="btn-sub" onclick="showCollection()">図鑑を見る</button>

      <div id="message">読み込み中...</div>

      <div id="result">
        <img id="cardImage" src="" alt="シール画像">
        <div id="cardName"></div>
      </div>

      <div id="collection">
        <h2>図鑑</h2>
        <div id="collectionGrid" class="grid"></div>
      </div>
    </div>
  </div>

  <div id="effect">
    <div class="effectText" id="effectText">🐾 ガチャ中...</div>
  </div>

  <script>
    const LIFF_ID = "2010515194-r0gV3TRC";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxQ32wEkjNf0TG1DBK_MYDYS8GkkBLTA_WIz-mgurf_O-hd3ugpYRbb0e-14Fs7Ctk5/exec";

    let userId = "";
    let displayName = "";

    window.onload = async function () {
      try {
        document.getElementById("message").textContent = "LINE認証中...";

        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        userId = profile.userId;
        displayName = profile.displayName || "";

        document.getElementById("message").textContent =
          displayName + "さん、今日のガチャを引けます🐾";

      } catch (err) {
        document.getElementById("message").textContent =
          "エラー：LIFF設定を確認してください\n" + err.message;
      }
    };

    async function drawGacha() {
      if (!userId) {
        document.getElementById("message").textContent = "LINE認証がまだです。少し待ってください。";
        return;
      }

      showEffect("🐾 にゃんにゃん抽選中...");

      try {
        const res = await fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify({
            action: "draw",
            userId: userId,
            displayName: displayName
          })
        });

        const data = await res.json();

        setTimeout(() => {
          hideEffect();

          if (!data.ok) {
            document.getElementById("message").textContent = data.message || "ガチャに失敗しました";
            return;
          }

          showCard(data.card);
        }, 900);

      } catch (err) {
        hideEffect();
        document.getElementById("message").textContent =
          "通信エラー：Apps Script URLを確認してください\n" + err.message;
      }
    }

    function showCard(card) {
      document.getElementById("collection").style.display = "none";
      document.getElementById("result").style.display = "block";

      document.getElementById("cardImage").src = card.imageUrl;
      document.getElementById("cardName").textContent = card.name;

      if (card.type === "secret") {
        document.getElementById("message").textContent = "✨シークレットシール出現✨";
      } else {
        document.getElementById("message").textContent = "シールをゲットしました🐾";
      }
    }

    async function showCollection() {
      if (!userId) {
        document.getElementById("message").textContent = "LINE認証がまだです。少し待ってください。";
        return;
      }

      document.getElementById("message").textContent = "図鑑を読み込み中...";

      try {
        const res = await fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify({
            action: "collection",
            userId: userId
          })
        });

        const data = await res.json();

        if (!data.ok) {
          document.getElementById("message").textContent = data.message || "図鑑取得に失敗しました";
          return;
        }

        const grid = document.getElementById("collectionGrid");
        grid.innerHTML = "";

        if (data.collection.length === 0) {
          grid.innerHTML = "<p>まだシールがありません</p>";
        } else {
          data.collection.forEach(card => {
            const div = document.createElement("div");
            div.className = "mini-card";
            div.innerHTML = `
              <img src="${card.imageUrl}" alt="${card.name}">
              <div>${card.name}</div>
            `;
            grid.appendChild(div);
          });
        }

        document.getElementById("result").style.display = "none";
        document.getElementById("collection").style.display = "block";
        document.getElementById("message").textContent = "図鑑を表示しました🐾";

      } catch (err) {
        document.getElementById("message").textContent =
          "通信エラー：Apps Script URLを確認してください\n" + err.message;
      }
    }

    function showEffect(text) {
      const effect = document.getElementById("effect");
      document.getElementById("effectText").textContent = text;
      effect.style.display = "flex";
    }

    function hideEffect() {
      document.getElementById("effect").style.display = "none";
    }
  </script>
</body>
</html>
