<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>クロネコガチャ v2</title>

  <style>
    body{
      margin:0;
      font-family:"Arial","Hiragino Sans","Meiryo",sans-serif;
      background:linear-gradient(180deg,#111827,#020617);
      color:#fff;
      text-align:center;
      overflow-x:hidden;
    }

    .wrap{
      max-width:520px;
      margin:0 auto;
      padding:18px;
    }

    h1{
      font-size:30px;
      margin:16px 0 6px;
      color:#facc15;
      text-shadow:0 0 10px #f59e0b;
    }

    .sub{
      font-size:14px;
      color:#cbd5e1;
      margin-bottom:18px;
    }

    input{
      width:90%;
      max-width:360px;
      padding:14px;
      border-radius:14px;
      border:none;
      font-size:18px;
      text-align:center;
      margin:8px 0;
    }

    button{
      border:none;
      border-radius:18px;
      padding:16px 26px;
      font-size:20px;
      font-weight:bold;
      margin:10px 6px;
      cursor:pointer;
      background:linear-gradient(180deg,#facc15,#f97316);
      color:#111827;
      box-shadow:0 6px 0 #92400e;
    }

    button:active{
      transform:translateY(4px);
      box-shadow:0 2px 0 #92400e;
    }

    .smallBtn{
      font-size:15px;
      padding:10px 16px;
      border-radius:14px;
      background:linear-gradient(180deg,#38bdf8,#2563eb);
      color:white;
      box-shadow:0 4px 0 #1e3a8a;
    }

    .box{
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.15);
      border-radius:22px;
      padding:16px;
      margin-top:16px;
      box-shadow:0 0 20px rgba(0,0,0,.35);
    }

    #message{
      min-height:28px;
      font-size:17px;
      margin:12px 0;
      color:#fde68a;
    }

    #cardArea{
      display:none;
      margin-top:18px;
      animation:pop .5s ease;
    }

    #cardImg{
      width:92%;
      max-width:360px;
      border-radius:18px;
      box-shadow:0 0 30px rgba(250,204,21,.5);
      background:white;
    }

    #cardName{
      font-size:26px;
      font-weight:bold;
      margin-top:12px;
      color:#facc15;
      text-shadow:0 0 10px #f59e0b;
    }

    #rarity{
      font-size:18px;
      margin-top:4px;
      color:#93c5fd;
    }

    #effect{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,.82);
      z-index:99;
      flex-direction:column;
    }

    #effectText{
      font-size:32px;
      color:#facc15;
      font-weight:bold;
      text-shadow:0 0 18px #f59e0b;
      margin-top:18px;
    }

    #cat{
      width:180px;
      animation:catMove 1.4s ease infinite alternate;
      filter:drop-shadow(0 0 20px #facc15);
    }

    .flash{
      animation:flash .25s linear 6;
    }

    #collection{
      display:none;
      margin-top:18px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
      margin-top:12px;
    }

    .mini{
      background:rgba(255,255,255,.09);
      border-radius:16px;
      padding:8px;
      font-size:13px;
    }

    .mini img{
      width:100%;
      border-radius:12px;
      background:white;
    }

    .empty{
      padding:28px 8px;
      color:#94a3b8;
      font-size:14px;
    }

    @keyframes pop{
      0%{transform:scale(.4);opacity:0;}
      70%{transform:scale(1.08);opacity:1;}
      100%{transform:scale(1);}
    }

    @keyframes catMove{
      from{transform:translateY(0) rotate(-4deg) scale(1);}
      to{transform:translateY(-18px) rotate(4deg) scale(1.08);}
    }

    @keyframes flash{
      0%{background:#fff;}
      100%{background:rgba(0,0,0,.82);}
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>🐾 クロネコガチャ v2 🐾</h1>
    <div class="sub">1日1回だけ引けるサークル用シールガチャ</div>

    <div class="box">
      <input id="playerName" type="text" placeholder="ハンター名を入力">
      <br>
      <button onclick="startGacha()">ガチャを引く！</button>
      <br>
      <button class="smallBtn" onclick="showCollection()">図鑑を見る</button>
      <button class="smallBtn" onclick="hideCollection()">図鑑を閉じる</button>

      <div id="message"></div>

      <div id="cardArea">
        <img id="cardImg" src="">
        <div id="cardName"></div>
        <div id="rarity"></div>
      </div>
    </div>

    <div id="collection" class="box">
      <h2>📚 シール図鑑</h2>
      <div id="collectionList" class="grid"></div>
    </div>
  </div>

  <div id="effect">
    <img id="cat" src="https://i.ibb.co/xqQLHrDz/a7c2f872-3116-4bca-b94d-e9a4c80e6650.png">
    <div id="effectText">クロネコが運んでくる…</div>
  </div>

  <script>
    let isDrawing = false;

    function getName(){
      return document.getElementById("playerName").value.trim();
    }

    function setMessage(text){
      document.getElementById("message").textContent = text;
    }

    function startGacha(){
      const name = getName();

      if(!name){
        setMessage("ハンター名を入力してね！");
        return;
      }

      if(isDrawing) return;
      isDrawing = true;

      document.getElementById("cardArea").style.display = "none";
      setMessage("");

      playEffect(function(){
        google.script.run
          .withSuccessHandler(function(res){
            isDrawing = false;
            hideEffect();

            if(!res || res.ok === false){
              setMessage(res && res.message ? res.message : "エラーが出ました。もう一度試してね。");
              return;
            }

            showCard(res);
          })
          .withFailureHandler(function(err){
            isDrawing = false;
            hideEffect();
            setMessage("通信エラー：Apps Script側を確認してね");
            console.error(err);
          })
          .drawGacha(name);
      });
    }

    function playEffect(callback){
      const effect = document.getElementById("effect");
      const text = document.getElementById("effectText");

      const patterns = [
        "クロネコがシールをくわえてきた…",
        "小ネコたちが集まっている…",
        "爆弾が転がってきた！？",
        "肉球の光が広がる…",
        "キラキラの気配がする…"
      ];

      text.textContent = patterns[Math.floor(Math.random() * patterns.length)];
      effect.style.display = "flex";
      effect.classList.remove("flash");

      setTimeout(function(){
        effect.classList.add("flash");
        text.textContent = "開封！！";
      }, 1200);

      setTimeout(function(){
        callback();
      }, 2200);
    }

    function hideEffect(){
      const effect = document.getElementById("effect");
      effect.style.display = "none";
      effect.classList.remove("flash");
    }

    function showCard(res){
      document.getElementById("cardImg").src = res.imageUrl || "";
      document.getElementById("cardName").textContent = res.name || "？？？";
      document.getElementById("rarity").textContent = res.rarity ? "レア度：" + res.rarity : "";
      document.getElementById("cardArea").style.display = "block";

      if(res.isNew){
        setMessage("🎉 NEW SEAL GET！！");
      }else{
        setMessage("また会えたね！");
      }
    }

    function showCollection(){
      const name = getName();

      if(!name){
        setMessage("図鑑を見るにはハンター名を入力してね！");
        return;
      }

      setMessage("図鑑を読み込み中…");

      google.script.run
        .withSuccessHandler(function(res){
          setMessage("");

          if(!res || res.ok === false){
            setMessage(res && res.message ? res.message : "図鑑を読み込めませんでした。");
            return;
          }

          renderCollection(res.cards || []);
        })
        .withFailureHandler(function(err){
          setMessage("図鑑の通信エラー");
          console.error(err);
        })
        .getCollection(name);
    }

    function renderCollection(cards){
      const area = document.getElementById("collection");
      const list = document.getElementById("collectionList");

      list.innerHTML = "";
      area.style.display = "block";

      if(!cards.length){
        list.innerHTML = '<div class="empty">まだシールがありません</div>';
        return;
      }

      cards.forEach(function(card){
        const div = document.createElement("div");
        div.className = "mini";

        div.innerHTML =
          '<img src="' + escapeHtml(card.imageUrl || "") + '">' +
          '<div>' + escapeHtml(card.name || "？？？") + '</div>' +
          '<div>' + escapeHtml(card.joinDate || "") + '</div>';

        list.appendChild(div);
      });
    }

    function hideCollection(){
      document.getElementById("collection").style.display = "none";
    }

    function escapeHtml(str){
      return String(str)
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#039;");
    }
  </script>
</body>
</html>
