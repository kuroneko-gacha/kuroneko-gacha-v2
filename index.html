<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>クロネコガチャ v2</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #000;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
      color: #fff;
      overflow-x: hidden;
    }

    body {
      background: #000;
    }

    .app {
      position: relative;
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      margin: 0 auto;
      background-image: url("https://raw.githubusercontent.com/kuroneko-gacha/kuroneko-gacha-v2/main/c0c8cb22-8394-4770-bbd7-93e67f7821af.png");
      background-size: cover;
      background-position: top center;
      background-repeat: no-repeat;
    }

    .tap-area {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      border: none;
      background: transparent;
      cursor: pointer;
      z-index: 5;
    }

    .draw-area {
      top: 48%;
      width: 78%;
      height: 22%;
      border-radius: 999px;
    }

    .book-area {
      top: 76%;
      width: 76%;
      height: 12%;
      border-radius: 24px;
    }

    #status {
      position: absolute;
      left: 7%;
      right: 7%;
      top: 88%;
      z-index: 6;
      text-align: center;
      font-size: 14px;
      color: #fff2bd;
      text-shadow: 0 0 8px #000;
      line-height: 1.5;
    }

    .card {
      display: none;
      position: relative;
      z-index: 10;
      margin: 0 auto;
      padding: 18px;
      max-width: 360px;
      border-radius: 24px;
      color: #1b1200;
      background: linear-gradient(180deg, #fff9d8, #fff);
      border: 4px solid #d6a333;
      box-shadow: 0 0 30px rgba(255, 205, 70, .8);
      text-align: center;
    }

    .card-wrap {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 20;
      background: rgba(0,0,0,.82);
      padding: 70px 18px 30px;
      overflow-y: auto;
    }

    .rarity {
      font-size: 34px;
      font-weight: 900;
      color: #d69a16;
    }

    .card h2 {
      margin: 12px 0;
      font-size: 32px;
    }

    .card p {
      font-size: 18px;
    }

    .card img {
      width: 100%;
      border-radius: 18px;
      background: #ddd;
    }

    .close-btn {
      width: 100%;
      max-width: 360px;
      height: 58px;
      margin: 18px auto 0;
      display: block;
      border: 2px solid #e5bd56;
      border-radius: 999px;
      background: #111;
      color: #ffe6a3;
      font-size: 22px;
      font-weight: bold;
    }

    .collection-wrap {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 25;
      background: rgba(0,0,0,.92);
      padding: 50px 14px 30px;
      overflow-y: auto;
    }

    .collection {
      max-width: 420px;
      margin: 0 auto;
      padding: 16px;
      border-radius: 22px;
      background: rgba(20,14,5,.92);
      border: 2px solid rgba(255, 210, 90, .65);
      box-shadow: 0 0 24px rgba(255, 190, 60, .35);
    }

    .collection h2 {
      margin: 0 0 16px;
      color: #ffd66b;
      text-align: center;
      font-size: 32px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .mini {
      padding: 8px;
      border-radius: 14px;
      background: #151515;
      border: 1px solid rgba(255, 215, 100, .35);
      font-size: 12px;
      color: #fff0b0;
      text-align: center;
    }

    .mini img {
      width: 100%;
      border-radius: 10px;
      filter: brightness(.2);
    }

    .mini.owned img {
      filter: none;
    }

    .loading {
      animation: pulse 1s infinite alternate;
    }

    @keyframes pulse {
      from { opacity: .45; }
      to { opacity: 1; }
    }
  </style>
</head>

<body>
  <div class="app">
    <button class="tap-area draw-area" onclick="draw()" aria-label="ガチャを引く"></button>
    <button class="tap-area book-area" onclick="loadCollection()" aria-label="図鑑を見る"></button>
    <div id="status">LIFF準備中...</div>
  </div>

  <div id="cardWrap" class="card-wrap">
    <div id="card" class="card">
      <div id="rarity" class="rarity"></div>
      <h2 id="cardName"></h2>
      <p id="joinDate"></p>
      <img id="cardImage">
    </div>
    <button class="close-btn" onclick="closeCard()">閉じる</button>
  </div>

  <div id="collectionWrap" class="collection-wrap">
    <div class="collection">
      <h2>図鑑</h2>
      <div id="grid" class="grid"></div>
      <button class="close-btn" onclick="closeCollection()">閉じる</button>
    </div>
  </div>

  <script>
    const LIFF_ID = "2010515194-r0gV3TRC";
    const API_URL = "https://script.google.com/macros/s/AKfycbxQ32wEkjNf0TG1DBK_MYDYS8GkkBLTA_WIz-mgurf_O-hd3ugpYRbb0e-14Fs7Ctk5/exec";

    let profile = null;

    window.onload = async function () {
      const status = document.getElementById("status");

      try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        profile = await liff.getProfile();
        status.innerText = profile.displayName + " さん、ようこそ！";

      } catch (e) {
        status.innerText = "LIFF認証エラー：" + e.message;
      }
    };

    function callApi(params) {
      return new Promise((resolve, reject) => {
        const callbackName = "cb_" + Date.now();

        window[callbackName] = function(data) {
          delete window[callbackName];
          document.body.removeChild(script);
          resolve(data);
        };

        const query = new URLSearchParams({
          ...params,
          callback: callbackName
        });

        const script = document.createElement("script");
        script.src = API_URL + "?" + query.toString();
        script.onerror = reject;
        document.body.appendChild(script);
      });
    }

    async function draw() {
      if (!profile) {
        alert("LINE認証中です。少し待ってください。");
        return;
      }

      const status = document.getElementById("status");
      status.innerText = "黒猫がシールを探しています...";
      status.classList.add("loading");

      const data = await callApi({
        action: "draw",
        userId: profile.userId,
        displayName: profile.displayName
      });

      status.classList.remove("loading");

      if (!data.ok) {
        alert(data.error);
        return;
      }

      if (data.already) {
        status.innerText = "今日はすでに引いています。次は朝8時です。";
        return;
      }

      showCard(data.card);
      status.innerText = "ガチャ結果！";
    }

    function showCard(card) {
      document.getElementById("rarity").innerText = card.rarity;
      document.getElementById("cardName").innerText = card.name;
      document.getElementById("joinDate").innerText = "入団日：" + card.joinDate;
      document.getElementById("cardImage").src = card.imageUrl;

      document.getElementById("cardWrap").style.display = "block";
      document.getElementById("card").style.display = "block";
    }

    function closeCard() {
      document.getElementById("cardWrap").style.display = "none";
    }

    async function loadCollection() {
      if (!profile) {
        alert("LINE認証中です。少し待ってください。");
        return;
      }

      document.getElementById("status").innerText = "図鑑を読み込み中...";

      const data = await callApi({
        action: "collection",
        userId: profile.userId
      });

      if (!data.ok) {
        alert(data.error);
        return;
      }

      const grid = document.getElementById("grid");
      grid.innerHTML = "";

      data.collection.forEach(card => {
        const div = document.createElement("div");
        div.className = "mini" + (card.owned ? " owned" : "");

        div.innerHTML = `
          <img src="${card.imageUrl}">
          <div>${card.owned ? card.name : "？？？"}</div>
          <div>${card.rarity}</div>
        `;

        grid.appendChild(div);
      });

      document.getElementById("collectionWrap").style.display = "block";
      document.getElementById("status").innerText = "図鑑表示中";
    }

    function closeCollection() {
      document.getElementById("collectionWrap").style.display = "none";
    }
  </script>
</body>
</html>
