function playGachaEffect(res){
  return new Promise(resolve=>{
    const isSecret = !!res.secret;
    const effect = document.getElementById("effect");
    const stage = document.getElementById("effectStage");

    effect.className = "";
    stage.innerHTML = "";
    effect.style.display = "block";

    const hint = document.createElement("div");
    hint.className = "skipHint";
    hint.textContent = "長押しでスキップ";
    stage.appendChild(hint);

    let finished = false;
    let pressTimer = null;

    function skipNow(){
      if(finished) return;
      finished = true;
      finishEffect(resolve);
    }

    effect.onpointerdown = function(){
      pressTimer = setTimeout(skipNow, 650);
    };

    effect.onpointerup = function(){
      if(pressTimer) clearTimeout(pressTimer);
    };

    effect.onpointercancel = function(){
      if(pressTimer) clearTimeout(pressTimer);
    };

    function done(){
      if(finished) return;
      finished = true;
      effect.onpointerdown = null;
      effect.onpointerup = null;
      effect.onpointercancel = null;
      finishEffect(resolve);
    }

    if(isSecret){
      const n = Math.floor(Math.random()*3);
      if(n === 0) playSecretTimeStop(stage,done);
      if(n === 1) playSecretMiracle(stage,done);
      if(n === 2) playSecretAwakening(stage,done);
    }else{
      const n = Math.floor(Math.random()*7);
      if(n === 0) playV7CatDashDelivery(stage,done);
      if(n === 1) playV7PawStamp(stage,done);
      if(n === 2) playV7GiftBox(stage,done);
      if(n === 3) playV7ShootingStar(stage,done);
      if(n === 4) playV7MagicCircle(stage,done);
      if(n === 5) playV7CatEyes(stage,done);
      if(n === 6) playV7MoonJump(stage,done);
    }
  });
}

function addStory(stage,text,delay){
  setTimeout(function(){
    const el = document.createElement("div");
    el.className = "storyText";
    el.textContent = text;
    stage.appendChild(el);
  }, delay || 0);
}

  addStory(stage,"黒猫が何かを運んできた…",200);
  setTimeout(()=>stage.appendChild(makeCat("catDash1")),700);
  setTimeout(()=>addEnvelope(stage),1550);

  setTimeout(()=>addBurstCore(stage),2850);

  setTimeout(done,4550);
}

}

function addManyGoldPaws(stage,count,maxDelay){
  for(let i=0;i<count;i++){
    const p = document.createElement("div");
    p.className = "goldPawRain";

    p.style.top = (-20 - Math.random()*40) + "%";

    stage.appendChild(p);

function jsonp(params){
  return new Promise((resolve,reject)=>{
    const cb = "cb_" + Date.now() + "_" + Math.floor(Math.random()*9999);
    params.callback = cb;

    const url = API_URL + "?" + new URLSearchParams(params).toString();
    const s = document.createElement("script");

    const timer = setTimeout(function(){
      delete window[cb];
      if(s && s.parentNode) s.remove();
      reject(new Error("通信タイムアウト"));
    }, 15000);

    window[cb] = function(data){
      clearTimeout(timer);
      delete window[cb];
      s.remove();
      resolve(data);
    };

    s.onerror = function(){
      clearTimeout(timer);
      delete window[cb];
      s.remove();
      reject(new Error("通信失敗"));
    };

    s.src = url;
    document.body.appendChild(s);
  });
}

async function drawGacha(){
  if(drawing) return;

  if(!profile.userId){
    alert("LINE名を確認中です。少し待ってから押してください。");
    return;
  }

  drawing = true;
  setStatus("⏳ 抽選中...");
  showPressFx();

  try{
    const res = await jsonp({
      action:"draw",
      userId:profile.userId,
      displayName:profile.displayName
    });

    hidePressFx();

    if(!res || res.ok === false){
      drawing = false;
      setDoneStatus();
      alert(res && res.message ? res.message : "今日はもう引いています。また明日ね！");
      return;
    }

    await playGachaEffect(res);
    drawing = false;
    setDoneStatus();
    showResult(res);

  }catch(e){
    drawing = false;
    hidePressFx();
    hideEffect();
    setStatus("⚠ 通信エラー");
    alert("通信エラーが出ました。少し待ってからもう一度試してください。");
  }
}

async function loadCollection(){
  if(!profile.userId){
    alert("LINE名を確認中です。少し待ってから押してください。");
    return;
  }

  showZukanOpenFx();

  try{
    const res = await jsonp({
      action:"collection",
      userId:profile.userId
    });

    if(!res || res.ok === false){
      hideZukanOpenFx();
      alert(res && res.message ? res.message : "図鑑を読み込めませんでした。");
      return;
    }

    renderCollection(res.cards || [], res.ownedCount, res.totalCount);

    setTimeout(function(){
      hideZukanOpenFx();
    }, 120);

  }catch(e){
    hideZukanOpenFx();
    alert("図鑑の通信エラーが出ました。");
  }
}

function renderCollection(cards, ownedCount, totalCount){
  const list = document.getElementById("collectionList");
  const info = document.getElementById("collectionInfo");

  list.innerHTML = "";

  const allCards = (cards || []).slice().sort(function(a,b){
    return Number(a.sortNo || 999999) - Number(b.sortNo || 999999);
  });

  const total = Number(totalCount || allCards.length || 0);
  const owned = Number(ownedCount || allCards.filter(function(c){ return !!c.owned; }).length || 0);
  const percent = total ? Math.round((owned / total) * 100) : 0;

  info.innerHTML =
    "入手済み " + owned + " / " + total + "枚　｜　" + percent + "%<br>" +
    "入団日順アルバム" +
    '<div class="bar"><span style="width:' + percent + '%"></span></div>';

  if(allCards.length === 0){
    list.innerHTML = "<div>まだシールがありません</div>";
  }else{
    allCards.forEach(function(card, index){
      const div = document.createElement("div");
      const ownedCard = !!card.owned;

      div.className =
        (card.secret ? "cardMini secretMini" : "cardMini") +
        (ownedCard ? "" : " lockedMini");

      div.setAttribute("data-no", "No." + String(index + 1).padStart(3, "0"));

      if(ownedCard){
        const img = escapeHtml(card.imageUrl);
        const name = escapeHtml(card.name || card.realName);

        div.innerHTML =
          '<img loading="lazy" src="' + img + '">' +
          '<div>' + name + '</div>';

        div.onclick = function(){
          openSealZoom(card.imageUrl, card.name || card.realName);
        };
      }else{
        div.innerHTML =
          '<div class="lockedThumb">？？？</div>' +
          '<div>未入手</div>';
      }

      list.appendChild(div);
    });
  }

  const collection = document.getElementById("collection");
  collection.style.display = "block";
  collection.classList.remove("collectionOpening");
  void collection.offsetWidth;
  collection.classList.add("collectionOpening");
}

function openSealZoom(imageUrl, name){
  if(!imageUrl) return;
  document.getElementById("zoomImg").src = imageUrl;
  document.getElementById("zoomName").textContent = name || "";
  document.getElementById("sealZoom").style.display = "flex";
}

function closeSealZoom(){
  document.getElementById("sealZoom").style.display = "none";
}

function closeCollection(){
  const collection = document.getElementById("collection");
  collection.style.display = "none";
  collection.classList.remove("collectionOpening");
}

function escapeHtml(str){
  return String(str || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function playGachaEffect(res){
  return new Promise(resolve=>{
    const isSecret = !!res.secret;
    const effect = document.getElementById("effect");
    const stage = document.getElementById("effectStage");

    effect.className = "";
    stage.innerHTML = "";
    effect.style.display = "block";

    const hint = document.createElement("div");
    hint.className = "skipHint";
    hint.textContent = "長押しでスキップ";
    stage.appendChild(hint);

    let finished = false;
    let pressTimer = null;

    function skipNow(){
      if(finished) return;
      finished = true;
      finishEffect(resolve);
    }

    effect.onpointerdown = function(){
      pressTimer = setTimeout(skipNow, 650);
    };

    effect.onpointerup = function(){
      if(pressTimer) clearTimeout(pressTimer);
    };

    effect.onpointercancel = function(){
      if(pressTimer) clearTimeout(pressTimer);
    };

    function done(){
      if(finished) return;
      finished = true;
      effect.onpointerdown = null;
      effect.onpointerup = null;
      effect.onpointercancel = null;
      finishEffect(resolve);
    }

    if(isSecret){
      const n = Math.floor(Math.random()*3);
      if(n === 0) playSecretTimeStop(stage,done);
      if(n === 1) playSecretMiracle(stage,done);
      if(n === 2) playSecretAwakening(stage,done);
    }else{
      const n = Math.floor(Math.random()*7);
      if(n === 0) playV7CatDashDelivery(stage,done);
      if(n === 1) playV7PawStamp(stage,done);
      if(n === 2) playV7GiftBox(stage,done);
      if(n === 3) playV7ShootingStar(stage,done);
      if(n === 4) playV7MagicCircle(stage,done);
      if(n === 5) playV7CatEyes(stage,done);
      if(n === 6) playV7MoonJump(stage,done);
    }
  });
}
