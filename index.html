<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>クロネコガチャ v2</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      color: #fff8e8;
      text-align: center;
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 10%, #ffe08a 0 2px, transparent 3px),
        radial-gradient(circle at 80% 20%, #fff 0 2px, transparent 3px),
        linear-gradient(180deg, #07182f, #0d2345 55%, #08111f);
      overflow-x: hidden;
    }

    .wrap {
      max-width: 430px;
      margin: 0 auto;
      padding: 18px 16px 28px;
    }

    .top-banner {
      margin: 10px auto 8px;
      background: #ffe0a8;
      color: #3a2415;
      border: 3px solid #7a4a1f;
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 900;
      box-shadow: 0 4px 0 #4b2a12;
      display: inline-block;
    }

    h1 {
      font-size: 44px;
      line-height: 1.05;
      margin: 12px 0 8px;
      color: #fff7da;
      text-shadow: 4px 4px 0 #3d2418, 0 0 18px #ffd76d;
      letter-spacing: 2px;
    }

    .welcome {
      background: #fff2d5;
      color: #4c2a14;
      border: 3px solid #7d4c22;
      border-radius: 22px;
      padding: 12px;
      margin: 12px auto;
      font-weight: 900;
      box-shadow: 0 4px 0 #4b2a12;
    }

    .stage {
      position: relative;
      margin-top: 14px;
      padding: 24px 16px 18px;
      border-radius: 28px;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.18);
      box-shadow: 0 14px 30px rgba(0,0,0,0.4);
      overflow: hidden;
    }

    .moon {
      position: absolute;
      left: 18px;
      top: 18px;
      font-size: 52px;
      filter: drop-shadow(0 0 12px #ffe59a);
    }

    .cat-main {
      font-size: 72px;
      margin-top: 12px;
      animation: floatCat 2.4s ease-in-out infinite;
    }

    @keyframes floatCat {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    button {
      width: 88%;
      border: none;
      border-radius: 999px;
      padding: 18px 12px;
      margin: 12px auto;
      display: block;
      font-size: 24px;
      font-weight: 900;
      color: white;
      cursor: pointer;
    }

    .draw-btn {
      background: linear-gradient(180deg, #ffe9aa, #ffb84c);
      color: #4b250e;
      border: 4px solid #fff4cf;
      box-shadow: 0 8px 0 #8a4a12, 0 0 18px #ffd36d;
      font-size: 30px;
    }

    .book-btn {
      background: linear-gradient(180deg, #67d7d1, #188c96);
      border: 4px solid #d8fffb;
      box-shadow: 0 8px 0 #07535a;
    }

    .drawn-btn {
      background: linear-gradient(180deg, #3b2f29, #15100d);
      color: #ffe8bd;
      border: 3px solid #a77a43;
      font-size: 19px;
      box-shadow: 0 5px 0 #000;
    }

    #message {
      margin: 14px auto;
      padding: 12px;
      border-radius: 16px;
      background: rgba(0,0,0,0.35);
      color: #fff0c8;
      font-size: 17px;
      font-weight: 900;
      white-space: pre-wrap;
    }

    #result { display: none; margin-top: 14px; }

    #cardImage {
      width: 88%;
      max-width: 310px;
      border-radius: 22px;
      background: #ddd;
      box-shadow: 0 12px 26px rgba(0,0,0,0.5);
    }

    #cardName {
      font-size: 30px;
      font-weight: 900;
      margin-top: 12px;
      color: #fff4d3;
      text-shadow: 3px 3px 0 #3d2418;
    }

    .note {
      margin-top: 16px;
      background: #fff2d5;
      color: #4c2a14;
      border-radius: 18px;
      padding: 10px;
      font-weight: 900;
      border: 2px dashed #c78b4a;
    }

    #collection {
      display: none;
      margin-top: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 12px;
    }

    .mini-card {
      background: #fff4dd;
      color: #3d2418;
      border-radius: 16px;
      padding: 9px;
      font-weight: 900;
    }

    .mini-card img {
      width: 100%;
      border-radius: 12px;
      background: #ddd;
    }

    #effect {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: rgba(5, 12, 30, 0.95);
      color: #fff4cd;
      font-size: 34px;
      font-weight: 900;
      text-shadow: 0 0 14px #ffd66d;
    }

    .effect-big {
      font-size: 76px;
      margin-bottom: 20px;
      animation: pop 0.6s infinite alternate;
    }

    @keyframes pop {
      from { transform: scale(0.9) rotate(-4deg); }
      to { transform: scale(1.15) rotate(4deg); }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top-banner">🐾 黒猫が運ぶ、特別な出会い 🐾</div>
    <h1>クロネコ<br>ガチャ</h1>

    <div class="welcome" id="welcome">LINE認証中...</div>

    <div class="stage">
      <div class="moon">🌙</div>
      <div class="cat-main">🐈‍⬛</div>

      <button class="draw-btn" id="drawBtn" onclick="drawGacha()">ガチャを引く</button>
      <button class="book-btn" onclick="showCollection()">📖 図鑑を見る</button>

      <div id="message">読み込み中...</div>

      <div id="result">
        <img id="cardImage" src="" alt="シール画像">
        <div id="cardName"></div>
      </div>

      <div id="collection">
        <h2>📖 図鑑</h2>
        <div id="collectionGrid" class="grid"></div>
      </div>

      <div class="note">※ガチャは1日1回限定（朝8時リセット）</div>
    </div>
  </div>

  <div id="effect">
    <div class="effect-big" id="effectIcon">🐾</div>
    <div id="effectText">ガチャ中...</div>
  </div>

  <script>
    const LIFF_ID = "2010515194-r0gV3TRC";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxQ32wEkjNfOTG1DBK_MYDYS8GkkBLTA_WIz-mgurf_O-hd3ugpYRbb0e-14Fs7Ctk5/exec";

    let userId = "";
    let displayName = "";

    window.onload = async function () {
      try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        userId = profile.userId;
        displayName = profile.displayName || "";

        document.getElementById("welcome").textContent =
          "🐾 " + displayName + "さん、ようこそ！";
        document.getElementById("message").textContent =
          "今日も素敵な出会いがあるよ♪";

      } catch (err) {
        document.getElementById("message").textContent =
          "LIFFエラー：" + err.message;
      }
    };

    function callGas(params, callback) {
      const cbName = "gasCallback_" + Date.now() + "_" + Math.floor(Math.random() * 10000);

      window[cbName] = function(data) {
        callback(data);
        delete window[cbName];
        script.remove();
      };

      const query = new URLSearchParams({
        ...params,
        callback: cbName
      });

      const script = document.createElement("script");
      script.src = GAS_URL + "?" + query.toString();
      script.onerror = function() {
        callback({ ok: false, message: "通信エラー：GAS URLを確認してください" });
        delete window[cbName];
        script.remove();
      };

      document.body.appendChild(script);
    }

    function drawGacha() {
      if (!userId) {
        document.getElementById("message").textContent = "LINE認証中です。少し待ってください。";
        return;
      }

      playRandomEffect();

      callGas({
        action: "draw",
        userId: userId,
        displayName: displayName
      }, function(data) {
        setTimeout(function() {
          hideEffect();

          if (!data.ok) {
            document.getElementById("message").textContent = data.message || "ガチャに失敗しました";

            if (data.alreadyDrawn) {
              setDrawnButton();
            }

            return;
          }

          showCard(data.card);
        }, 1200);
      });
    }

    function showCard(card) {
      document.getElementById("collection").style.display = "none";
      document.getElementById("result").style.display = "block";

      document.getElementById("cardImage").src = card.imageUrl;
      document.getElementById("cardName").textContent = card.name;

      if (card.type === "secret") {
        secretEffect();
        document.getElementById("message").textContent = "✨ シークレットシール出現 ✨";
      } else {
        document.getElementById("message").textContent = "シールをゲットしました🐾";
      }

      setDrawnButton();
    }

    function showCollection() {
      if (!userId) {
        document.getElementById("message").textContent = "LINE認証中です。少し待ってください。";
        return;
      }

      document.getElementById("message").textContent = "図鑑を読み込み中...";

      callGas({
        action: "collection",
        userId: userId
      }, function(data) {
        if (!data.ok) {
          document.getElementById("message").textContent = data.message || "図鑑取得に失敗しました";
          return;
        }

        const grid = document.getElementById("collectionGrid");
        grid.innerHTML = "";

        if (!data.collection || data.collection.length === 0) {
          grid.innerHTML = "<p>まだシールがありません</p>";
        } else {
          data.collection.forEach(function(card) {
            const div = document.createElement("div");
            div.className = "mini-card";
            div.innerHTML =
              '<img src="' + card.imageUrl + '" alt="' + card.name + '">' +
              '<div>' + card.name + '</div>';
            grid.appendChild(div);
          });
        }

        document.getElementById("result").style.display = "none";
        document.getElementById("collection").style.display = "block";
        document.getElementById("message").textContent = "図鑑を表示しました🐾";
      });
    }

    function setDrawnButton() {
      const btn = document.getElementById("drawBtn");
      btn.className = "drawn-btn";
      btn.textContent = "本日分は受け取り済みです";
      btn.disabled = true;
    }

    function playRandomEffect() {
      const effects = [
        ["🐾", "肉球が近づいてくる…"],
        ["🐈‍⬛", "黒猫がカードを運んでいます…"],
        ["✨", "キラキラが集まっています…"],
        ["💣", "ドキドキ爆発準備中…"],
        ["🌙", "月明かりがシールを照らす…"]
      ];

      const e = effects[Math.floor(Math.random() * effects.length)];
      showEffect(e[0], e[1]);
    }

    function showEffect(icon, text) {
      document.getElementById("effectIcon").textContent = icon;
      document.getElementById("effectText").textContent = text;
      document.getElementById("effect").style.display = "flex";
    }

    function hideEffect() {
      document.getElementById("effect").style.display = "none";
    }

    function secretEffect() {
      showEffect("🌈", "シークレット降臨！！");
      setTimeout(hideEffect, 1200);
    }
  </script>
</body>
</html>
