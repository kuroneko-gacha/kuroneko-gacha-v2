<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<title>クロネコガチャ Ver.5.3 完全版</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js">
/* ===== Ver.5 追加JS：演出強化・図鑑並び順 ===== */

function normalizeJoinDateValue(value){
  const s = String(value || "").trim();
  const m = s.match(/(\d{1,2})\s*[\/月]\s*(\d{1,2})/);
  if(!m) return 9999;
  return Number(m[1]) * 100 + Number(m[2]);
}

function specialMemberOrder(name){
  const n = String(name || "").trim();
  if(n === "ホタル") return 1;
  if(n === "ゆき茶。" || n === "ゆき茶") return 2;
  return 999;
}

function sortCollectionCards(cards){
  return (cards || []).slice().sort(function(a,b){
    const sa = Number(a.sortNo || a.no || 0);
    const sb = Number(b.sortNo || b.no || 0);
    if(sa && sb && sa !== sb) return sa - sb;
    if(sa && !sb) return -1;
    if(!sa && sb) return 1;

    const pa = specialMemberOrder(a.name);
    const pb = specialMemberOrder(b.name);
    if(pa !== pb) return pa - pb;

    const ja = normalizeJoinDateValue(a.joinDate);
    const jb = normalizeJoinDateValue(b.joinDate);
    if(ja !== jb) return ja - jb;

    return String(a.name || "").localeCompare(String(b.name || ""), "ja");
  });
}

function renderCollection(cards){
  const list = document.getElementById("collectionList");
  list.innerHTML = "";

  const allCards = (cards || []).slice().sort(function(a,b){
    return Number(a.sortNo || 999999) - Number(b.sortNo || 999999);
  });

  let info = document.getElementById("collectionInfo");
  if(!info){
    info = document.createElement("div");
    info.id = "collectionInfo";
    const title = document.querySelector("#collection h2");
    if(title && title.parentNode){
      title.parentNode.insertBefore(info, title.nextSibling);
    }
  }

  const total = allCards.length;
  const owned = allCards.filter(function(c){ return !!c.owned; }).length;
  const percent = total ? Math.round((owned / total) * 100) : 0;

  info.innerHTML =
    "入手済み " + owned + " / " + total + "枚　｜　" + percent + "%<br>" +
    "入団日順アルバム" +
    '<div class="bar"><span style="width:' + percent + '%"></span></div>';

  if(allCards.length === 0){
    list.innerHTML = "<div>まだシールがありません</div>";
  }else{
    allCards.forEach(function(card, index){
      const div = document.createElement("div");
      const ownedCard = !!card.owned;

      div.className =
        (card.secret ? "cardMini secretMini" : "cardMini") +
        (ownedCard ? "" : " lockedMini");

      div.setAttribute("data-no", "No." + String(index + 1).padStart(3, "0"));

      if(ownedCard){
        const img = escapeHtml(card.imageUrl);
        const name = escapeHtml(card.name || card.realName);

        div.innerHTML =
          '<img loading="lazy" src="' + img + '">' +
          '<div>' + name + '</div>';

        div.onclick = function(){
          openSealZoom(card.imageUrl, card.name || card.realName);
        };
      }else{
        div.innerHTML =
          '<div class="lockedThumb">？</div>' +
          '<div>未入手</div>';
      }

      list.appendChild(div);
    });
  }

  const collection = document.getElementById("collection");
  collection.style.display = "block";
  collection.classList.remove("collectionOpening");
  void collection.offsetWidth;
  collection.classList.add("collectionOpening");
}

function openSealZoom(imageUrl, name){
  document.getElementById("zoomImg").src = imageUrl;
  document.getElementById("zoomName").textContent = name || "";
  document.getElementById("sealZoom").style.display = "flex";
}

function closeSealZoom(){
  document.getElementById("sealZoom").style.display = "none";
}

function closeCollection(){
  const collection = document.getElementById("collection");
  collection.style.display = "none";
  collection.classList.remove("collectionOpening");
}

function escapeHtml(str){
  return String(str || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function renderCollection(cards){
  const list = document.getElementById("collectionList");
  list.innerHTML = "";

  const sorted = sortCollectionCards(cards || []);

  let info = document.getElementById("collectionInfo");
  if(!info){
    info = document.createElement("div");
    info.id = "collectionInfo";
    const title = document.querySelector("#collection h2");
    if(title && title.parentNode){
      title.parentNode.insertBefore(info, title.nextSibling);
    }
  }

  const total = sorted.length;
  info.textContent = total > 0
    ? "入手済み " + total + "枚　｜　入団順アルバム"
    : "まだシールがありません";

  if(sorted.length === 0){
    list.innerHTML = "<div>まだシールがありません</div>";
  }else{
    sorted.forEach(function(card, index){
      const div = document.createElement("div");
      div.className = card.secret ? "cardMini secretMini" : "cardMini";
      div.setAttribute("data-no", "No." + String(index + 1).padStart(3, "0"));

      const img = escapeHtml(card.imageUrl);
      const name = escapeHtml(card.name);

      div.innerHTML =
        '<img src="' + img + '">' +
        '<div>' + name + '</div>';

      div.onclick = function(){
        openSealZoom(card.imageUrl, card.name);
      };

      list.appendChild(div);
    });
  }

  const collection = document.getElementById("collection");
  collection.style.display = "block";
  collection.classList.remove("collectionOpening");
  void collection.offsetWidth;
  collection.classList.add("collectionOpening");
}

function playGachaEffect(res){
  return new Promise(resolve=>{
    const isSecret = !!res.secret;
    const effect = document.getElementById("effect");
    const stage = document.getElementById("effectStage");

    effect.className = "";
    stage.innerHTML = "";
    effect.style.display = "block";

    if(isSecret){
      playSecretUltimate(stage,resolve);
    }else{
      const n = Math.floor(Math.random()*10);
      if(n === 0) playDashPaw(stage,resolve);
      if(n === 1) playChestStars(stage,resolve);
      if(n === 2) playMoonCat(stage,resolve);
      if(n === 3) playPawRing(stage,resolve);
      if(n === 4) playStarRainCard(stage,resolve);
      if(n === 5) playDoubleCat(stage,resolve);
      if(n === 6) playGiftExplosion(stage,resolve);
      if(n === 7) playCatStorm(stage,resolve);
      if(n === 8) playCrackBurst(stage,resolve);
      if(n === 9) playCatAwakening(stage,resolve);
    }
  });
}

function playGiftExplosion(stage,done){
  const gift = document.createElement("div");
  gift.className = "giftBox";
  gift.innerHTML = '<div class="giftRibbon"></div>';
  stage.appendChild(gift);
  addManyStars(stage,30,1.4);
  setTimeout(()=>addManyPaws(stage,16,1.0),500);
  setTimeout(()=>addBurstCore(stage),2100);
  setTimeout(()=>addCardSilhouette(stage),2550);
  setTimeout(()=>finishEffect(done),4050);
}

function playCatStorm(stage,done){
  for(let i=0;i<4;i++){
    setTimeout(function(){
      stage.appendChild(makeCat(i % 2 === 0 ? "catDash1" : "catDash2"));
    }, i * 330);
  }
  addManyPaws(stage,28,1.6);
  addManyStars(stage,34,1.8);
  setTimeout(()=>addCardSilhouette(stage),2850);
  setTimeout(()=>finishEffect(done),4400);
}

function playCrackBurst(stage,done){
  addManyStars(stage,24,1.0);
  setTimeout(()=>addBurstCore(stage),900);
  setTimeout(()=>addScreenCrack(stage),1500);
  setTimeout(()=>addManyPaws(stage,18,1.0),1700);
  setTimeout(()=>addCardSilhouette(stage),2550);
  setTimeout(()=>finishEffect(done),4050);
}

function playCatAwakening(stage,done){
  const shadow = document.createElement("div");
  shadow.className = "catShadow";
  stage.appendChild(shadow);
  const ring = document.createElement("div");
  ring.className = "magicRing";
  stage.appendChild(ring);
  addManyStars(stage,38,1.7);
  setTimeout(()=>stage.appendChild(makeCat("catDash1")),1450);
  setTimeout(()=>addCardSilhouette(stage),2750);
  setTimeout(()=>finishEffect(done),4300);
}

function playSecretUltimate(stage,done){
  const effect = document.getElementById("effect");
  effect.classList.add("secretMode");

  const title = document.createElement("div");
  title.className = "secretTitle";
  title.textContent = "SECRET CHANCE";
  stage.appendChild(title);

  const aura = document.createElement("div");
  aura.className = "secretAura";
  stage.appendChild(aura);

  const shadow = document.createElement("div");
  shadow.className = "catShadow";
  stage.appendChild(shadow);

  const bolt1 = document.createElement("div");
  bolt1.className = "lightning";
  bolt1.style.left = "38%";
  stage.appendChild(bolt1);

  const bolt2 = document.createElement("div");
  bolt2.className = "lightning";
  bolt2.style.left = "62%";
  bolt2.style.animationDelay = ".25s";
  stage.appendChild(bolt2);

  const ring = document.createElement("div");
  ring.className = "magicRing";
  stage.appendChild(ring);

  setTimeout(()=>stage.appendChild(makeCat("catDash1")),350);
  setTimeout(()=>stage.appendChild(makeCat("catDash2")),780);
  setTimeout(()=>addScreenCrack(stage),1900);
  setTimeout(()=>addBurstCore(stage),2500);

  addManyStars(stage,80,2.6);
  addManyPaws(stage,34,2.0);

  setTimeout(()=>addCardSilhouette(stage),3550);
  setTimeout(()=>finishEffect(done),5350);
}

function addBurstCore(stage){
  const b = document.createElement("div");
  b.className = "burstCore";
  stage.appendChild(b);
}

function addScreenCrack(stage){
  const c = document.createElement("div");
  c.className = "screenCrack";
  stage.appendChild(c);
}

function addSmoke(stage,count){
  for(let i=0;i<count;i++){
    const s = document.createElement("div");
    s.className = "smokeCloud";
    s.style.left = (15 + Math.random()*70) + "%";
    s.style.top = (52 + Math.random()*25) + "%";
    s.style.animationDelay = (Math.random()*.6) + "s";
    stage.appendChild(s);
  }
}
