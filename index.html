<script> const LIFF_ID = "2010515194-r0gV3TRC"; const API_URL = "https://script.google.com/macros/s/AKfycbxQ32wEkjNf0TG1DBK_MYDYS8GkkBLTA_WIz-mgurf_O-hd3ugpYRbb0e-14Fs7Ctk5/exec"; let profile = { userId:"", displayName:"" }; let drawing = false; let lastDrawnCardId = ""; let lastDrawnImageUrl = ""; let lastDrawnName = ""; let pendingNewCardId = ""; let pendingNewImageUrl = ""; let pendingNewName = ""; let dailyLimit = 2; let dailyRemaining = 2; let soundEnabled = true; try{ soundEnabled = localStorage.getItem("kuronekoSound") !== "off"; }catch(e){} try{ lastDrawnCardId = sessionStorage.getItem("lastDrawnCardId") || ""; lastDrawnImageUrl = sessionStorage.getItem("lastDrawnImageUrl") || ""; lastDrawnName = sessionStorage.getItem("lastDrawnName") || ""; pendingNewCardId = sessionStorage.getItem("pendingNewCardId") || ""; pendingNewImageUrl = sessionStorage.getItem("pendingNewImageUrl") || ""; pendingNewName = sessionStorage.getItem("pendingNewName") || ""; }catch(e){} window.onload = async function(){ setTopSpeech(); try{ await liff.init({ liffId: LIFF_ID }); if(!liff.isLoggedIn()){ liff.login(); return; } const p = await liff.getProfile(); profile.userId = p.userId; profile.displayName = p.displayName; console.log("LINE名取得成功:", profile.displayName); setReadyStatus(); refreshDailyStatus(); }catch(e){ console.error(e); alert("LINE名の取得に失敗しました。LINE内から開いてください。"); } }; function setTopSpeech(){ const line1 = document.getElementById("topSpeechLine1"); const line2 = document.getElementById("topSpeechLine2"); if(!line1 || !line2) return; const messages = [ ["今日の運試し！", "何が出るかな♪"], ["黒猫がお届け♪", "ワクワクの1枚"], ["シークレットの予感…", "出たらラッキー♪"], ["図鑑コンプへ！", "少しずつ集めよう"], ["今日もまったり♪", "楽しんでいこう"], ["素敵な出会いを", "黒猫が運ぶよ♪"] ]; const m = messages[Math.floor(Math.random() * messages.length)]; line1.textContent = m[0]; line2.textContent = m[1]; } function setReadyStatus(){ const messages = [ "🌙 黒猫があなたを待っています", "✨ シークレットの気配…？", "🐾 今日も仲間を増やそう！", "🎁 新しい出会いが待ってるにゃ♪", "⭐ 図鑑コンプリートを目指そう！", "💎 レアな一枚が眠っているかも…", "🍀 幸運チャージ中…", "🐈 今日の運試し、いってみよう！" ]; setStatus(messages[Math.floor(Math.random() * messages.length)]); } function setDoneStatus(){ setStatus("✅ 本日は受け取り済みです"); } function setStatus(text){ const el = document.getElementById("statusText"); if(el) el.textContent = text; } function showPressFx(){ const el = document.getElementById("pressFx"); if(el) el.style.display = "block"; } function hidePressFx(){ const el = document.getElementById("pressFx"); if(el) el.style.display = "none"; } function jsonp(params){ return new Promise((resolve,reject)=>{ const cb = "cb_" + Date.now() + "_" + Math.floor(Math.random()*9999); params.callback = cb; const url = API_URL + "?" + new URLSearchParams(params).toString(); const s = document.createElement("script"); const timer = setTimeout(function(){ delete window[cb]; if(s && s.parentNode) s.remove(); reject(new Error("通信タイムアウト")); }, 15000); window[cb] = function(data){ clearTimeout(timer); delete window[cb]; s.remove(); resolve(data); }; s.onerror = function(){ clearTimeout(timer); delete window[cb]; s.remove(); reject(new Error("通信失敗")); }; s.src = url; document.body.appendChild(s); }); } async function refreshDailyStatus(){ if(!profile.userId) return; try{ const res = await jsonp({ action:"status", userId:profile.userId }); if(res && res.ok){ updateDailyLimitText(Number(res.remaining || 0), Number(res.dailyLimit || 2)); } }catch(e){ setDailyLimitText("🎁 あと2回引けるにゃー♪"); } } function updateDailyLimitText(remaining, limit){ dailyLimit = limit || 2; dailyRemaining = remaining; if(remaining <= 0){ setDailyLimitText("🐾 今日はもう引いてるにゃー"); }else{ setDailyLimitText("🎁 あと" + remaining + "回引けるにゃー♪"); } } function setDailyLimitText(text){ const el = document.getElementById("dailyLimitText"); if(el) el.textContent = text; } async function drawGacha(){ if(drawing) return; if(!profile.userId){ alert("LINE名を確認中です。少し待ってから押してください。"); return; } drawing = true; setStatus("⏳ 抽選中..."); showPressFx(); try{ const res = await jsonp({ action:"draw", userId:profile.userId, displayName:profile.displayName }); hidePressFx(); if(!res || res.ok === false){ drawing = false; if(res && typeof res.remaining !== "undefined"){ updateDailyLimitText(Number(res.remaining || 0), Number(res.dailyLimit || dailyLimit)); }else{ setDailyLimitText("🐾 今日はもう引いてるにゃー"); } setDoneStatus(); alert(res && res.message ? res.message : "今日はもう引いてるにゃー🐾"); return; } if(typeof res.remaining !== "undefined"){ updateDailyLimitText(Number(res.remaining || 0), Number(res.dailyLimit || dailyLimit)); } await playGachaEffect(res); drawing = false; setDoneStatus(); showResult(res); }catch(e){ drawing = false; hidePressFx(); hideEffect(); setStatus("⚠ 通信エラー"); alert("通信エラーが出ました。少し待ってからもう一度試してください。"); } } 
function playGachaEffect(res){
  return new Promise(function(resolve){
    const effect = document.getElementById("effect");
    const stage = document.getElementById("effectStage");
    if(!effect || !stage){ resolve(); return; }

    const isSuper = !!(res && (res.supersecret || String(res.type || "").toLowerCase() === "supersecret" || /^9\d\d/.test(String(res.id || ""))));
    const isSecret = !!(res && res.secret);

    effect.className = isSuper ? "kv25Effect kv25Super" : (isSecret ? "kv25Effect kv25Secret" : "kv25Effect");
    stage.innerHTML = "";
    effect.style.display = "block";

    kv25Skip(stage);

    let finished = false;
    let pressTimer = null;
    function done(){
      if(finished) return;
      finished = true;
      effect.onpointerdown = null;
      effect.onpointerup = null;
      effect.onpointercancel = null;
      finishEffect(resolve);
    }
    effect.onpointerdown = function(){ pressTimer = setTimeout(done, 650); };
    effect.onpointerup = function(){ if(pressTimer) clearTimeout(pressTimer); };
    effect.onpointercancel = function(){ if(pressTimer) clearTimeout(pressTimer); };

    if(isSuper){
      kv25Sfx("super");
      kv25Vibrate([90,35,130,45,180,60,230]);
      kv25Super900(stage, done);
      return;
    }

    if(isSecret){
      kv25Sfx("secret");
      kv25Vibrate([70,35,110,40,150]);
      const n = Math.floor(Math.random()*3);
      if(n === 0) kv25SecretPrismStorm(stage, done);
      if(n === 1) kv25SecretClockShatter(stage, done);
      if(n === 2) kv25SecretRoyalGate(stage, done);
      return;
    }

    kv25Sfx("sparkle");
    kv25Vibrate([25]);
    const n = Math.floor(Math.random()*7);
    if(n === 0) kv25NormalDrop(stage, done);
    if(n === 1) kv25NormalZoom(stage, done);
    if(n === 2) kv25NormalShuffle(stage, done);
    if(n === 3) kv25NormalTear(stage, done);
    if(n === 4) kv25NormalMagicRise(stage, done);
    if(n === 5) kv25NormalGate(stage, done);
    if(n === 6) kv25NormalCrack(stage, done);
  });
}

function kv25Skip(stage){
  const h=document.createElement("div");
  h.className="kv25Skip";
  h.textContent="長押しでスキップ";
  stage.appendChild(h);
}
function kv25Cutin(stage,text,delay){
  setTimeout(function(){
    const e=document.createElement("div");
    e.className="kv25Cutin";
    e.textContent=text;
    stage.appendChild(e);
