<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クロネコガチャ v2</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{
  margin:0;
  background:linear-gradient(#0b1220,#050914);
  color:white;
  font-family:Arial,"Hiragino Sans","Meiryo",sans-serif;
  text-align:center;
}
.wrap{padding:28px 18px;max-width:520px;margin:auto}
h1{
  font-size:34px;
  color:#facc15;
  text-shadow:0 0 16px #facc15;
}
.sub{color:#cbd5e1;font-size:16px}
.box{
  margin-top:24px;
  padding:24px 16px;
  border-radius:24px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.18);
}
#welcome{
  font-size:22px;
  color:#fde68a;
  margin:8px 0 20px;
}
button{
  border:none;
  border-radius:20px;
  padding:18px 34px;
  font-size:24px;
  font-weight:bold;
  margin:10px;
  background:linear-gradient(#facc15,#f97316);
  color:#111827;
  box-shadow:0 8px 0 #9a3412;
}
button:active{transform:translateY(5px);box-shadow:0 3px 0 #9a3412}
.small{
  font-size:18px;
  padding:12px 20px;
  background:linear-gradient(#38bdf8,#2563eb);
  color:white;
  box-shadow:0 6px 0 #1e3a8a;
}
#msg{
  margin-top:18px;
  font-size:20px;
  color:#fde68a;
}
#cardArea{display:none;margin-top:22px}
#cardImg{
  width:92%;
  max-width:360px;
  border-radius:18px;
  background:white;
  box-shadow:0 0 30px #facc15;
}
#cardName{
  margin-top:14px;
  font-size:28px;
  font-weight:bold;
  color:#facc15;
}
#effect{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:999;
}
#cat{
  width:230px;
  max-width:70vw;
  animation:float 1s infinite alternate;
  filter:drop-shadow(0 0 24px #facc15);
}
#effectText{
  margin-top:24px;
  font-size:36px;
  font-weight:bold;
  color:#facc15;
  text-shadow:0 0 18px #facc15;
}
@keyframes float{
  from{transform:translateY(0) scale(1)}
  to{transform:translateY(-18px) scale(1.05)}
}
.pop{animation:pop .45s ease}
@keyframes pop{
  0%{transform:scale(.4);opacity:0}
  80%{transform:scale(1.08);opacity:1}
  100%{transform:scale(1)}
}
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  margin-top:18px;
}
.mini{
  background:rgba(255,255,255,.1);
  border-radius:16px;
  padding:8px;
}
.mini img{
  width:100%;
  border-radius:12px;
  background:white;
}
#collection{display:none}
</style>
</head>

<body>
<div class="wrap">
  <h1>🐾 クロネコガチャ v2 🐾</h1>
  <div class="sub">1日1回だけ引けるサークル用シールガチャ</div>

  <div class="box">
    <div id="welcome">LINE名を確認中...</div>

    <button id="drawBtn" onclick="drawGacha()" disabled>ガチャを引く！</button>
    <br>
    <button class="small" onclick="loadCollection()">図鑑を見る</button>
    <button class="small" onclick="closeCollection()">図鑑を閉じる</button>

    <div id="msg"></div>

    <div id="cardArea">
      <img id="cardImg">
      <div id="cardName"></div>
    </div>
  </div>

  <div id="collection" class="box">
    <h2>📚 シール図鑑</h2>
    <div id="collectionList" class="grid"></div>
  </div>
</div>

<div id="effect">
  <img id="cat" src="https://i.ibb.co/xqQLHrDz/a7c2f872-3116-4bca-b94d-e9a4c80e6650.png">
  <div id="effectText">クロネコが運んでくる...</div>
</div>

<script>
const LIFF_ID = "2010515194-r0gV3TRC";
const API_URL = "https://script.google.com/macros/s/AKfycbxQ32wEkjNf0TG1DBK_MYDYS8GkkBLTA_WIz-mgurf_O-hd3ugpYRbb0e-14Fs7Ctk5/exec";

let profile = {
  userId:"",
  displayName:""
};

window.onload = async function(){
  try{
    await liff.init({ liffId: LIFF_ID });

    if(!liff.isLoggedIn()){
      liff.login();
      return;
    }

    const p = await liff.getProfile();
    profile.userId = p.userId;
    profile.displayName = p.displayName;

    document.getElementById("welcome").textContent =
      profile.displayName + "さん、ようこそ！";

    document.getElementById("drawBtn").disabled = false;
    setMsg("");

  }catch(e){
    console.error(e);
    setMsg("LINE名の取得に失敗しました。LINE内から開いてください。");
    document.getElementById("welcome").textContent = "読み込みエラー";
  }
};

function setMsg(t){
  document.getElementById("msg").textContent = t;
}

function jsonp(params){
  return new Promise((resolve,reject)=>{
    const cb = "cb_" + Date.now() + "_" + Math.floor(Math.random()*9999);
    params.callback = cb;

    const url = API_URL + "?" + new URLSearchParams(params).toString();
    const s = document.createElement("script");

    window[cb] = function(data){
      delete window[cb];
      s.remove();
      resolve(data);
    };

    s.onerror = function(){
      delete window[cb];
      s.remove();
      reject(new Error("通信失敗"));
    };

    s.src = url;
    document.body.appendChild(s);
  });
}

async function drawGacha(){
  if(!profile.userId){
    setMsg("LINE名を取得中です。少し待ってね。");
    return;
  }

  document.getElementById("drawBtn").disabled = true;
  document.getElementById("cardArea").style.display = "none";
  setMsg("");

  showEffect();

  try{
    const res = await jsonp({
      action:"draw",
      userId:profile.userId,
      displayName:profile.displayName
    });

    setTimeout(()=>{
      hideEffect();
      document.getElementById("drawBtn").disabled = false;

      if(!res || res.ok === false){
        setMsg(res && res.message ? res.message : "ガチャに失敗しました。");
        return;
      }

      showCard(res);
    },1800);

  }catch(e){
    hideEffect();
    document.getElementById("drawBtn").disabled = false;
    setMsg("通信エラー。Code.gs側を確認してね。");
  }
}

function showEffect(){
  const texts = [
    "クロネコが走ってきた...",
    "肉球が光っている...",
    "小ネコたちが集まった...",
    "シールの気配がする...",
    "開封準備中..."
  ];

  document.getElementById("effectText").textContent =
    texts[Math.floor(Math.random()*texts.length)];

  document.getElementById("effect").style.display = "flex";

  setTimeout(()=>{
    document.getElementById("effectText").textContent = "開封！！";
  },1000);
}

function hideEffect(){
  document.getElementById("effect").style.display = "none";
}

function showCard(res){
  document.getElementById("cardImg").src = res.imageUrl;
  document.getElementById("cardName").textContent = res.name;
  document.getElementById("cardArea").classList.remove("pop");
  void document.getElementById("cardArea").offsetWidth;
  document.getElementById("cardArea").classList.add("pop");
  document.getElementById("cardArea").style.display = "block";

  setMsg(res.isNew ? "🎉 NEW SEAL GET！！" : "また会えたね！");
}

async function loadCollection(){
  if(!profile.userId){
    setMsg("LINE名を取得中です。少し待ってね。");
    return;
  }

  setMsg("図鑑を読み込み中...");

  try{
    const res = await jsonp({
      action:"collection",
      userId:profile.userId
    });

    if(!res || res.ok === false){
      setMsg(res && res.message ? res.message : "図鑑を読み込めませんでした。");
      return;
    }

    renderCollection(res.cards || []);
    setMsg("");

  }catch(e){
    setMsg("図鑑の通信エラー。");
  }
}

function renderCollection(cards){
  const box = document.getElementById("collection");
  const list = document.getElementById("collectionList");

  box.style.display = "block";
  list.innerHTML = "";

  if(cards.length === 0){
    list.innerHTML = "<div>まだシールがありません</div>";
    return;
  }

  cards.forEach(card=>{
    const div = document.createElement("div");
    div.className = "mini";
    div.innerHTML =
      `<img src="${escapeHtml(card.imageUrl)}">
       <div>${escapeHtml(card.name)}</div>
       <div>${escapeHtml(card.joinDate || "")}</div>`;
    list.appendChild(div);
  });
}

function closeCollection(){
  document.getElementById("collection").style.display = "none";
}

function escapeHtml(str){
  return String(str || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}
</script>
</body>
</html>
