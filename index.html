<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クロネコガチャ v2</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
html,body{
  margin:0;
  padding:0;
  background:#020617;
  font-family:"Hiragino Sans","Meiryo",sans-serif;
  overflow-x:hidden;
}

#app{
  position:relative;
  width:100%;
  max-width:430px;
  margin:0 auto;
  min-height:100vh;
  background:#020617;
}

#topImg{
  width:100%;
  display:block;
  user-select:none;
  pointer-events:none;
}

.tap{
  position:absolute;
  border:none;
  background:rgba(255,255,255,0);
  cursor:pointer;
  z-index:5;
}

#drawTap{
  left:18%;
  top:45.5%;
  width:64%;
  height:21%;
  border-radius:50%;
}

#bookTap{
  left:13%;
  top:76.5%;
  width:74%;
  height:8%;
  border-radius:20px;
}

#welcome{
  position:absolute;
  left:19%;
  top:31.2%;
  width:62%;
  text-align:center;
  color:#5b351d;
  font-weight:bold;
  font-size:15px;
  z-index:6;
  line-height:1.4;
  pointer-events:none;
}

#message{
  position:absolute;
  left:12%;
  top:86.8%;
  width:76%;
  text-align:center;
  color:#fff7d6;
  font-weight:bold;
  font-size:16px;
  z-index:6;
  pointer-events:none;
}

#effect{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.88);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:100;
}

#effectCat{
  width:210px;
  max-width:65vw;
  filter:drop-shadow(0 0 25px #facc15);
  animation:float 1s infinite alternate;
}

#effectText{
  margin-top:22px;
  font-size:34px;
  font-weight:bold;
  color:#facc15;
  text-shadow:0 0 18px #facc15;
}

@keyframes float{
  from{transform:translateY(0) scale(1);}
  to{transform:translateY(-18px) scale(1.07);}
}

#result{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.86);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:120;
  padding:20px;
  box-sizing:border-box;
}

#resultImg{
  width:86%;
  max-width:360px;
  border-radius:18px;
  background:white;
  box-shadow:0 0 35px #facc15;
  animation:pop .45s ease;
}

#resultName{
  margin-top:16px;
  color:#facc15;
  font-size:28px;
  font-weight:bold;
  text-shadow:0 0 12px #facc15;
}

#resultMsg{
  margin-top:8px;
  color:#fff;
  font-size:18px;
  font-weight:bold;
}

#closeResult{
  margin-top:18px;
  padding:12px 28px;
  border:none;
  border-radius:999px;
  font-size:18px;
  font-weight:bold;
  background:#facc15;
  color:#3b2408;
}

@keyframes pop{
  0%{transform:scale(.35);opacity:0;}
  80%{transform:scale(1.08);opacity:1;}
  100%{transform:scale(1);}
}

#collection{
  position:fixed;
  inset:0;
  background:rgba(2,6,23,.96);
  display:none;
  z-index:130;
  overflow-y:auto;
  padding:20px;
  box-sizing:border-box;
  color:white;
}

#collection h2{
  text-align:center;
  color:#facc15;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.cardMini{
  background:rgba(255,255,255,.1);
  border-radius:14px;
  padding:8px;
  text-align:center;
}

.cardMini img{
  width:100%;
  border-radius:10px;
  background:white;
}

#closeCollection{
  width:100%;
  margin:18px 0;
  padding:14px;
  border:none;
  border-radius:16px;
  font-size:18px;
  font-weight:bold;
  background:#38bdf8;
  color:white;
}
</style>
</head>

<body>
<div id="app">
  <img id="topImg" src="https://github.com/kuroneko-gacha/kuroneko-gacha-v2/blob/main/33e5c8ed-3a7d-4f64-ad75-060ed57ebefb%20(1).png?raw=true">

  <div id="welcome">LINE名を確認中...</div>
  <div id="message">読み込み中...</div>

  <button id="drawTap" class="tap" onclick="drawGacha()" aria-label="ガチャを引く"></button>
  <button id="bookTap" class="tap" onclick="loadCollection()" aria-label="図鑑を見る"></button>
</div>

<div id="effect">
  <img id="effectCat" src="https://i.ibb.co/xqQLHrDz/a7c2f872-3116-4bca-b94d-e9a4c80e6650.png">
  <div id="effectText">クロネコが運んでくる...</div>
</div>

<div id="result">
  <img id="resultImg">
  <div id="resultName"></div>
  <div id="resultMsg"></div>
  <button id="closeResult" onclick="closeResult()">閉じる</button>
</div>

<div id="collection">
  <h2>📚 シール図鑑</h2>
  <div id="collectionList" class="grid"></div>
  <button id="closeCollection" onclick="closeCollection()">図鑑を閉じる</button>
</div>

<script>
const LIFF_ID = "2010515194-r0gV3TRC";
const API_URL = "https://script.google.com/macros/s/AKfycbxQ32wEkjNf0TG1DBK_MYDYS8GkkBLTA_WIz-mgurf_O-hd3ugpYRbb0e-14Fs7Ctk5/exec";

let profile = {
  userId:"",
  displayName:""
};

let drawing = false;

window.onload = async function(){
  try{
    await liff.init({ liffId: LIFF_ID });

    if(!liff.isLoggedIn()){
      liff.login();
      return;
    }

    const p = await liff.getProfile();
    profile.userId = p.userId;
    profile.displayName = p.displayName;

    document.getElementById("welcome").innerHTML =
      escapeHtml(profile.displayName) + "さん、ようこそ！<br>今日も素敵な出会いがあるよ♪";

    setMessage("ガチャは1日1回限定（朝8時リセット）");

  }catch(e){
    console.error(e);
    document.getElementById("welcome").textContent = "LINE名の取得に失敗しました";
    setMessage("LINE内から開いてください");
  }
};

function setMessage(text){
  document.getElementById("message").textContent = text;
}

function jsonp(params){
  return new Promise((resolve,reject)=>{
    const cb = "cb_" + Date.now() + "_" + Math.floor(Math.random()*9999);
    params.callback = cb;

    const url = API_URL + "?" + new URLSearchParams(params).toString();
    const s = document.createElement("script");

    window[cb] = function(data){
      delete window[cb];
      s.remove();
      resolve(data);
    };

    s.onerror = function(){
      delete window[cb];
      s.remove();
      reject(new Error("通信失敗"));
    };

    s.src = url;
    document.body.appendChild(s);
  });
}

async function drawGacha(){
  if(drawing) return;

  if(!profile.userId){
    setMessage("LINE名を確認中です");
    return;
  }

  drawing = true;
  showEffect();

  try{
    const res = await jsonp({
      action:"draw",
      userId:profile.userId,
      displayName:profile.displayName
    });

    setTimeout(function(){
      hideEffect();
      drawing = false;

      if(!res || res.ok === false){
        setMessage(res && res.message ? res.message : "今日はもう引いています");
        return;
      }

      showResult(res);
      setMessage("本日分は受け取り済みです");
    },1800);

  }catch(e){
    hideEffect();
    drawing = false;
    setMessage("通信エラー");
  }
}

function showEffect(){
  const texts = [
    "クロネコが走ってきた...",
    "肉球が光っている...",
    "シールの気配がする...",
    "小ネコたちが集まった...",
    "開封準備中..."
  ];

  document.getElementById("effectText").textContent =
    texts[Math.floor(Math.random()*texts.length)];

  document.getElementById("effect").style.display = "flex";

  setTimeout(function(){
    document.getElementById("effectText").textContent = "開封！！";
  },1000);
}

function hideEffect(){
  document.getElementById("effect").style.display = "none";
}

function showResult(res){
  document.getElementById("resultImg").src = res.imageUrl;
  document.getElementById("resultName").textContent = res.name;
  document.getElementById("resultMsg").textContent =
    res.isNew ? "🎉 NEW SEAL GET！！" : "また会えたね！";
  document.getElementById("result").style.display = "flex";
}

function closeResult(){
  document.getElementById("result").style.display = "none";
}

async function loadCollection(){
  if(!profile.userId){
    setMessage("LINE名を確認中です");
    return;
  }

  setMessage("図鑑を読み込み中...");

  try{
    const res = await jsonp({
      action:"collection",
      userId:profile.userId
    });

    if(!res || res.ok === false){
      setMessage(res && res.message ? res.message : "図鑑を読み込めませんでした");
      return;
    }

    renderCollection(res.cards || []);
    setMessage("ガチャは1日1回限定（朝8時リセット）");

  }catch(e){
    setMessage("図鑑の通信エラー");
  }
}

function renderCollection(cards){
  const list = document.getElementById("collectionList");
  list.innerHTML = "";

  if(cards.length === 0){
    list.innerHTML = "<div>まだシールがありません</div>";
  }else{
    cards.forEach(function(card){
      const div = document.createElement("div");
      div.className = "cardMini";
      div.innerHTML =
        '<img src="' + escapeHtml(card.imageUrl) + '">' +
        '<div>' + escapeHtml(card.name) + '</div>' +
        '<div>' + escapeHtml(card.joinDate || "") + '</div>';
      list.appendChild(div);
    });
  }

  document.getElementById("collection").style.display = "block";
}

function closeCollection(){
  document.getElementById("collection").style.display = "none";
}

function escapeHtml(str){
  return String(str || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}
</script>
</body>
</html>
