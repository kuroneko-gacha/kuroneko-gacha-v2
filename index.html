  initSoundButton();
  if(soundEnabled) playSfx("sparkle");
}

function playSfx(type){
  if(!soundEnabled) return;

  try{
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if(!AudioCtx) return;

    const ctx = new AudioCtx();
    const gain = ctx.createGain();
    gain.connect(ctx.destination);

    let freq = 660;
    let duration = 0.11;
    let wave = "sine";

    if(type === "paw"){
      freq = 180;
      duration = 0.09;
      wave = "triangle";
    }else if(type === "sparkle"){
      freq = 980;
      duration = 0.14;
      wave = "sine";
    }else if(type === "boom"){
      freq = 90;
      duration = 0.22;
      wave = "sawtooth";
    }else if(type === "secret"){
      freq = 1320;
      duration = 0.3;
      wave = "square";
    }

    const osc = ctx.createOscillator();
    osc.type = wave;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);

    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.13, ctx.currentTime + 0.015);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);

    osc.connect(gain);
    osc.start();
    osc.stop(ctx.currentTime + duration + 0.03);

    setTimeout(function(){
      try{ ctx.close(); }catch(e){}
    }, 420);
  }catch(e){}
}

function playGachaEffect(res){
  return new Promise(resolve=>{
    const isSecret = !!res.secret;
    const effect = document.getElementById("effect");
    const stage = document.getElementById("effectStage");

    effect.className = "";
    stage.innerHTML = "";
    effect.style.display = "block";

    hint.textContent = "長押しでスキップ";
    stage.appendChild(hint);

    let finished = false;
    let pressTimer = null;

    function finishOnce(){
      if(finished) return;
      finished = true;
      effect.onpointerdown = null;
      effect.onpointerup = null;
      effect.onpointercancel = null;
      finishEffect(resolve);
    }

    effect.onpointerdown = function(){
      pressTimer = setTimeout(finishOnce, 650);
    };
    effect.onpointerup = function(){
      if(pressTimer) clearTimeout(pressTimer);
    };
    effect.onpointercancel = function(){
      if(pressTimer) clearTimeout(pressTimer);
    };

    if(isSecret){
      playSfx("secret");
      vibratePhone([80,40,120,40,180]);

/* しょぼさ対策：単音ではなく複数音を重ねる */
function v11Sfx(type){
  if(!soundEnabled) return;

  try{
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if(!AudioCtx) return;

    const ctx = new AudioCtx();
    const master = ctx.createGain();
    master.gain.setValueAtTime(0.0001, ctx.currentTime);
    master.gain.exponentialRampToValueAtTime(0.20, ctx.currentTime + 0.02);
    master.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 1.1);
    master.connect(ctx.destination);

    function tone(freq, start, dur, wave, volume){
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = wave || "sine";
      osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
      gain.gain.setValueAtTime(0.0001, ctx.currentTime + start);
      gain.gain.exponentialRampToValueAtTime(volume || 0.12, ctx.currentTime + start + 0.018);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + start + dur);
      osc.connect(gain);
      gain.connect(master);
      osc.start(ctx.currentTime + start);
      osc.stop(ctx.currentTime + start + dur + 0.04);
    }

    if(type === "paw"){
      tone(160,0,.10,"triangle",.16);
      tone(95,.04,.14,"sine",.14);
    }else if(type === "sparkle"){
      tone(880,0,.12,"sine",.10);
      tone(1320,.07,.14,"sine",.12);
      tone(1760,.15,.12,"sine",.10);
    }else if(type === "boom"){
      tone(70,0,.24,"sawtooth",.18);
      tone(120,.05,.18,"triangle",.14);
      tone(45,.12,.3,"sine",.12);
    }else if(type === "secret"){
      tone(520,0,.18,"sine",.12);
      tone(780,.12,.18,"sine",.13);
      tone(1040,.24,.2,"sine",.14);
      tone(1560,.38,.28,"square",.10);
      tone(90,.48,.36,"sawtooth",.16);
    }else if(type === "open"){
      tone(660,0,.10,"sine",.08);
      tone(990,.08,.10,"sine",.08);
    }else{
      tone(550,0,.12,"sine",.10);
    }

    setTimeout(function(){
      try{ctx.close();}catch(e){}
    },1300);
  }catch(e){}
}

<script>

function setReadyStatus(){

    "🌙 黒猫があなたを待っています",

  ];

}

function setDoneStatus(){
  setStatus("✅ 本日は受け取り済みです");
}

function setStatus(text){
  const el = document.getElementById("statusText");
  if(el) el.textContent = text;
}

function showPressFx(){
  const el = document.getElementById("pressFx");
  if(el) el.style.display = "block";
}

function hidePressFx(){
  const el = document.getElementById("pressFx");
  if(el) el.style.display = "none";
}

function jsonp(params){
  return new Promise((resolve,reject)=>{
    const cb = "cb_" + Date.now() + "_" + Math.floor(Math.random()*9999);
    params.callback = cb;

    const url = API_URL + "?" + new URLSearchParams(params).toString();
    const s = document.createElement("script");

    const timer = setTimeout(function(){
      delete window[cb];
      if(s && s.parentNode) s.remove();
      reject(new Error("通信タイムアウト"));
    }, 15000);

    window[cb] = function(data){
      clearTimeout(timer);
      delete window[cb];
      s.remove();
      resolve(data);
    };

    s.onerror = function(){
      clearTimeout(timer);
      delete window[cb];
      s.remove();
      reject(new Error("通信失敗"));
    };

    s.src = url;
    document.body.appendChild(s);
  });
}


async function refreshDailyStatus(){
  if(!profile.userId) return;

  try{
    const res = await jsonp({
      action:"status",
      userId:profile.userId
    });

    if(res && res.ok){
      updateDailyLimitText(Number(res.remaining || 0), Number(res.dailyLimit || 2), Number(res.bonusTickets || 0));
    }
  }catch(e){
    setDailyLimitText("🎁 あと2回引けるにゃー♪");
  }
}

function updateDailyLimitText(remaining, limit, bonusTickets){
  dailyLimit = limit || 2;
  dailyRemaining = remaining;

  const bonus = Number(bonusTickets || 0);

  if(remaining <= 0){
    setDailyLimitText("また明日8時に来てにゃー♪");
    setStatus("本日のガチャは終了です");
  }else{
    setDailyLimitText("🎁 あと" + remaining + "回引けるにゃー♪");
    if(bonus > 0){

function renderCollection(cards, ownedCount, totalCount){
  const list = document.getElementById("collectionList");
  const info = document.getElementById("collectionInfo");

  list.innerHTML = "";

  const allCards = (cards || []).slice().sort(function(a,b){
    return Number(a.sortNo || 999999) - Number(b.sortNo || 999999);
  });

  const total = Number(totalCount || allCards.length || 0);
  const owned = Number(ownedCount || allCards.filter(function(c){ return !!c.owned; }).length || 0);
  const percent = total ? Math.round((owned / total) * 100) : 0;

  info.innerHTML =
    "入手済み " + owned + " / " + total + "枚　｜　" + percent + "%<br>" +
    "入団日順アルバム" +
    '<div class="bar"><span style="width:' + percent + '%"></span></div>';

  if(allCards.length === 0){
    list.innerHTML = "<div>まだシールがありません</div>";
  }else{
    allCards.forEach(function(card, index){
      const div = document.createElement("div");
      const ownedCard = !!card.owned;

      div.className =
        (card.secret ? "cardMini secretMini" : "cardMini") +
        (ownedCard ? "" : " lockedMini");

      div.setAttribute("data-no", "No." + String(index + 1).padStart(3, "0"));
      div.setAttribute("data-card-id", String(card.id || ""));

      if(ownedCard){
        const img = escapeHtml(card.imageUrl);
        const name = escapeHtml(card.name || card.realName);

        div.innerHTML =
          '<img loading="lazy" src="' + img + '">' +
          '<div>' + name + '</div>';

        div.onclick = function(){
          openSealZoom(card.imageUrl, card.name || card.realName);
        };
      }else{
        div.innerHTML =
          '<div class="lockedThumb">？？？</div>' +
          '<div>未入手</div>';
      }

      list.appendChild(div);
    });
  }

  const collection = document.getElementById("collection");
  collection.style.display = "block";
  collection.classList.remove("collectionOpening");
  void collection.offsetWidth;
  collection.classList.add("collectionOpening");

  setTimeout(function(){
    afterCollectionOpenJump();
  }, 260);
}


function afterCollectionOpenJump(){
  const targetId = pendingNewCardId || lastDrawnCardId;
  if(!targetId) return;

  const card = findCollectionCardById(targetId);
  if(!card) return;

  scrollCollectionToCard(card, function(){
    if(pendingNewCardId && pendingNewImageUrl){
      showCollectionToast("新しいシールを図鑑に登録中…");
      playAbsorbIntoCollection(card, pendingNewImageUrl, function(){
        focusCollectionCard(card);
        clearPendingNewCard();
      });
    }else{
      focusCollectionCard(card);
    }
  });
}

function findCollectionCardById(cardId){
  const nodes = document.querySelectorAll("#collectionList [data-card-id]");
  for(let i=0;i<nodes.length;i++){
    if(String(nodes[i].getAttribute("data-card-id")) === String(cardId)){
      return nodes[i];
    }
  }
  return null;
}

function scrollCollectionToCard(card, callback){
  const collection = document.getElementById("collection");
  if(!collection || !card){
    if(callback) callback();
    return;
  }

  const desired =
    card.offsetTop -
    (collection.clientHeight / 2) +
    (card.clientHeight / 2);

  collection.scrollTo({
    top: Math.max(0, desired),
    behavior: "smooth"
  });

  setTimeout(function(){
    if(callback) callback();
  }, 650);
}

function focusCollectionCard(card){
  if(!card) return;
  card.classList.remove("focusCard");
  void card.offsetWidth;
  card.classList.add("focusCard");
}

function playAbsorbIntoCollection(card, imageUrl, callback){
  const layer = document.getElementById("collectionAbsorbFx");
  if(!layer || !card || !imageUrl){
    if(callback) callback();
    return;
  }

  const rect = card.getBoundingClientRect();
  const tx = rect.left + rect.width / 2;
  const ty = rect.top + rect.height / 2;

  layer.innerHTML = "";
  layer.style.display = "block";

  const img = document.createElement("img");
  img.className = "absorbSeal";
  img.src = imageUrl;
  img.style.setProperty("--target-left", tx + "px");
  img.style.setProperty("--target-top", ty + "px");
  layer.appendChild(img);

  for(let i=0;i<22;i++){
    const sp = document.createElement("div");
    sp.className = "absorbSpark";
    sp.style.left = tx + "px";
    sp.style.top = ty + "px";
    sp.style.setProperty("--sx", (Math.random()*140 - 70) + "px");
    sp.style.setProperty("--sy", (Math.random()*140 - 70) + "px");
    sp.style.animationDelay = (Math.random()*0.22) + "s";
    layer.appendChild(sp);
  }

  setTimeout(function(){
    layer.style.display = "none";
    layer.innerHTML = "";
    if(callback) callback();
  }, 1050);

function playSfx(type){
  if(!soundEnabled) return;

  try{
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if(!AudioCtx) return;

    const ctx = new AudioCtx();
    const gain = ctx.createGain();
    gain.connect(ctx.destination);

    let freq = 660;
    let duration = 0.11;
    let wave = "sine";

    if(type === "paw"){
      freq = 180;
      duration = 0.09;
      wave = "triangle";
    }else if(type === "sparkle"){
      freq = 980;
      duration = 0.14;
      wave = "sine";
    }else if(type === "boom"){
      freq = 90;
      duration = 0.22;
      wave = "sawtooth";
    }else if(type === "secret"){
      freq = 1320;
      duration = 0.3;
      wave = "square";
    }

    const osc = ctx.createOscillator();
    osc.type = wave;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);

    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.13, ctx.currentTime + 0.015);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);

    osc.connect(gain);
    osc.start();
    osc.stop(ctx.currentTime + duration + 0.03);

    setTimeout(function(){
      try{ ctx.close(); }catch(e){}
    }, 420);
  }catch(e){}
}

/* しょぼさ対策：単音ではなく複数音を重ねる */
function v11Sfx(type){
  if(!soundEnabled) return;

  try{
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if(!AudioCtx) return;

    const ctx = new AudioCtx();
    const master = ctx.createGain();
    master.gain.setValueAtTime(0.0001, ctx.currentTime);
    master.gain.exponentialRampToValueAtTime(0.20, ctx.currentTime + 0.02);
    master.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 1.1);
    master.connect(ctx.destination);

    function tone(freq, start, dur, wave, volume){
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = wave || "sine";
      osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
      gain.gain.setValueAtTime(0.0001, ctx.currentTime + start);
      gain.gain.exponentialRampToValueAtTime(volume || 0.12, ctx.currentTime + start + 0.018);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + start + dur);
      osc.connect(gain);
      gain.connect(master);
      osc.start(ctx.currentTime + start);
      osc.stop(ctx.currentTime + start + dur + 0.04);
    }

    if(type === "paw"){
      tone(160,0,.10,"triangle",.16);
      tone(95,.04,.14,"sine",.14);
    }else if(type === "sparkle"){
      tone(880,0,.12,"sine",.10);
      tone(1320,.07,.14,"sine",.12);
      tone(1760,.15,.12,"sine",.10);
    }else if(type === "boom"){
      tone(70,0,.24,"sawtooth",.18);
      tone(120,.05,.18,"triangle",.14);
      tone(45,.12,.3,"sine",.12);
    }else if(type === "secret"){
      tone(520,0,.18,"sine",.12);
      tone(780,.12,.18,"sine",.13);
      tone(1040,.24,.2,"sine",.14);
      tone(1560,.38,.28,"square",.10);
      tone(90,.48,.36,"sawtooth",.16);
    }else if(type === "open"){
      tone(660,0,.10,"sine",.08);
      tone(990,.08,.10,"sine",.08);
    }else{
      tone(550,0,.12,"sine",.10);
    }

    setTimeout(function(){
      try{ctx.close();}catch(e){}
    },1300);
  }catch(e){}
}

function playGachaEffect(res){
  return new Promise(resolve=>{
    const isSecret = !!res.secret;
    const effect = document.getElementById("effect");
    const stage = document.getElementById("effectStage");

    effect.className = "";
    stage.innerHTML = "";
    effect.style.display = "block";

    const dim = document.createElement("div");
    dim.className = "v11DimPulse";
    stage.appendChild(dim);

    const hint = document.createElement("div");
    hint.className = "v11SkipHint";
    hint.textContent = "長押しでスキップ";
    stage.appendChild(hint);

    let finished = false;
    let pressTimer = null;

    function done(){
      if(finished) return;
      finished = true;
      effect.onpointerdown = null;
      effect.onpointerup = null;
      effect.onpointercancel = null;
      finishEffect(resolve);
    }

    effect.onpointerdown = function(){
      pressTimer = setTimeout(done, 650);
    };
    effect.onpointerup = function(){
      if(pressTimer) clearTimeout(pressTimer);
    };
    effect.onpointercancel = function(){
      if(pressTimer) clearTimeout(pressTimer);
    };

    if(isSecret){
      v11Sfx("secret");
      v11Vibrate([90,40,130,40,210]);
      const n = Math.floor(Math.random()*3);
      if(n === 0) v11SecretTimeStop(stage,done);
      if(n === 1) v11SecretMiracle(stage,done);
      if(n === 2) v11SecretAwakening(stage,done);
    }else{
      v11Sfx("sparkle");
      v11Vibrate([40]);
      const n = Math.floor(Math.random()*7);
      if(n === 0) v11NormalCatDelivery(stage,done);
      if(n === 1) v11NormalPawStamp(stage,done);
      if(n === 2) v11NormalGiftBox(stage,done);
      if(n === 3) v11NormalShootingStar(stage,done);
      if(n === 4) v11NormalMagicCircle(stage,done);
      if(n === 5) v11NormalCatEyes(stage,done);
      if(n === 6) v11NormalMoonJump(stage,done);
    }
  });
}

<script>
(function(){
  let v12AudioCtx = null;
  function ctx(){ const A = window.AudioContext || window.webkitAudioContext; if(!A) return null; if(!v12AudioCtx) v12AudioCtx = new A(); if(v12AudioCtx.state === 'suspended') v12AudioCtx.resume(); return v12AudioCtx; }
  window.v12Sfx = function(type){ if(typeof soundEnabled !== 'undefined' && !soundEnabled) return; const c = ctx(); if(!c) return; const master = c.createGain(); master.gain.setValueAtTime(.0001,c.currentTime); master.gain.exponentialRampToValueAtTime(.20,c.currentTime+.02); master.gain.exponentialRampToValueAtTime(.0001,c.currentTime+1.8); master.connect(c.destination); function tone(f,s,d,w,v){ const o=c.createOscillator(), g=c.createGain(); o.type=w||'sine'; o.frequency.setValueAtTime(f,c.currentTime+s); g.gain.setValueAtTime(.0001,c.currentTime+s); g.gain.exponentialRampToValueAtTime(v||.1,c.currentTime+s+.015); g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+s+d); o.connect(g); g.connect(master); o.start(c.currentTime+s); o.stop(c.currentTime+s+d+.03); }
    if(type==='step'){ tone(120,0,.08,'triangle',.13); tone(70,.025,.10,'sine',.09); }
    else if(type==='box'){ tone(95,0,.18,'sawtooth',.17); tone(155,.04,.12,'triangle',.11); }
    else if(type==='shine'){ [760,1040,1320,1760].forEach((f,i)=>tone(f,i*.07,.13,'sine',.08)); }
    else if(type==='secret'){ tone(55,0,.55,'sawtooth',.16); tone(440,.12,.22,'sine',.10); tone(880,.34,.24,'sine',.12); tone(1320,.55,.28,'square',.10); tone(1760,.82,.35,'sine',.09); }
    else { tone(660,0,.12,'sine',.08); tone(990,.07,.12,'sine',.08); }
  };
  window.v12Vibrate=function(p){try{if(navigator.vibrate)navigator.vibrate(p||[35]);}catch(e){}};
  function cat(cls){ const d=document.createElement('div'); d.className='v12NaturalCat '+cls; d.innerHTML='<div class="v12CatTail"></div><div class="v12CatBody"></div><div class="v12CatHead"></div><div class="v12CatEar v12E1"></div><div class="v12CatEar v12E2"></div><div class="v12CatEye"></div><div class="v12CatLeg v12L1"></div><div class="v12CatLeg v12L2"></div><div class="v12CatLeg v12L3"></div><div class="v12CatLeg v12L4"></div>'; return d; }
  function cut(stage,text,delay){setTimeout(()=>{const e=document.createElement('div');e.className='v12Cut';e.textContent=text;stage.appendChild(e);},delay||0)}
  function box(stage,delay){setTimeout(()=>{const b=document.createElement('div');b.className='v12Box';stage.appendChild(b);v12Sfx('box');},delay||0)}
  function flash(stage,delay){setTimeout(()=>{const f=document.createElement('div');f.className='v12Flash';stage.appendChild(f);},delay||0)}
  function card(stage,delay){setTimeout(()=>{const c=document.createElement('div');c.className='v12Card';stage.appendChild(c);v12Sfx('shine');},delay||0)}
  function gate(stage,delay){setTimeout(()=>{const g=document.createElement('div');g.className='v12Gate';stage.appendChild(g);},delay||0)}
  function title(stage,text,delay){setTimeout(()=>{const t=document.createElement('div');t.className='v12SecretTitle';t.textContent=text;stage.appendChild(t);},delay||0)}
  function particles(stage,count,delay){setTimeout(()=>{const frag=document.createDocumentFragment();for(let i=0;i<count;i++){const p=document.createElement('div');p.className='v12Particle';p.style.left=(46+Math.random()*8)+'%';p.style.top=(47+Math.random()*10)+'%';p.style.setProperty('--dx',(Math.random()*360-180)+'px');p.style.setProperty('--dy',(Math.random()*340-170)+'px');p.style.animationDelay=(Math.random()*.38)+'s';frag.appendChild(p)}stage.appendChild(frag)},delay||0)}
  function finish(done,ms){setTimeout(()=>{const e=document.getElementById('effect'); if(e)e.classList.add('openFlash'); setTimeout(()=>{hideEffect();done();},760)},ms)}
  function skipSetup(effect,done){let end=false,timer=null;function finishNow(){if(end)return;end=true;effect.onpointerdown=effect.onpointerup=effect.onpointercancel=null;hideEffect();done()}effect.onpointerdown=()=>{timer=setTimeout(finishNow,650)};effect.onpointerup=effect.onpointercancel=()=>{if(timer)clearTimeout(timer)};const h=document.createElement('div');h.className='v12SkipHint';h.textContent='長押しでスキップ';return h;}
  function normalA(stage,done){cut(stage,'黒猫がゆっくり近づいてくる…',140);setTimeout(()=>{stage.appendChild(cat('walkIn'));v12Sfx('step')},580);box(stage,1650);particles(stage,42,2350);flash(stage,2820);card(stage,3220);finish(done,4550)}
  function normalB(stage,done){cut(stage,'箱が震えている…',140);box(stage,520);setTimeout(()=>{document.getElementById('effect').classList.add('v12Shake');v12Vibrate([45,25,70])},1800);particles(stage,55,2100);flash(stage,2550);card(stage,3020);finish(done,4300)}
  function normalC(stage,done){cut(stage,'黒猫が月を飛び越えた…',140);const moon=document.createElement('div');moon.className='moon redMoon';setTimeout(()=>stage.appendChild(moon),360);setTimeout(()=>{stage.appendChild(cat('leap'));v12Sfx('step')},1150);gate(stage,2100);particles(stage,48,2450);flash(stage,3000);card(stage,3460);finish(done,4800)}
  function secret(stage,done){const e=document.getElementById('effect');e.classList.add('v12Secret');cut(stage,'……空気が変わった',280);title(stage,'SECRET AWAKENING',930);setTimeout(()=>{stage.appendChild(cat('secretWalk'));v12Sfx('secret');v12Vibrate([90,40,130,40,210])},720);gate(stage,2100);setTimeout(()=>e.classList.add('v12Shake'),3000);particles(stage,110,3150);flash(stage,3800);card(stage,4550);finish(done,6500)}
  window.playGachaEffect=function(res){return new Promise(resolve=>{const effect=document.getElementById('effect'),stage=document.getElementById('effectStage');effect.className='v12Mode';stage.innerHTML='';effect.style.display='block';stage.appendChild(skipSetup(effect,resolve)); if(res && res.secret){secret(stage,resolve)}else{(Math.random()<.34?normalA:Math.random()<.67?normalB:normalC)(stage,resolve)}})};
})();

<script>
/* ===== クロネコガチャ Ver.14 Final Complete 追加JS ===== */
(function(){
  let kuroAudioCtx = null;

  function getAudioCtx(){
    try{
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if(!Ctx) return null;
      if(!kuroAudioCtx) kuroAudioCtx = new Ctx();
      if(kuroAudioCtx.state === "suspended") kuroAudioCtx.resume();
      return kuroAudioCtx;
    }catch(e){ return null; }
  }

  function tone(freq,start,dur,wave,vol){
    const ctx = getAudioCtx();
    if(!ctx) return;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = wave || "sine";
    osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
    gain.gain.setValueAtTime(0.0001, ctx.currentTime + start);
    gain.gain.exponentialRampToValueAtTime(vol || .08, ctx.currentTime + start + .018);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + start + dur);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime + start);
    osc.stop(ctx.currentTime + start + dur + .04);
  }

  function kuronekoMeow(kind){
    try{
      if(window.soundEnabled === false) return;
      if(kind === "secret"){
        tone(260,0,.18,"sine",.10);
        tone(210,.11,.28,"triangle",.11);
        tone(330,.26,.22,"sine",.08);
      }else if(kind === "start"){
        tone(720,0,.08,"sine",.08);
        tone(880,.05,.13,"sine",.09);
        tone(640,.16,.16,"triangle",.07);
      }else{
        tone(660,0,.09,"sine",.08);
        tone(820,.07,.12,"sine",.09);
      }
    }catch(e){}
  }

  window.kuronekoMeow = kuronekoMeow;

  function ensureBonusLayer(){
    let fx = document.getElementById("kuronekoBonusTicketFx");
    if(fx) return fx;
    fx = document.createElement("div");
    fx.id = "kuronekoBonusTicketFx";
    fx.innerHTML = '<div class="kuroTicket"></div><div class="kuroTicketMsg"><span class="big">🎫 ガチャ券GET！</span><span class="small">黒猫からのおまけにゃ♪<br>もう1回引けるにゃー！</span></div>';
    document.body.appendChild(fx);
    return fx;
  }

  function kuronekoShowBonusTicketFx(){
    const fx = ensureBonusLayer();
    fx.classList.remove("show");
    void fx.offsetWidth;
    fx.classList.add("show");
    try{ if(navigator.vibrate) navigator.vibrate([60,40,90,40,120]); }catch(e){}
    kuronekoMeow("start");
    setTimeout(function(){ fx.classList.remove("show"); },3400);
  }

  window.kuronekoShowBonusTicketFx = kuronekoShowBonusTicketFx;

  function enhanceCollectionPercent(){
    const info = document.getElementById("collectionInfo");
    if(!info) return;
    const text = info.textContent || "";
    const m = text.match(/(\d+)\s*\/\s*(\d+)/);
    if(!m) return;
    if(info.querySelector(".percentText")) return;
    const owned = Number(m[1]);
    const total = Number(m[2]);
    if(!total) return;
    const span = document.createElement("span");
    span.className = "percentText";
    span.textContent = "収集率 " + Math.floor((owned / total) * 100) + "%";
    info.appendChild(span);
  }

  function enhanceResultNew(){
    const result = document.getElementById("result");
    const msg = document.getElementById("resultMsg");
    if(!result || !msg || result.dataset.kuroNewDone === "1") return;
    if(/NEW|新規|初/.test(msg.textContent)){
      result.dataset.kuroNewDone = "1";
      const badge = document.createElement("div");
      badge.className = "kuroNewBadge";
      badge.textContent = "NEW SEAL";
      result.appendChild(badge);
    }
  }

  document.addEventListener("DOMContentLoaded", function(){
    ensureBonusLayer();
    const mo = new MutationObserver(function(){
      enhanceCollectionPercent();
      enhanceResultNew();
    });
    mo.observe(document.body,{childList:true,subtree:true,characterData:true});
    setTimeout(function(){
      enhanceCollectionPercent();
      enhanceResultNew();
    },600);
  });
})();
</script>
