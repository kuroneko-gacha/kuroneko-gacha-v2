vigator.vibrate) navigator.vibrate([100,50,160,60,220,80,260]); }catch(e){} if(typeof window.kuronekoMeow === "function"){ window.kuronekoMeow("secret"); } setTimeout(function(){ fx.classList.remove("show"); }, 7600); } window.kuronekoShowSuperSecretFx = showSuperSecretFx; document.addEventListener("DOMContentLoaded", function(){ ensureSuperSecretFx(); fixBrokenImages(); markSuperSecretCards(); const mo = new MutationObserver(function(){ fixBrokenImages(); markSuperSecretCards(); }); mo.observe(document.body, { childList:true, subtree:true }); }); })(); </script>

<style> /* ===== クロネコガチャ 完成版：通常図鑑とSPECIAL分離 ===== */ #specialCollectionArea{ margin-top:18px; padding-top:16px; border-top:1px solid rgba(250,204,21,.35); } .specialTitle{ text-align:center; color:#facc15; font-size:20px; font-weight:900; letter-spacing:1px; text-shadow:0 0 12px rgba(250,204,21,.75); margin:0 0 5px; } .specialSub{ text-align:center; color:#fff7d6; font-size:12px; font-weight:800; margin:0 0 12px; opacity:.95; } .specialGrid{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; align-items:start; } .cardMini.specialExcluded{ display:none !important; } .cardMini.specialMini{ position:relative; height:154px; padding:6px; border-radius:15px; box-sizing:border-box; overflow:hidden; background: radial-gradient(circle at 50% 20%, rgba(250,204,21,.35), transparent 38%), linear-gradient(135deg,rgba(250,204,21,.22),rgba(168,85,247,.35),rgba(2,6,23,.9)); box-shadow: 0 0 20px rgba(250,204,21,.48), 0 0 36px rgba(168,85,247,.22), inset 0 0 0 1px rgba(255,255,255,.13); text-align:center; cursor:pointer; } .cardMini.specialMini::before{ content:attr(data-no); position:absolute; left:5px; top:5px; padding:2px 5px; border-radius:999px; background:rgba(0,0,0,.75); color:#facc15; font-size:9px; font-weight:900; z-index:5; } .cardMini.specialMini::after{ content:"SPECIAL"; position:absolute; right:5px; top:5px; padding:2px 5px; border-radius:999px; background:linear-gradient(90deg,#facc15,#fb7185,#a855f7); color:#111827; font-size:7px; font-weight:900; z-index:6; box-shadow:0 0 12px rgba(250,204,21,.75); } .cardMini.specialMini img{ width:100%; height:112px; object-fit:cover; object-position:center center; border-radius:9px; display:block; background:white; box-shadow:0 0 10px rgba(0,0,0,.4); } .cardMini.specialMini .lockedThumb{ width:100%; height:112px; border-radius:9px; box-sizing:border-box; background: radial-gradient(circle at 50% 45%, rgba(250,204,21,.35), transparent 42%), linear-gradient(135deg,rgba(24,0,40,.96),rgba(2,6,23,.96)); display:flex; align-items:center; justify-content:center; color:#facc15; font-size:25px; font-weight:900; text-shadow:0 0 12px #facc15; box-shadow:inset 0 0 0 1px rgba(250,204,21,.25); } .cardMini.specialMini .specialName{ height:26px; margin-top:6px; display:flex; align-items:center; justify-content:center; color:#fff7d6; font-size:11px; font-weight:900; line-height:1.05; text-shadow:0 2px 4px #000; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; } .cardMini.specialMini.soldOut .lockedThumb::after{ content:"GET済"; position:absolute; left:50%; top:48%; transform:translate(-50%,-50%) rotate(-10deg); padding:5px 10px; border-radius:999px; background:rgba(0,0,0,.78); color:#facc15; font-size:13px; font-weight:900; box-shadow:0 0 14px rgba(250,204,21,.65); } </style>

<script> /* ===== クロネコガチャ 完成版：通常図鑑とSPECIAL分離 ===== */ (function(){ let lastCollectionData = null; function isSpecialCardData(c){ if(!c) return false; if(c.supersecret) return true; if(String(c.type || "").toLowerCase() === "supersecret") return true; if(/^900/i.test(String(c.id || ""))) return true; return false; } function makeSpecialCard(c, index){ const div = document.createElement("div"); div.className = "cardMini specialMini" + (c.soldOut ? " soldOut" : ""); div.setAttribute("data-no", "No.EX" + String(index + 1).padStart(2,"0")); const owned = !!c.owned; if(owned && c.imageUrl){ const img = document.createElement("img"); img.src = c.imageUrl; img.alt = c.realName || c.name || "SPECIAL"; img.addEventListener("click", function(){ if(typeof openSealZoom === "function"){ openSealZoom(c.imageUrl, c.realName || c.name || "SPECIAL"); } }); div.appendChild(img); }else{ const locked = document.createElement("div"); locked.className = "lockedThumb"; locked.textContent = "???"; div.appendChild(locked); } const name = document.createElement("div"); name.className = "specialName"; if(owned){ name.textContent = c.realName || c.name || "SPECIAL"; }else if(c.soldOut){ name.textContent = "現在入手不可"; }else{ name.textContent = "SPECIAL"; } div.appendChild(name); return div; } function renderSpecialArea(data){ const collection = document.getElementById("collection"); const grid = document.getElementById("collectionGrid") || document.querySelector("#collection .grid"); if(!collection || !grid || !data) return; let special = data.specialCards || []; if(!special.length && data.cards && data.cards.length){ special = data.cards.filter(isSpecialCardData); } const old = document.getElementById("specialCollectionArea"); if(old) old.remove(); /* 通常グリッド内に紛れた900番台を非表示 */ const minis = grid.querySelectorAll(".cardMini"); minis.forEach(function(card){ const no = card.getAttribute("data-no") || ""; const txt = card.textContent || ""; const img = card.querySelector("img"); if(/^No\.?0?9\d\d/i.test(no) || /SUPER|超シークレット|supersecret/i.test(txt) || (img && /\/900_|900_/.test(img.src || ""))){ card.classList.add("specialExcluded"); } }); if(!special.length) return; const area = document.createElement("div"); area.id = "specialCollectionArea"; const title = document.createElement("div"); title.className = "specialTitle"; title.textContent = "SPECIAL"; area.appendChild(title); const sub = document.createElement("div"); sub.className = "specialSub"; sub.textContent = "通常コンプリート対象外の特別枠"; area.appendChild(sub); const sgrid = document.createElement("div"); sgrid.className = "specialGrid"; special.forEach(function(c, i){ sgrid.appendChild(makeSpecialCard(c, i)); }); area.appendChild(sgrid); const closeBtn = document.getElementById("closeCollection"); if(closeBtn && closeBtn.parentNode === collection){ collection.insertBefore(area, closeBtn); }else{ collection.appendChild(area); } } const oldRenderCollection = window.renderCollection; if(typeof oldRenderCollection === "function"){ window.renderCollection = function(data){ lastCollectionData = data; const ret = oldRenderCollection.apply(this, arguments); setTimeout(function(){ renderSpecialArea(data); }, 50); return ret; }; } const oldOpenCollection = window.openCollection; if(typeof oldOpenCollection === "function"){ window.openCollection = function(){ const ret = oldOpenCollection.apply(this, arguments); setTimeout(function(){ if(lastCollectionData) renderSpecialArea(lastCollectionData); }, 300); return ret; }; } document.addEventListener("DOMContentLoaded", function(){ const mo = new MutationObserver(function(){ if(lastCollectionData) renderSpecialArea(lastCollectionData); }); mo.observe(document.body,{childList:true,subtree:true}); }); })(); </script>

<style> /* ===== クロネコガチャ Ver.1.1 安定版：図鑑sortNo固定・画像リトライ ===== */ .cardMini img.kuroRetryImg{ background: radial-gradient(circle at 50% 45%, rgba(250,204,21,.16), transparent 42%), linear-gradient(135deg,rgba(15,23,42,.96),rgba(2,6,23,.96)); object-fit:contain; } #collectionInfo .kuroPercent{ display:block; margin-top:3px; color:#facc15; font-size:13px; font-weight:900; text-shadow:0 0 8px rgba(250,204,21,.5); } </style>

<script> /* ===== クロネコガチャ Ver.1.1 安定版：図鑑sortNo固定・画像リトライ ===== */ (function(){ let kuroLastCollectionData = null; function sortCollectionData(data){ if(!data || !Array.isArray(data.cards)) return data; data.cards.sort(function(a,b){ const sa = Number(a.sortNo || 999999); const sb = Number(b.sortNo || 999999); if(sa !== sb) return sa - sb; return String(a.id || "").localeCompare(String(b.id || "")); }); if(Array.isArray(data.specialCards)){ data.specialCards.sort(function(a,b){ const sa = Number(a.sortNo || 999999); const sb = Number(b.sortNo || 999999); if(sa !== sb) return sa - sb; return String(a.id || "").localeCompare(String(b.id || "")); }); } return data; } const oldRenderCollection = window.renderCollection; if(typeof oldRenderCollection === "function"){ window.renderCollection = function(data){ kuroLastCollectionData = sortCollectionData(data); const ret = oldRenderCollection.call(this, kuroLastCollectionData); setTimeout(function(){ applyImageRetry(); fixCollectionPercent(kuroLastCollectionData); },80); return ret; }; } function applyImageRetry(){ const imgs = document.querySelectorAll(".cardMini img:not([data-kuro-img-ready])"); imgs.forEach(function(img){ img.dataset.kuroImgReady = "1"; img.addEventListener("error", function(){ const count = Number(img.dataset.kuroRetryCount || 0); if(count >= 3){ img.classList.add("kuroRetryImg"); return; } img.dataset.kuroRetryCount = String(count + 1); img.classList.add("kuroRetryImg"); const base = String(img.src || "").split("?")[0]; setTimeout(function(){ img.src = base + "?retry=" + Date.now(); }, 500 + count * 800); }); img.addEventListener("load", function(){ img.classList.remove("kuroRetryImg"); }); }); } function fixCollectionPercent(data){ const info = document.getElementById("collectionInfo"); if(!info || !data) return; const owned = Number(data.ownedCount || 0); const total = Number(data.totalCount || 0); if(!total) return; let p = info.querySelector(".kuroPercent"); if(!p){ p = document.createElement("span"); p.className = "kuroPercent"; info.appendChild(p); } const percent = Math.floor((owned / total) * 100); p.textContent = "通常図鑑 収集率 " + percent + "%"; } document.addEventListener("DOMContentLoaded", function(){ applyImageRetry(); const mo = new MutationObserver(function(){ applyImageRetry(); if(kuroLastCollectionData) fixCollectionPercent(kuroLastCollectionData); }); mo.observe(document.body,{ childList:true, subtree:true }); }); })(); </script>

<style> /* ===== クロネコガチャ Ver.1.2 管理人機能：メンテナンス表示 ===== */ #maintenanceOverlay{ position:fixed; inset:0; z-index:500; display:none; align-items:center; justify-content:center; padding:20px; box-sizing:border-box; background:rgba(0,0,0,.88); color:white; text-align:center; } #maintenanceOverlay.show{ display:flex; } .maintenanceBox{ width:min(92%,380px); padding:24px 18px; border-radius:24px; background:linear-gradient(180deg,rgba(15,23,42,.98),rgba(2,6,23,.98)); box-shadow:0 0 28px rgba(250,204,21,.35), inset 0 0 0 1px rgba(255,255,255,.12); } .maintenanceTitle{ color:#facc15; font-size:24px; font-weight:900; margin-bottom:12px; text-shadow:0 0 12px rgba(250,204,21,.65); } .maintenanceMsg{ color:#fff7d6; font-size:15px; font-weight:800; line-height:1.6; } </style>
