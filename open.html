<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐈‍⬛ クロネコガチャ案内</title>
<style>
html,body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;
  background:#fff3c4;
  font-family:"Hiragino Sans","Meiryo",sans-serif;
}
body{
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}
a{
  -webkit-tap-highlight-color:transparent;
}
.page{
  position:relative;
  width:100%;
  max-width:430px;
  height:100vh;
  overflow:hidden;
  background:#fff3c4;
}
.mainImage{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center top;
  display:block;
  user-select:none;
  -webkit-user-drag:none;
}
.tapArea{
  position:absolute;
  left:8%;
  top:45%;
  width:84%;
  height:24%;
  border-radius:38px;
  display:block;
  z-index:10;
}
.tapArea:active{
  background:rgba(255,255,255,.18);
}
</style>
</head>
<body>
  <div class="page">
    <img class="mainImage" src="./open-bg.png" alt="クロネコガチャ案内">
    <a class="tapArea" href="https://liff.line.me/2010515194-r0gV3TRC" aria-label="ガチャページに行く"></a>
  </div>
</body>
</html>
