  }catch(e){}
  initSoundButton();
  if(soundEnabled) playSfx("sparkle");
}

function playSfx(type){
  if(!soundEnabled) return;

  try{
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if(!AudioCtx) return;

    const ctx = new AudioCtx();
    const gain = ctx.createGain();
    gain.connect(ctx.destination);

    let freq = 660;
    let duration = 0.11;
    let wave = "sine";

    if(type === "paw"){
      freq = 180;
      duration = 0.09;
      wave = "triangle";
    }else if(type === "sparkle"){
      freq = 980;
      duration = 0.14;
      wave = "sine";
    }else if(type === "boom"){
      freq = 90;
      duration = 0.22;
      wave = "sawtooth";
    }else if(type === "secret"){
      freq = 1320;
      duration = 0.3;
      wave = "square";
    }

    const osc = ctx.createOscillator();
    osc.type = wave;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);

    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.13, ctx.currentTime + 0.015);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);

    osc.connect(gain);
    osc.start();
    osc.stop(ctx.currentTime + duration + 0.03);

    setTimeout(function(){
      try{ ctx.close(); }catch(e){}
    }, 420);
  }catch(e){}
}

function playGachaEffect(res){
  return new Promise(resolve=>{
    const isSecret = !!res.secret;
    const effect = document.getElementById("effect");
    const stage = document.getElementById("effectStage");

    effect.className = "";
    stage.innerHTML = "";
    effect.style.display = "block";

    const hint = document.createElement("div");
    hint.className = "v9SkipHint";
    hint.textContent = "長押しでスキップ";
    stage.appendChild(hint);

    let finished = false;
    let pressTimer = null;

    function finishOnce(){
      if(finished) return;
      finished = true;
      effect.onpointerdown = null;
      effect.onpointerup = null;
      effect.onpointercancel = null;
      finishEffect(resolve);
    }

    effect.onpointerdown = function(){
      pressTimer = setTimeout(finishOnce, 650);
    };
    effect.onpointerup = function(){
      if(pressTimer) clearTimeout(pressTimer);
    };
    effect.onpointercancel = function(){
      if(pressTimer) clearTimeout(pressTimer);
    };

    if(isSecret){
      playSfx("secret");
      vibratePhone([80,40,120,40,180]);
      const n = Math.floor(Math.random()*3);
      if(n === 0) v9SecretTimeStop(stage, finishOnce);
      if(n === 1) v9SecretMiracle(stage, finishOnce);
      if(n === 2) v9SecretAwakening(stage, finishOnce);
    }else{
      playSfx("sparkle");
      vibratePhone([35]);
      const n = Math.floor(Math.random()*7);
      if(n === 0) v9NormalCatDelivery(stage, finishOnce);
      if(n === 1) v9NormalPawStamp(stage, finishOnce);

      if(n === 3) v9NormalShootingStar(stage, finishOnce);
      if(n === 4) v9NormalMagicCircle(stage, finishOnce);
      if(n === 5) v9NormalCatEyes(stage, finishOnce);

/* しょぼさ対策：単音ではなく複数音を重ねる */
function v11Sfx(type){
  if(!soundEnabled) return;

  try{
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if(!AudioCtx) return;

    const ctx = new AudioCtx();
    const master = ctx.createGain();
    master.gain.setValueAtTime(0.0001, ctx.currentTime);
    master.gain.exponentialRampToValueAtTime(0.20, ctx.currentTime + 0.02);
    master.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 1.1);
    master.connect(ctx.destination);

    function tone(freq, start, dur, wave, volume){
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = wave || "sine";
      osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
      gain.gain.setValueAtTime(0.0001, ctx.currentTime + start);
      gain.gain.exponentialRampToValueAtTime(volume || 0.12, ctx.currentTime + start + 0.018);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + start + dur);
      osc.connect(gain);
      gain.connect(master);
      osc.start(ctx.currentTime + start);
      osc.stop(ctx.currentTime + start + dur + 0.04);
    }

    if(type === "paw"){
      tone(160,0,.10,"triangle",.16);
      tone(95,.04,.14,"sine",.14);
    }else if(type === "sparkle"){
      tone(880,0,.12,"sine",.10);
      tone(1320,.07,.14,"sine",.12);
      tone(1760,.15,.12,"sine",.10);
    }else if(type === "boom"){
      tone(70,0,.24,"sawtooth",.18);
      tone(120,.05,.18,"triangle",.14);
      tone(45,.12,.3,"sine",.12);
    }else if(type === "secret"){
      tone(520,0,.18,"sine",.12);
      tone(780,.12,.18,"sine",.13);
      tone(1040,.24,.2,"sine",.14);
      tone(1560,.38,.28,"square",.10);
      tone(90,.48,.36,"sawtooth",.16);
    }else if(type === "open"){
      tone(660,0,.10,"sine",.08);
      tone(990,.08,.10,"sine",.08);
    }else{
      tone(550,0,.12,"sine",.10);
    }

    setTimeout(function(){
      try{ctx.close();}catch(e){}
    },1300);
  }catch(e){}
}

function jsonp(params){
  return new Promise((resolve,reject)=>{
    const cb = "cb_" + Date.now() + "_" + Math.floor(Math.random()*9999);
    params.callback = cb;

    const url = API_URL + "?" + new URLSearchParams(params).toString();
    const s = document.createElement("script");

    const timer = setTimeout(function(){
      delete window[cb];
      if(s && s.parentNode) s.remove();
      reject(new Error("通信タイムアウト"));
    }, 15000);

    window[cb] = function(data){
      clearTimeout(timer);
      delete window[cb];
      s.remove();
      resolve(data);
    };

    s.onerror = function(){
      clearTimeout(timer);
      delete window[cb];
      s.remove();
      reject(new Error("通信失敗"));
    };

    s.src = url;
    document.body.appendChild(s);
  });
}


async function refreshDailyStatus(){
  if(!profile.userId) return;

    const res = await jsonp({

      updateDailyLimitText(Number(res.remaining || 0), Number(res.dailyLimit || 2));

function preloadImage(url){
  url = String(url || "").trim();
  if(!url) return Promise.resolve(false);

  if(imagePreloadCache[url]) return imagePreloadCache[url];

  imagePreloadCache[url] = new Promise(function(resolve){
    const img = new Image();
    img.decoding = "async";
    img.onload = function(){ resolve(true); };
    img.onerror = function(){ resolve(false); };
    img.src = url;
  });

  return imagePreloadCache[url];
}

function preloadImageNoWait(url){
  try{ preloadImage(url); }catch(e){}
}

function preloadCollectionImages(cards, limit){
  try{
    const owned = (cards || []).filter(function(c){ return c && c.owned && c.imageUrl; });
    const first = owned.slice(0, limit || 18);
    first.forEach(function(c){ preloadImageNoWait(c.imageUrl); });

    setTimeout(function(){
      owned.slice(limit || 18).forEach(function(c){ preloadImageNoWait(c.imageUrl); });
    }, 500);
  }catch(e){}
}

function getCollectionCacheForUser(userId){
  userId = String(userId || "");
  try{
    if(collectionCache && collectionCacheUserId === userId && Date.now() - collectionCacheAt < COLLECTION_CACHE_MS){
      return collectionCache;
    }

    const cachedUser = sessionStorage.getItem("kuronekoCollectionCacheUserId") || "";
    const cachedAt = Number(sessionStorage.getItem("kuronekoCollectionCacheAt") || 0);
    const cachedBody = sessionStorage.getItem("kuronekoCollectionCache") || "";

    if(cachedUser === userId && cachedAt && cachedBody && Date.now() - cachedAt < COLLECTION_CACHE_MS){
      const parsed = JSON.parse(cachedBody);
      collectionCacheUserId = cachedUser;
      collectionCacheAt = cachedAt;
      collectionCache = parsed;
      return parsed;
    }
  }catch(e){}

  return null;
}

  }

  drawing = true;

  showPressFx();

  try{
    const res = await jsonp({
      action:"draw",
      userId:profile.userId,
      displayName:profile.displayName
    });

    hidePressFx();

    if(!res || res.ok === false){

        updateDailyLimitText(Number(res.remaining || 0), Number(res.dailyLimit || dailyLimit));
      }else{

      }
      setDoneStatus();
      alert(res && res.message ? res.message : "今日はもう引いてるにゃー🐾");

    return;

  const cached = getCollectionCacheForUser(profile.userId);
  if(cached && cached.ok){
    renderCollection(cached.cards || [], cached.ownedCount, cached.totalCount, true);
    if(cached.cards) preloadCollectionImages(cached.cards, 24);

    // キャッシュ表示後、裏で最新データを取り直す。
    refreshCollectionInBackground();
    return;
  }

  showZukanOpenFx();

  try{

      action:"collection",
      userId:profile.userId
    });

    if(!res || res.ok === false){
      hideZukanOpenFx();
      alert(res && res.message ? res.message : "図鑑を読み込めませんでした。");
      return;
    }

    setCollectionCacheForUser(profile.userId, res);
    preloadCollectionImages(res.cards || [], 24);
    renderCollection(res.cards || [], res.ownedCount, res.totalCount, false);

    setTimeout(function(){
      hideZukanOpenFx();

function renderCollection(cards, ownedCount, totalCount, fromCache){
  const list = document.getElementById("collectionList");
  const info = document.getElementById("collectionInfo");

  list.innerHTML = "";

  const allCards = (cards || []).slice().sort(function(a,b){
    return Number(a.sortNo || 999999) - Number(b.sortNo || 999999);
  });

  const total = Number(totalCount || allCards.length || 0);
  const owned = Number(ownedCount || allCards.filter(function(c){ return !!c.owned; }).length || 0);
  const percent = total ? Math.round((owned / total) * 100) : 0;

  info.innerHTML =
    "入手済み " + owned + " / " + total + "枚　｜　" + percent + "%<br>" +
    "入団日順アルバム" +
    '<div class="bar"><span style="width:' + percent + '%"></span></div>';

  if(allCards.length === 0){
    list.innerHTML = "<div>まだシールがありません</div>";
  }else{
    const frag = document.createDocumentFragment();
    allCards.forEach(function(card, index){
      const div = document.createElement("div");
      const ownedCard = !!card.owned;

      div.className =
        (card.secret ? "cardMini secretMini" : "cardMini") +
        (ownedCard ? "" : " lockedMini");

      div.setAttribute("data-no", "No." + String(index + 1).padStart(3, "0"));
      div.setAttribute("data-card-id", String(card.id || ""));

      if(ownedCard){
        const img = escapeHtml(card.imageUrl);
        const name = escapeHtml(card.name || card.realName);

        div.innerHTML =
          '<img loading="lazy" decoding="async" src="' + img + '">' +
          '<div>' + name + '</div>';

        div.onclick = function(){
          openSealZoom(card.imageUrl, card.name || card.realName);
        };
      }else{
        div.innerHTML =
          '<div class="lockedThumb">？？？</div>' +
          '<div>未入手</div>';
      }

      frag.appendChild(div);
    });
    list.appendChild(frag);
  }

  const collection = document.getElementById("collection");
  collection.style.display = "block";
  collection.classList.remove("collectionOpening");
  if(!fromCache){
    void collection.offsetWidth;
    collection.classList.add("collectionOpening");
  }

  setTimeout(function(){
    afterCollectionOpenJump();
  }, fromCache ? 60 : 220);
}


function afterCollectionOpenJump(){
  const targetId = pendingNewCardId || lastDrawnCardId;
  if(!targetId) return;

  const card = findCollectionCardById(targetId);
  if(!card) return;

  scrollCollectionToCard(card, function(){
    if(pendingNewCardId && pendingNewImageUrl){
      showCollectionToast("新しいシールを図鑑に登録中…");
      playAbsorbIntoCollection(card, pendingNewImageUrl, function(){
        focusCollectionCard(card);
        clearPendingNewCard();
      });
    }else{
      focusCollectionCard(card);
    }
  });
}

function findCollectionCardById(cardId){
  const nodes = document.querySelectorAll("#collectionList [data-card-id]");
  for(let i=0;i<nodes.length;i++){
    if(String(nodes[i].getAttribute("data-card-id")) === String(cardId)){
      return nodes[i];
    }
  }
  return null;
}

function scrollCollectionToCard(card, callback){
  const collection = document.getElementById("collection");
  if(!collection || !card){
    if(callback) callback();
    return;
  }

  const desired =
    card.offsetTop -
    (collection.clientHeight / 2) +
    (card.clientHeight / 2);

  collection.scrollTo({
    top: Math.max(0, desired),
    behavior: "smooth"
  });

  setTimeout(function(){
    if(callback) callback();
  }, 650);
}

function focusCollectionCard(card){

function playSfx(type){
  if(!soundEnabled) return;

  try{
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if(!AudioCtx) return;

    const ctx = new AudioCtx();
    const gain = ctx.createGain();
    gain.connect(ctx.destination);

    let freq = 660;
    let duration = 0.11;
    let wave = "sine";

    if(type === "paw"){
      freq = 180;
      duration = 0.09;
      wave = "triangle";
    }else if(type === "sparkle"){
      freq = 980;
      duration = 0.14;
      wave = "sine";
    }else if(type === "boom"){
      freq = 90;
      duration = 0.22;
      wave = "sawtooth";
    }else if(type === "secret"){
      freq = 1320;
      duration = 0.3;
      wave = "square";
    }

    const osc = ctx.createOscillator();
    osc.type = wave;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);

    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.13, ctx.currentTime + 0.015);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);

    osc.connect(gain);
    osc.start();
    osc.stop(ctx.currentTime + duration + 0.03);

    setTimeout(function(){
      try{ ctx.close(); }catch(e){}
    }, 420);
  }catch(e){}
}

/* しょぼさ対策：単音ではなく複数音を重ねる */
function v11Sfx(type){
  if(!soundEnabled) return;

  try{
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if(!AudioCtx) return;

    const ctx = new AudioCtx();
    const master = ctx.createGain();
    master.gain.setValueAtTime(0.0001, ctx.currentTime);
    master.gain.exponentialRampToValueAtTime(0.20, ctx.currentTime + 0.02);
    master.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 1.1);
    master.connect(ctx.destination);

    function tone(freq, start, dur, wave, volume){
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = wave || "sine";
      osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
      gain.gain.setValueAtTime(0.0001, ctx.currentTime + start);
      gain.gain.exponentialRampToValueAtTime(volume || 0.12, ctx.currentTime + start + 0.018);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + start + dur);
      osc.connect(gain);
      gain.connect(master);
      osc.start(ctx.currentTime + start);
      osc.stop(ctx.currentTime + start + dur + 0.04);
    }

    if(type === "paw"){
      tone(160,0,.10,"triangle",.16);
      tone(95,.04,.14,"sine",.14);
    }else if(type === "sparkle"){
      tone(880,0,.12,"sine",.10);
      tone(1320,.07,.14,"sine",.12);
      tone(1760,.15,.12,"sine",.10);
    }else if(type === "boom"){
      tone(70,0,.24,"sawtooth",.18);
      tone(120,.05,.18,"triangle",.14);
      tone(45,.12,.3,"sine",.12);
    }else if(type === "secret"){
      tone(520,0,.18,"sine",.12);
      tone(780,.12,.18,"sine",.13);
      tone(1040,.24,.2,"sine",.14);
      tone(1560,.38,.28,"square",.10);
      tone(90,.48,.36,"sawtooth",.16);
    }else if(type === "open"){
      tone(660,0,.10,"sine",.08);
      tone(990,.08,.10,"sine",.08);
    }else{
      tone(550,0,.12,"sine",.10);
    }

    setTimeout(function(){
      try{ctx.close();}catch(e){}
    },1300);
  }catch(e){}
}

<script>
/* ===== クロネコガチャ 安全追加：にゃー音だけ ===== */
(function(){
  let kuroMeowCtx = null;

  function getKuroMeowCtx(){
    try{
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if(!AudioCtx) return null;
      if(!kuroMeowCtx) kuroMeowCtx = new AudioCtx();
      if(kuroMeowCtx.state === "suspended") kuroMeowCtx.resume();
      return kuroMeowCtx;
    }catch(e){
      return null;
    }
  }

  function kuroTone(freq,start,dur,wave,vol){
    const ctx = getKuroMeowCtx();
    if(!ctx) return;

    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = wave || "sine";
    osc.frequency.setValueAtTime(freq, ctx.currentTime + start);

    gain.gain.setValueAtTime(0.0001, ctx.currentTime + start);
    gain.gain.exponentialRampToValueAtTime(vol || 0.08, ctx.currentTime + start + 0.018);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + start + dur);

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start(ctx.currentTime + start);
    osc.stop(ctx.currentTime + start + dur + 0.04);
  }

  function kuronekoMeow(type){
    try{
      if(window.soundEnabled === false) return;

      if(type === "secret"){
        // 低めの黒猫っぽい鳴き声
        kuroTone(300,0.00,0.12,"sine",0.09);
        kuroTone(230,0.10,0.22,"triangle",0.10);
        kuroTone(360,0.26,0.16,"sine",0.07);
      }else if(type === "start"){
        // ガチャ開始時の少し元気な鳴き声
        kuroTone(650,0.00,0.09,"sine",0.08);
        kuroTone(820,0.07,0.13,"sine",0.09);
        kuroTone(600,0.20,0.14,"triangle",0.06);
      }else{
        // ボタンタップ時の短い「にゃー」
        kuroTone(620,0.00,0.08,"sine",0.07);
        kuroTone(760,0.06,0.11,"sine",0.08);
      }
    }catch(e){}
  }

  window.kuronekoMeow = kuronekoMeow;

  document.addEventListener("pointerdown", function(e){
    const drawTap = document.getElementById("drawTap");
    if(drawTap && (e.target === drawTap || drawTap.contains(e.target))){
      kuronekoMeow("tap");
    }
  }, true);

  const oldPlayGachaEffect = window.playGachaEffect;
  if(typeof oldPlayGachaEffect === "function"){
    window.playGachaEffect = function(res){
      try{
        kuronekoMeow(res && res.secret ? "secret" : "start");
      }catch(e){}
      return oldPlayGachaEffect(res);
    };
  }
})();
</script>

(function(){
  function isSuperSecretCardElement(card){
    if(!card) return false;

    const no = card.getAttribute("data-no") || "";
    if(/^No\.?0?9\d\d/i.test(no)) return true;
    if(/^No\.?900/i.test(no)) return true;

    const txt = card.textContent || "";
    if(/SUPER|超シークレット|supersecret/i.test(txt)) return true;

    const img = card.querySelector("img");
    if(img && /\/900_|900_/.test(img.src || "")) return true;

    return false;
  }

  function markSuperSecretCards(){
    const cards = document.querySelectorAll(".cardMini");
    cards.forEach(function(card){
      if(isSuperSecretCardElement(card)){
        card.classList.add("superSecretMini");
      }
    });
  }

  function fixBrokenImages(){
    const imgs = document.querySelectorAll(".cardMini img:not([data-kuro-retry-ready])");

    imgs.forEach(function(img){
      img.dataset.kuroRetryReady = "1";

      img.addEventListener("error", function(){
        const retryCount = Number(img.dataset.kuroRetryCount || 0);
        if(retryCount >= 3) {
          img.classList.add("kuroImgRetrying");
          return;
        }

        img.dataset.kuroRetryCount = String(retryCount + 1);
        img.classList.add("kuroImgRetrying");

        const baseSrc = (img.src || "").split("?")[0];
        const delay = 450 + retryCount * 700;

        setTimeout(function(){
          img.src = baseSrc + "?retry=" + Date.now();
        }, delay);
      });

      img.addEventListener("load", function(){
        img.classList.remove("kuroImgRetrying");
      });
    });
  }

  function ensureSuperSecretFx(){
    let fx = document.getElementById("superSecretFx");
    if(fx) return fx;

    fx = document.createElement("div");
    fx.id = "superSecretFx";
    fx.innerHTML =

    document.body.appendChild(fx);
    return fx;
  }

  function showSuperSecretFx(){
    const fx = ensureSuperSecretFx();
    fx.classList.remove("show");
    void fx.offsetWidth;
    fx.classList.add("show");

    try{
      if(navigator.vibrate) navigator.vibrate([100,50,160,60,220,80,260]);
    }catch(e){}

    if(typeof window.kuronekoMeow === "function"){
      window.kuronekoMeow("secret");
    }

    setTimeout(function(){
      fx.classList.remove("show");
    }, 7600);
  }

  window.kuronekoShowSuperSecretFx = showSuperSecretFx;

  const oldPlayGachaEffect = window.playGachaEffect;
  if(typeof oldPlayGachaEffect === "function"){
    window.playGachaEffect = function(res){
      if(res && (res.supersecret || String(res.type || "").toLowerCase() === "supersecret")){
        showSuperSecretFx();
        return new Promise(function(resolve){
          setTimeout(function(){
            oldPlayGachaEffect(res).then(resolve);
          }, 3600);
        });
      }
      return oldPlayGachaEffect(res);
    };
  }

  document.addEventListener("DOMContentLoaded", function(){
    ensureSuperSecretFx();
    fixBrokenImages();
    markSuperSecretCards();

    const mo = new MutationObserver(function(){
      fixBrokenImages();
      markSuperSecretCards();
    });

    mo.observe(document.body, {
      childList:true,
      subtree:true
    });
  });
})();

<script>
/* ===== クロネコガチャ 完成版：通常図鑑とSPECIAL分離 ===== */
(function(){
  let lastCollectionData = null;

  function isSpecialCardData(c){
    if(!c) return false;
    if(c.supersecret) return true;
    if(String(c.type || "").toLowerCase() === "supersecret") return true;
    if(/^900/i.test(String(c.id || ""))) return true;
    return false;
  }

  function makeSpecialCard(c, index){
    const div = document.createElement("div");
    div.className = "cardMini specialMini" + (c.soldOut ? " soldOut" : "");
    div.setAttribute("data-no", "No.EX" + String(index + 1).padStart(2,"0"));

    const owned = !!c.owned;

    if(owned && c.imageUrl){
      const img = document.createElement("img");
      img.src = c.imageUrl;
      img.alt = c.realName || c.name || "SPECIAL";
      img.addEventListener("click", function(){
        if(typeof openSealZoom === "function"){
          openSealZoom(c.imageUrl, c.realName || c.name || "SPECIAL");
        }
      });
      div.appendChild(img);
    }else{
      const locked = document.createElement("div");
      locked.className = "lockedThumb";
      locked.textContent = "???";
      div.appendChild(locked);
    }

    const name = document.createElement("div");
    name.className = "specialName";

    if(owned){
      name.textContent = c.realName || c.name || "SPECIAL";
    }else if(c.soldOut){
      name.textContent = "現在入手不可";
    }else{
      name.textContent = "SPECIAL";
    }

    div.appendChild(name);
    return div;
  }

  function renderSpecialArea(data){
    const collection = document.getElementById("collection");
    const grid = document.getElementById("collectionGrid") || document.querySelector("#collection .grid");
    if(!collection || !grid || !data) return;

    let special = data.specialCards || [];

    if(!special.length && data.cards && data.cards.length){
      special = data.cards.filter(isSpecialCardData);
    }

    const old = document.getElementById("specialCollectionArea");
    if(old) old.remove();

    // 通常グリッド内に紛れた900番台を非表示
    const minis = grid.querySelectorAll(".cardMini");
    minis.forEach(function(card){
      const no = card.getAttribute("data-no") || "";
      const txt = card.textContent || "";
      const img = card.querySelector("img");
      if(/^No\.?0?9\d\d/i.test(no) || /SUPER|超シークレット|supersecret/i.test(txt) || (img && /\/900_|900_/.test(img.src || ""))){
        card.classList.add("specialExcluded");
      }
    });

    if(!special.length) return;

    const area = document.createElement("div");
    area.id = "specialCollectionArea";

    const title = document.createElement("div");
    title.className = "specialTitle";
    title.textContent = "SPECIAL";
    area.appendChild(title);

    const sub = document.createElement("div");
    sub.className = "specialSub";
    sub.textContent = "通常コンプリート対象外の特別枠";
    area.appendChild(sub);

    const sgrid = document.createElement("div");
    sgrid.className = "specialGrid";

    special.forEach(function(c, i){
      sgrid.appendChild(makeSpecialCard(c, i));
    });

    area.appendChild(sgrid);

    const closeBtn = document.getElementById("closeCollection");
    if(closeBtn && closeBtn.parentNode === collection){
      collection.insertBefore(area, closeBtn);
    }else{
      collection.appendChild(area);
    }
  }

  const oldRenderCollection = window.renderCollection;
  if(typeof oldRenderCollection === "function"){
    window.renderCollection = function(data){
      lastCollectionData = data;
      const ret = oldRenderCollection.apply(this, arguments);
      setTimeout(function(){
        renderSpecialArea(data);
      }, 50);
      return ret;
    };
  }

  const oldOpenCollection = window.openCollection;
  if(typeof oldOpenCollection === "function"){
    window.openCollection = function(){
      const ret = oldOpenCollection.apply(this, arguments);
      setTimeout(function(){
        if(lastCollectionData) renderSpecialArea(lastCollectionData);
      }, 300);
      return ret;
    };
  }

  document.addEventListener("DOMContentLoaded", function(){
    const mo = new MutationObserver(function(){
      if(lastCollectionData) renderSpecialArea(lastCollectionData);
    });
    mo.observe(document.body,{childList:true,subtree:true});
  });
})();
</script>

<script>
/* ===== クロネコガチャ Ver.1.1 安定版：図鑑sortNo固定・画像リトライ ===== */
(function(){
  let kuroLastCollectionData = null;

  function sortCollectionData(data){
    if(!data || !Array.isArray(data.cards)) return data;

    data.cards.sort(function(a,b){
      const sa = Number(a.sortNo || 999999);
      const sb = Number(b.sortNo || 999999);
      if(sa !== sb) return sa - sb;
      return String(a.id || "").localeCompare(String(b.id || ""));
    });

    if(Array.isArray(data.specialCards)){
      data.specialCards.sort(function(a,b){
        const sa = Number(a.sortNo || 999999);
        const sb = Number(b.sortNo || 999999);
        if(sa !== sb) return sa - sb;
        return String(a.id || "").localeCompare(String(b.id || ""));
      });
    }

    return data;
  }

  const oldRenderCollection = window.renderCollection;
  if(typeof oldRenderCollection === "function"){
    window.renderCollection = function(data){
      kuroLastCollectionData = sortCollectionData(data);
      const ret = oldRenderCollection.call(this, kuroLastCollectionData);
      setTimeout(function(){
        applyImageRetry();
        fixCollectionPercent(kuroLastCollectionData);
      },80);
      return ret;
    };
  }

  function applyImageRetry(){
    const imgs = document.querySelectorAll(".cardMini img:not([data-kuro-img-ready])");

    imgs.forEach(function(img){
      img.dataset.kuroImgReady = "1";

      img.addEventListener("error", function(){
        const count = Number(img.dataset.kuroRetryCount || 0);
        if(count >= 3){
          img.classList.add("kuroRetryImg");
          return;
        }

        img.dataset.kuroRetryCount = String(count + 1);
        img.classList.add("kuroRetryImg");

        const base = String(img.src || "").split("?")[0];
        setTimeout(function(){
          img.src = base + "?retry=" + Date.now();
        }, 500 + count * 800);
      });

      img.addEventListener("load", function(){
        img.classList.remove("kuroRetryImg");
      });
    });
  }

  function fixCollectionPercent(data){
    const info = document.getElementById("collectionInfo");
    if(!info || !data) return;

    const owned = Number(data.ownedCount || 0);
    const total = Number(data.totalCount || 0);
    if(!total) return;

    let p = info.querySelector(".kuroPercent");
    if(!p){
      p = document.createElement("span");
      p.className = "kuroPercent";
      info.appendChild(p);
    }

    const percent = Math.floor((owned / total) * 100);
    p.textContent = "通常図鑑 収集率 " + percent + "%";
  }

  document.addEventListener("DOMContentLoaded", function(){
    applyImageRetry();

    const mo = new MutationObserver(function(){
      applyImageRetry();
      if(kuroLastCollectionData) fixCollectionPercent(kuroLastCollectionData);
    });

    mo.observe(document.body,{
      childList:true,
      subtree:true
    });
  });
})();
</script>

        animation:k20Light 1.5s ease-out forwards;
      }
      @keyframes k20Light{
        0%{opacity:0; transform:translate(-50%,-50%) scale(.25);}
        28%{opacity:1; transform:translate(-50%,-50%) scale(1.15);}
        70%{opacity:.95; transform:translate(-50%,-50%) scale(1.7);}
        100%{opacity:0; transform:translate(-50%,-50%) scale(2.35);}
      }
      .k20Card{
        position:absolute; left:50%; top:52%; width:190px; height:248px;
        border-radius:20px; z-index:86; opacity:0;
        background:linear-gradient(135deg, rgba(255,255,255,.98), rgba(250,204,21,.9));
        box-shadow:0 0 42px #facc15,0 0 90px rgba(250,204,21,.62),0 0 130px rgba(244,114,182,.32);
        transform:translate(-50%,-50%) scale(.16) rotateY(90deg) rotateZ(-8deg);
        animation:k20Card 1.1s cubic-bezier(.17,.9,.2,1) forwards;
      }
      @keyframes k20Card{
        0%{opacity:0; transform:translate(-50%,-50%) scale(.16) rotateY(90deg) rotateZ(-8deg);}
        46%{opacity:1; transform:translate(-50%,-50%) scale(1.25) rotateY(-12deg) rotateZ(3deg);}
        72%{opacity:1; transform:translate(-50%,-50%) scale(.96) rotateY(5deg) rotateZ(-1deg);}
        100%{opacity:1; transform:translate(-50%,-50%) scale(1) rotateY(0) rotateZ(0);}
      }
      .k20Dust{
        position:absolute; width:8px; height:8px; border-radius:50%;
        background:#facc15; box-shadow:0 0 16px #facc15;
        z-index:74; opacity:0; animation:k20Dust 1.35s ease-out forwards;
      }
      @keyframes k20Dust{
        0%{opacity:0; transform:translate(0,0) scale(.25);}
        18%{opacity:1;}
        100%{opacity:0; transform:translate(var(--dx),var(--dy)) scale(1.35);}
      }
      .k20Flash{
        position:absolute; inset:0; z-index:95; background:white; opacity:0;
        animation:k20Flash .78s ease forwards;
      }
      @keyframes k20Flash{0%,100%{opacity:0;}30%{opacity:.96;}58%{opacity:.22;}}
      .k20Skip{
        position:absolute; left:50%; bottom:8%; transform:translateX(-50%);
        color:#fff7d6; z-index:110; font-size:12px; font-weight:900;
        opacity:.75; text-shadow:0 2px 5px #000;
      }
      .k20Shake{animation:k20Shake .42s linear both;}
      @keyframes k20Shake{
        0%,100%{transform:translate(0,0);}
        15%{transform:translate(-7px,5px);}
        30%{transform:translate(7px,-5px);}
        45%{transform:translate(-5px,-6px);}
        60%{transform:translate(6px,6px);}
        75%{transform:translate(-4px,3px);}
      }
      #k20VerBadge{
        position:absolute; left:8px; top:8px; z-index:9999;
        color:#fff7d6; background:rgba(0,0,0,.48);
        border:1px solid rgba(250,204,21,.45);
        border-radius:999px; padding:4px 8px; font-size:10px; font-weight:900;
        pointer-events:none;
      }
    `;
    document.head.appendChild(st);
  }

  function el(cls, txt){
    const d=document.createElement("div");
    d.className=cls;
    if(txt) d.textContent=txt;
    return d;
  }

  function part(cls){
    const d=document.createElement("div");
    d.className="k20Part " + cls;
    return d;
  }

  function sfx(type){
    try{
      if(typeof v11Sfx === "function") v11Sfx(type || "sparkle");
      else if(typeof playSfx === "function") playSfx(type || "sparkle");
    }catch(e){}
  }

  function vibrate(p){
    try{ if(navigator.vibrate) navigator.vibrate(p || [40]); }catch(e){}
  }

  function addDust(stage, count, delay){
    setTimeout(function(){
      for(let i=0;i<count;i++){
        const d=el("k20Dust");
        d.style.left=(48+Math.random()*4)+"%";
        d.style.top=(49+Math.random()*7)+"%";
        d.style.setProperty("--dx",(Math.random()*390-195)+"px");
        d.style.setProperty("--dy",(Math.random()*340-170)+"px");
        d.style.animationDelay=(Math.random()*.32)+"s";
        stage.appendChild(d);
      }
    }, delay);
  }

  function addSparkles(stage, count, delay){
    setTimeout(function(){
      for(let i=0;i<count;i++){
        const s=part("k20Sparkle");
        s.style.left=(24+Math.random()*52)+"%";
        s.style.top=(26+Math.random()*48)+"%";
        s.style.animationDelay=(Math.random()*.42)+"s";
        s.style.transform="translate(-50%,-50%) scale("+(0.22+Math.random()*0.38)+") rotate("+(Math.random()*90-45)+"deg)";
        stage.appendChild(s);
      }
    }, delay);
  }

  function finishEffectSafe(resolve){
    if(typeof finishEffect === "function"){
      finishEffect(resolve);
    }else{
      const effect=document.getElementById("effect");
      if(effect) effect.style.display="none";
      resolve();
    }
  }

  function runUltimateNormal(resolve){
    addStyle();
    const effect=document.getElementById("effect");
    const stage=document.getElementById("effectStage");
    if(!effect || !stage){ resolve(); return; }

    effect.className="";
    effect.style.display="block";
    stage.innerHTML="";

    stage.appendChild(el("k20Stage"));
    stage.appendChild(el("k20Skip","長押しでスキップ"));

    let done=false, pressTimer=null;
    function finish(){
      if(done) return;
      done=true;
      effect.onpointerdown=null;
      effect.onpointerup=null;
      effect.onpointercancel=null;
      finishEffectSafe(resolve);
    }

    effect.onpointerdown=function(){ pressTimer=setTimeout(finish,650); };
    effect.onpointerup=function(){ if(pressTimer) clearTimeout(pressTimer); };
    effect.onpointercancel=function(){ if(pressTimer) clearTimeout(pressTimer); };

    const messages=[
      "黒猫がシールを運んできた…",
      "肉球スタンプ、発動！",
      "魔法陣が夜を照らす…"
    ];
    const msg=messages[Math.floor(Math.random()*messages.length)];

    sfx("sparkle");
    vibrate([35]);

    setTimeout(()=>stage.appendChild(el("k20Text", msg)),120);
    setTimeout(()=>stage.appendChild(part("k20Circle")),520);
    addSparkles(stage,7,650);
    setTimeout(()=>stage.appendChild(part("k20Cat")),900);

    setTimeout(function(){
      effect.classList.remove("k20Shake");
      void effect.offsetWidth;
      effect.classList.add("k20Shake");
      sfx("boom");
      vibrate([55,30,85]);
      stage.appendChild(part("k20Paw"));
    },2350);

    addDust(stage,95,2520);

    setTimeout(()=>stage.appendChild(part("k20Light")),3120);
    setTimeout(()=>stage.appendChild(el("k20Flash")),3480);
    setTimeout(()=>stage.appendChild(el("k20Card")),3820);

    setTimeout(finish,5150);
  }

  // badge so user can confirm the correct file is loaded
  window.addEventListener("load", function(){
    try{
      addStyle();
      const app=document.getElementById("app") || document.body;
      if(!document.getElementById("k20VerBadge")){
        const b=el("", "Ver.2.0");
        b.id="k20VerBadge";
        app.appendChild(b);
      }
      const pre=document.createElement("img");
      pre.id="k20Preload";
      pre.src=SHEET_URL;
      document.body.appendChild(pre);
    }catch(e){}
  });

  window.playGachaEffect = function(res){
    return new Promise(function(resolve){
      if(res && (res.secret || res.supersecret)){
        // 通常以外は既存の豪華シークレット演出を残す
        if(typeof v11SecretAwakening === "function"){
          // If old system exists, use the old behavior by manually falling back is risky,
          // so use ultimate normal only for stability if no oldPromise is available.
        }
      }
      runUltimateNormal(resolve);
    });
  };
})();
</script>
